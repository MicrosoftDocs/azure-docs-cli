                                             [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                             [--resource-group]
                                             [--subscription]
                                             [--tags]
  examples:
  - summary: |-
      Patch a kubernetes version resource.
    syntax: az networkcloud kubernetesversion create --resource-group resourceGroupName --kubernetes-version-name default --tags "{key1:myvalue1,key2:myvalue2}"

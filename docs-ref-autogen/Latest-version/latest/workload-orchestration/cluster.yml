### YamlMime:AzureCLIGroup
uid: az_workload-orchestration_cluster
name: az workload-orchestration cluster
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **workload-orchestration** extension for the Azure CLI (version 2.67.0 or higher). The extension will automatically install the first time you run an **az workload-orchestration cluster** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Prepare an Arc-connected Kubernetes cluster for Workload Orchestration.
status: GA
sourceType: Extension
directCommands:
- uid: az_workload-orchestration_cluster_init
  name: az workload-orchestration cluster init
  summary: |-
    Prepare an Arc-connected Kubernetes cluster for Workload Orchestration.
  description: |-
    Installs all prerequisites on an Arc-connected cluster to make it ready
    for Workload Orchestration. Idempotent - skips components already installed.
    Steps performed:
    1. Verify cluster is Arc-connected with required features enabled
    2. Install Workload Orchestration Extension Dependencies
    3. Install Workload Orchestration Extension
    4. Create Custom Location (validates cluster binding if already exists).
  status: GA
  sourceType: Extension
  syntax: >-
    az workload-orchestration cluster init --cluster-name
                                           --location
                                           --resource-group
                                           [--acquire-policy-token]
                                           [--change-reference]
                                           [--custom-location-location]
                                           [--custom-location-name]
                                           [--custom-location-resource-group]
                                           [--extension-dependency-version]
                                           [--extension-name]
                                           [--extension-version]
                                           [--release-train]
  examples:
  - summary: |-
      Initialize a cluster with defaults
    syntax: az workload-orchestration cluster init -c my-cluster -g my-rg -l eastus2euap
  - summary: |-
      Use a specific release train
    syntax: az workload-orchestration cluster init -c my-cluster -g my-rg -l eastus2euap --release-train dev
  - summary: |-
      Pin a specific WO extension version
    syntax: az workload-orchestration cluster init -c my-cluster -g my-rg -l eastus2euap --extension-version 2.1.28
  - summary: |-
      Pin a dependency extension (partial-value shorthand)
    syntax: az workload-orchestration cluster init -c my-cluster -g my-rg -l eastus2euap --extension-dependency-version iotplatform=0.7.6
  - summary: |-
      Pin a dependency extension (full-value shorthand)
    syntax: az workload-orchestration cluster init -c my-cluster -g my-rg -l eastus2euap --extension-dependency-version "{iotplatform:0.7.6}"
  - summary: |-
      Pin dependencies from a JSON file
    syntax: az workload-orchestration cluster init -c my-cluster -g my-rg -l eastus2euap --extension-dependency-version deps.json
  - summary: |-
      Custom location name
    syntax: az workload-orchestration cluster init -c my-cluster -g my-rg -l eastus2euap --custom-location-name my-cl
  - summary: |-
      Custom location in a different resource group
    syntax: az workload-orchestration cluster init -c my-cluster -g cluster-rg -l eastus2euap --custom-location-resource-group cl-rg
  - summary: |-
      Custom location in a different region
    syntax: az workload-orchestration cluster init -c my-cluster -g my-rg -l eastus2euap --custom-location-location westus2
  requiredParameters:
  - isRequired: true
    name: --cluster-name -c
    summary: |-
      Name of the Arc-connected Kubernetes cluster.
  - isRequired: true
    name: --location -l
    summary: |-
      Azure region for the custom location (e.g. eastus2euap).
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Resource group of the Arc-connected cluster.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --custom-location-location
    summary: |-
      Azure region where the custom location will be created. Default: same as --location.
  - name: --custom-location-name
    summary: |-
      Name for the custom location. Default: `{cluster-name}-cl`.
  - name: --custom-location-resource-group
    summary: |-
      Resource group where the custom location will be created. Default: same as --resource-group.
  - name: --extension-dependency-version
    summary: |-
      Pin dependency extension versions. Supported key: iotplatform. Example: iotplatform=0.7.6, {iotplatform:0.7.6}, deps.json.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
  - name: --extension-name
    summary: |-
      Name for the WO extension resource. Default: wo-extension.
  - name: --extension-version
    summary: |-
      Specific WO extension version to install.
  - name: --release-train
    summary: |-
      Extension release train. Default: stable.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_workload-orchestration_cluster_init
metadata:
  description: Prepare an Arc-connected Kubernetes cluster for Workload Orchestration.

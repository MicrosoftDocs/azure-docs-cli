### YamlMime:AzureCLIGroup
uid: az_workload-orchestration_solution-deployment
name: az workload-orchestration solution-deployment
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **workload-orchestration-preview** extension for the Azure CLI (version 2.67.0 or higher). The extension will automatically install the first time you run an **az workload-orchestration solution-deployment** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Workload-orchestration solution-deployment helps to manage Solution Deployments.
status: GA
sourceType: Extension
directCommands:
- uid: az_workload-orchestration_solution-deployment_create
  name: az workload-orchestration solution-deployment create
  summary: |-
    Create or update a SolutionDeployment Resource.
  status: GA
  sourceType: Extension
  syntax: >-
    az workload-orchestration solution-deployment create --name --solution-deployment-name
                                                         --resource-group
                                                         --solution-template-name
                                                         --solution-template-version
                                                         [--acquire-policy-token]
                                                         [--capabilities]
                                                         [--change-reference]
                                                         [--input]
                                                         [--location]
                                                         [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                                         [--solution-template-rg]
                                                         [--solution-template-subscription]
                                                         [--tags]
                                                         [--target-ids]
  examples:
  - summary: |-
      Create a Solution Deployment
    syntax: az workload-orchestration solution-deployment create -g myResourceGroup -n mySolutionDeployment --location eastus --solution-template-name mySolutionTemplate --solution-template-version 1.0.0 --target-ids "/subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Edge/targets/{target}"
  - summary: |-
      Create a Solution Deployment with multiple targetIds
    syntax: az workload-orchestration solution-deployment create -g myResourceGroup -n mySolutionDeployment --location eastus --solution-template-name mySolutionTemplate --solution-template-version 1.0.0 --target-ids "/subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Edge/targets/{target1}" "/subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Edge/targets/{target2}"
  requiredParameters:
  - isRequired: true
    name: --name --solution-deployment-name -n
    summary: |-
      The name of the SolutionDeployment.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --solution-template-name
    summary: |-
      Solution template name.
    groupName: SolutionTemplateProperties Arguments
  - isRequired: true
    name: --solution-template-version
    summary: |-
      Solution template version.
    groupName: SolutionTemplateProperties Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --capabilities
    summary: |-
      List of capabilities  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: TargetProperties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --input
    summary: |-
      Input field  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --location -l
    summary: |-
      The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    groupName: Resource Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --solution-template-rg
    summary: |-
      Solution template resource group.
    groupName: SolutionTemplateProperties Arguments
  - name: --solution-template-subscription
    summary: |-
      Solution template subscription.
    groupName: SolutionTemplateProperties Arguments
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource Arguments
  - name: --target-ids
    summary: |-
      ARM resource IDs of the Targets resources  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: TargetProperties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

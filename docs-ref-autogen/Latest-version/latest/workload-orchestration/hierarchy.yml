### YamlMime:AzureCLIGroup
uid: az_workload-orchestration_hierarchy
name: az workload-orchestration hierarchy
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **workload-orchestration** extension for the Azure CLI (version 2.67.0 or higher). The extension will automatically install the first time you run an **az workload-orchestration hierarchy** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage workload-orchestration hierarchies (Site + Configuration + ConfigurationReference).
status: GA
sourceType: Extension
directCommands:
- uid: az_workload-orchestration_hierarchy_create
  name: az workload-orchestration hierarchy create
  summary: |-
    Create a hierarchy: Site + Configuration + ConfigurationReference (and ServiceGroup ancestors if type=ServiceGroup).
  description: |-
    Idempotent. Supports ResourceGroup (default, single site) and ServiceGroup
    (nested, up to 3 levels) hierarchy types.
  status: GA
  sourceType: Extension
  syntax: >-
    az workload-orchestration hierarchy create --configuration-location
                                               --hierarchy-spec
                                               --resource-group
                                               [--acquire-policy-token]
                                               [--change-reference]
  examples:
  - summary: |-
      Create RG hierarchy from YAML file
    syntax: az workload-orchestration hierarchy create -g my-rg -l eastus2euap --hierarchy-spec hierarchy.yaml
  - summary: |-
      Create RG hierarchy with inline shorthand
    syntax: az workload-orchestration hierarchy create -g my-rg -l eastus2euap --hierarchy-spec "{name:Mehoopany,level:factory}"
  - summary: |-
      Create ServiceGroup hierarchy from JSON file
    syntax: az workload-orchestration hierarchy create -g my-rg -l eastus2euap --hierarchy-spec sg-hierarchy.json
  - summary: |-
      Create ServiceGroup hierarchy with inline shorthand (children as array)
    syntax: az workload-orchestration hierarchy create -g my-rg -l eastus2euap --hierarchy-spec "{type:ServiceGroup,name:India,level:country,children:[{name:Karnataka,level:region,children:[{name:BangaloreSouth,level:factory}]}]}"
  requiredParameters:
  - isRequired: true
    name: --configuration-location -l
    summary: |-
      Azure region for the Configuration resource (e.g. eastus2euap).
  - isRequired: true
    name: --hierarchy-spec
    summary: |-
      Hierarchy spec. Required keys: name, level. Optional: type (ResourceGroup|ServiceGroup, default ResourceGroup), children (list of child specs, ServiceGroup only, up to 3 levels deep).  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Resource group for Configuration resources.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_workload-orchestration_hierarchy_create
metadata:
  description: Manage workload-orchestration hierarchies (Site + Configuration + ConfigurationReference).

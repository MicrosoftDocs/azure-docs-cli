- uid: az_chaos_scenario_run_show
  name: az chaos scenario run show
  summary: |-
    Get a scenario run.
  description: |-
    This endpoint is also the polling target for ScenarioConfigurations.execute
    and ScenarioRuns.cancel (final-state-via: location). While the run is in
    progress the service returns 202 with a Location header pointing back to
    this URL; clients must keep polling until they receive 200, which carries
    the final ScenarioRun body.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos scenario run show [--ids]
                               [--name --run-id]
                               [--resource-group]
                               [--scenario-name]
                               [--subscription]
                               [--workspace-name]
  examples:
  - summary: |-
      Get a scenario run.
    syntax: az chaos scenario run show --resource-group exampleRG --workspace-name exampleWorkspace --scenario-name ZoneDown-1.0 --run-id abcd1234-5678-9012-3456-789012345678
  optionalParameters:
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --name --run-id -n
    summary: |-
      The name of the ScenarioRun.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --scenario-name
    summary: |-
      Name of the scenario.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --workspace-name
    summary: |-
      String that represents a Workspace resource name.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_chaos_scenario_run_start
  name: az chaos scenario run start
  summary: |-
    Start a scenario run from a scenario configuration.
  description: |-
    By default, runs a pre-flight validation before executing the scenario
    configuration. If validation fails, the run is not started and the command
    exits non-zero with the validation errors.

    --skip-validation bypasses pre-flight validation and proceeds directly to
    execute. Use for CI re-runs of an already-validated configuration or when
    driving the validate→execute sequence manually.

    --no-wait applies only to the execute phase. Pre-flight validation (if not
    skipped) is always awaited to completion. With --no-wait, the command returns
    immediately after kicking off execute, with the run ID parsed from the
    Location header.

    The fastest fire-and-forget invocation is --skip-validation --no-wait.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos scenario run start --config-name
                                --resource-group
                                --scenario-name
                                --workspace-name
                                [--acquire-policy-token]
                                [--change-reference]
                                [--no-wait]
                                [--skip-validation]
  examples:
  - summary: |-
      Start a scenario run (default — validates first, then executes)
    syntax: az chaos scenario run start --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --config-name zone1
  - summary: |-
      Start a run skipping pre-flight validation
    syntax: az chaos scenario run start --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --config-name zone1 --skip-validation
  - summary: |-
      Start a run without waiting for execute to complete
    syntax: az chaos scenario run start --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --config-name zone1 --no-wait
  - summary: |-
      Fire-and-forget (skip validation and don't wait for execute)
    syntax: az chaos scenario run start --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --config-name zone1 --skip-validation --no-wait
  requiredParameters:
  - isRequired: true
    name: --config-name
    summary: |-
      Name of the scenario configuration to execute.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --scenario-name
    summary: |-
      Name of the parent scenario.
  - isRequired: true
    name: --workspace-name
    summary: |-
      Name of the parent Chaos Studio workspace.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --skip-validation
    defaultValue: "False"
    summary: |-
      Skip pre-flight validation and proceed directly to execute. Use for CI re-runs of an already-validated configuration.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_chaos_scenario_run_wait
  name: az chaos scenario run wait
  summary: |-
    Place the CLI in a waiting state until a condition is met.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos scenario run wait [--acquire-policy-token]
                               [--change-reference]
                               [--created]
                               [--custom]
                               [--deleted]
                               [--exists]
                               [--ids]
                               [--interval]
                               [--name --run-id]
                               [--resource-group]
                               [--scenario-name]
                               [--subscription]
                               [--timeout]
                               [--updated]
                               [--workspace-name]
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --created
    defaultValue: "False"
    summary: |-
      Wait until created with 'provisioningState' at 'Succeeded'.
    groupName: Wait Condition Arguments
  - name: --custom
    summary: |-
      Wait until the condition satisfies a custom JMESPath query. E.g. provisioningState!='InProgress', instanceView.statuses[?code=='PowerState/running'].
    groupName: Wait Condition Arguments
  - name: --deleted
    defaultValue: "False"
    summary: |-
      Wait until deleted.
    groupName: Wait Condition Arguments
  - name: --exists
    defaultValue: "False"
    summary: |-
      Wait until the resource exists.
    groupName: Wait Condition Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --interval
    defaultValue: "30"
    summary: |-
      Polling interval in seconds.
    groupName: Wait Condition Arguments
  - name: --name --run-id -n
    summary: |-
      The name of the ScenarioRun.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --scenario-name
    summary: |-
      Name of the scenario.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --timeout
    defaultValue: "3600"
    summary: |-
      Maximum wait in seconds.
    groupName: Wait Condition Arguments
  - name: --updated
    defaultValue: "False"
    summary: |-
      Wait until updated with provisioningState at 'Succeeded'.
    groupName: Wait Condition Arguments
  - name: --workspace-name
    summary: |-
      String that represents a Workspace resource name.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_chaos_scenario_run
name: az chaos scenario run
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **chaos** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az chaos scenario run** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage scenario runs for a Chaos Studio scenario.
description: |-
  Scenario runs represent individual executions of a scenario configuration. Use 'start' to begin a new run, 'show' to inspect its status, and 'cancel' to stop a running execution.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Extension
directCommands:
- uid: az_chaos_scenario_run_cancel
  name: az chaos scenario run cancel
  summary: |-
    Cancel a running scenario run.
  description: |-
    Sends a cancellation request for a running scenario run. The cancellation
    is an LRO that is polled to completion by default.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos scenario run cancel --name --run-id
                                 --resource-group
                                 --scenario-name
                                 --workspace-name
                                 [--acquire-policy-token]
                                 [--change-reference]
                                 [--no-wait]
  examples:
  - summary: |-
      Cancel a scenario run
    syntax: az chaos scenario run cancel --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --run-id 12345678-1234-1234-1234-123456789012
  - summary: |-
      Cancel without waiting for confirmation
    syntax: az chaos scenario run cancel --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --run-id 12345678-1234-1234-1234-123456789012 --no-wait
  requiredParameters:
  - isRequired: true
    name: --name --run-id -n
    summary: |-
      GUID of the scenario run to cancel.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --scenario-name
    summary: |-
      Name of the parent scenario.
  - isRequired: true
    name: --workspace-name
    summary: |-
      Name of the parent Chaos Studio workspace.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

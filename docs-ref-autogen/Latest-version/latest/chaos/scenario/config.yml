- uid: az_chaos_scenario_config_validate
  name: az chaos scenario config validate
  summary: |-
    Validate a scenario configuration.
  description: |-
    Submits a validation request for a scenario configuration and, by default,
    waits for the validation to complete and auto-fetches the validation result.

    With --no-wait, the command submits the validation and returns immediately.
    Use 'az chaos scenario config show-validation' to retrieve the result
    once the operation completes.

    For non-custom (catalog) scenarios, the workspace must be evaluated before
    validation can succeed. If the workspace has not been evaluated, the command
    will fail with a hint to run 'az chaos workspace refresh-recommendation'.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos scenario config validate --name
                                      --resource-group
                                      --scenario-name
                                      --workspace-name
                                      [--acquire-policy-token]
                                      [--change-reference]
                                      [--no-wait]
  examples:
  - summary: |-
      Validate a scenario configuration and display results
    syntax: az chaos scenario config validate --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --name zone1
  - summary: |-
      Submit validation without waiting (use 'show-validation' to fetch the result later)
    syntax: az chaos scenario config validate --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --name zone1 --no-wait
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the scenario configuration.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --scenario-name
    summary: |-
      Name of the parent scenario.
  - isRequired: true
    name: --workspace-name
    summary: |-
      Name of the parent Chaos Studio workspace.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

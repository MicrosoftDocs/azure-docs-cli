### YamlMime:AzureCLIGroup
uid: az_chaos_scenario_config
name: az chaos scenario config
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **chaos** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az chaos scenario config** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage scenario configurations for a Chaos Studio scenario.
description: |-
  Scenario configurations define the steps, branches, and fault parameters for a chaos experiment run. Use 'validate' to check a configuration before execution and 'fix-permissions' to grant the required RBAC roles.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Extension
directCommands:
- uid: az_chaos_scenario_config_create
  name: az chaos scenario config create
  summary: |-
    Create a scenario definition.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos scenario config create --name --scenario-configuration-name
                                    --resource-group
                                    --scenario-name
                                    --workspace-name
                                    [--acquire-policy-token]
                                    [--change-reference]
                                    [--exclusions]
                                    [--filters]
                                    [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                    [--parameters]
                                    [--scenario-id]
  examples:
  - summary: |-
      Create or update a scenario configuration with physical zone targeting.
    syntax: az chaos scenario config create --resource-group exampleRG --workspace-name exampleWorkspace --scenario-name ZoneDown-1.0 --name my-config --exclusions "{resources:[/subscriptions/6b052e15-03d3-4f17-b2e1-be7f07588291/resourceGroups/exampleRG/providers/Microsoft.Compute/virtualMachines/protectedVM]}" --parameters "[{key:duration,value:PT10M}]" --filters "{locations:[westus2],physical-zones:[westus2-az1]}"
  - summary: |-
      Create or update a scenario configuration with availability zone targeting.
    syntax: az chaos scenario config create --resource-group exampleRG --workspace-name exampleWorkspace --scenario-name ZoneDown-1.0 --name my-config --filters "{locations:[eastus],zones:[1]}" --parameters "[{key:duration,value:PT10M}]"
  requiredParameters:
  - isRequired: true
    name: --name --scenario-configuration-name -n
    summary: |-
      Name of the scenario definition.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --scenario-name
    summary: |-
      Name of the scenario.
  - isRequired: true
    name: --workspace-name
    summary: |-
      String that represents a Workspace resource name.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --exclusions
    summary: |-
      Exclusion criteria for protecting resources from fault injection.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --filters
    summary: |-
      Filter criteria used to constrain which discovered resources participate in fault injection.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --parameters
    summary: |-
      Runtime parameter values for the scenario. Keys must match parameter names defined in the scenario.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --scenario-id
    summary: |-
      Resource ID of the scenario this configuration applies to.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

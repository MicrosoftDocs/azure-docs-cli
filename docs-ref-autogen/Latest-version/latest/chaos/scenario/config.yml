- uid: az_chaos_scenario_config_show-permission-fix
  name: az chaos scenario config show-permission-fix
  summary: |-
    Get the latest permission-fix result for a scenario configuration.
  description: |-
    Retrieves the most recent permission-fix result. This is a read-only GET —
    it does NOT trigger a new fix. The response body carries
    'properties.whatIfMode' indicating whether the latest fix was a what-if
    dry run or an actual fix; the singleton returns whichever was most recently
    submitted. Use 'az chaos scenario config fix-permissions' to trigger a new
    fix (with optional --what-if for a server-side dry run).
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos scenario config show-permission-fix --name
                                                 --resource-group
                                                 --scenario-name
                                                 --workspace-name
                                                 [--acquire-policy-token]
                                                 [--change-reference]
  examples:
  - summary: |-
      Show the latest permission-fix result
    syntax: az chaos scenario config show-permission-fix --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --name zone1
  - summary: |-
      Show the latest permission-fix result with JSON output
    syntax: az chaos scenario config show-permission-fix --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --name zone1 --output json
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the scenario configuration.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --scenario-name
    summary: |-
      Name of the parent scenario.
  - isRequired: true
    name: --workspace-name
    summary: |-
      Name of the parent Chaos Studio workspace.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.

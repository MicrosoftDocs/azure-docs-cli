- uid: az_chaos_scenario_config_fix-permissions
  name: az chaos scenario config fix-permissions
  summary: |-
    Fix RBAC permissions for a scenario configuration.
  description: |-
    Assigns the RBAC roles required for the configuration's targeted resources.
    The operation runs its own internal validation before fixing permissions,
    so a prior 'az chaos scenario config validate' call is NOT required.
    However, the workspace, scenario, and configuration must all exist;
    a 404 NotFound typically means one of these resources is missing or
    the workspace has not finished provisioning.
    Use --what-if for a server-side dry-run that returns the role assignments
    that would be made without actually creating them. Note that --what-if is
    server-evaluated (not client-only like PowerShell's -WhatIf) and the
    response shape is the same PermissionsFix resource regardless of mode.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos scenario' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos scenario config fix-permissions --name
                                             --resource-group
                                             --scenario-name
                                             --workspace-name
                                             [--acquire-policy-token]
                                             [--change-reference]
                                             [--no-wait]
                                             [--what-if]
  examples:
  - summary: |-
      Fix permissions for a configuration
    syntax: az chaos scenario config fix-permissions --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --name zone1
  - summary: |-
      Preview what permissions would be assigned (what-if mode)
    syntax: az chaos scenario config fix-permissions --workspace-name MyWorkspace --resource-group MyRG --scenario-name ZoneDown-1.0 --name zone1 --what-if
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the scenario configuration.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --scenario-name
    summary: |-
      Name of the parent scenario.
  - isRequired: true
    name: --workspace-name
    summary: |-
      Name of the parent Chaos Studio workspace.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --what-if
    defaultValue: "False"
    summary: |-
      Submit a server-side dry run that reports the role assignments that would be made, without actually creating them.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_chaos_discovered-resource
name: az chaos discovered-resource
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **chaos** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az chaos discovered-resource** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Browse discovered resources in a Chaos Studio workspace.
description: |-
  Discovered resources are populated by workspace discovery scans (triggered via 'az chaos workspace refresh-recommendation'). Use 'list' to see all discovered resources and 'show' to inspect a specific one.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Extension
directCommands:
- uid: az_chaos_discovered-resource_list
  name: az chaos discovered-resource list
  summary: |-
    List a list of discovered resources for a workspace.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos discovered-resource' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos discovered-resource list --resource-group
                                      --workspace-name
                                      [--max-items]
                                      [--next-token]
  examples:
  - summary: |-
      List discovered resources for a workspace.
    syntax: az chaos discovered-resource list --resource-group exampleRG --workspace-name exampleWorkspace
  requiredParameters:
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --workspace-name
    summary: |-
      String that represents a Workspace resource name.
  optionalParameters:
  - name: --max-items
    summary: |-
      Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
    groupName: Pagination Arguments
  - name: --next-token
    summary: |-
      Token to specify where to start paginating. This is the token value from a previously truncated response.
    groupName: Pagination Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_chaos_discovered-resource_show
  name: az chaos discovered-resource show
  summary: |-
    Get a discovered resource.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az chaos discovered-resource' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az chaos discovered-resource show [--discovered-resource-name --name]
                                      [--ids]
                                      [--resource-group]
                                      [--subscription]
                                      [--workspace-name]
  examples:
  - summary: |-
      Get a discovered resource.
    syntax: az chaos discovered-resource show --resource-group exampleRG --workspace-name exampleWorkspace --discovered-resource-name a1b2c3d4-e5f6-7890-abcd-ef1234567890
  optionalParameters:
  - name: --discovered-resource-name --name -n
    summary: |-
      Name of the discovered resource.
    groupName: Resource Id Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --workspace-name
    summary: |-
      String that represents a Workspace resource name.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_chaos_discovered-resource_list
- az_chaos_discovered-resource_show
metadata:
  description: Discovered resources are populated by workspace discovery scans (triggered via 'az chaos workspace refresh-recommendation'). Use 'list' to see all discovered resources and 'show' to inspect a specific one.

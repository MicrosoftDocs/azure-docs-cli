- uid: az_chaos_workspace_show-discovery
  name: az chaos workspace show-discovery
  summary: |-
    Get the latest resource-discovery result for a workspace.
  description: |-
    Retrieves the latest workspace-scope resource-discovery operation result.
    Returns the discovery operation's state (in-progress, succeeded, failed)
    and any failure details. This is a read-only GET — it does NOT trigger
    a new discovery. Use 'az chaos workspace refresh-recommendation' to
    trigger a new discovery scan.
  status: GA
  sourceType: Extension
  syntax: >-
    az chaos workspace show-discovery --name
                                      --resource-group
                                      [--acquire-policy-token]
                                      [--change-reference]
  examples:
  - summary: |-
      Show the latest discovery result
    syntax: az chaos workspace show-discovery --name MyWorkspace --resource-group MyRG
  - summary: |-
      Show discovery result with JSON output
    syntax: az chaos workspace show-discovery --name MyWorkspace --resource-group MyRG --output json
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the Chaos Studio workspace.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_chaos_workspace_show-evaluation
  name: az chaos workspace show-evaluation
  summary: |-
    Get the latest scenario-evaluation result for a workspace.
  description: |-
    Retrieves the latest workspace scenario-evaluation operation result.
    Returns the evaluation state — useful for checking whether the workspace
    has been evaluated (a prerequisite for 'scenario config validate' and
    'scenario run start' on catalog scenarios). This is a read-only GET — it
    does NOT trigger a new evaluation. Use
    'az chaos workspace refresh-recommendation' to trigger evaluation.
  status: GA
  sourceType: Extension
  syntax: >-
    az chaos workspace show-evaluation --name
                                       --resource-group
                                       [--acquire-policy-token]
                                       [--change-reference]
  examples:
  - summary: |-
      Show the latest evaluation result
    syntax: az chaos workspace show-evaluation --name MyWorkspace --resource-group MyRG
  - summary: |-
      Show evaluation result with JSON output
    syntax: az chaos workspace show-evaluation --name MyWorkspace --resource-group MyRG --output json
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the Chaos Studio workspace.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-

### YamlMime:AzureCLIGroup
uid: az_acr_export-pipeline
name: az acr export-pipeline
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **acrtransfer** extension for the Azure CLI (version 2.0.67 or higher). The extension will automatically install the first time you run an **az acr export-pipeline** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage ACR export pipelines.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Extension
directCommands:
- uid: az_acr_export-pipeline_create
  name: az acr export-pipeline create
  summary: |-
    Create an export pipeline.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'acr export-pipeline' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az acr export-pipeline create --name
                                  --registry
                                  --resource-group
                                  --storage-access-mode
                                  --storage-container-uri
                                  [--acquire-policy-token]
                                  [--assign-identity]
                                  [--change-reference]
                                  [--options]
                                  [--secret-uri]
  examples:
  - summary: |-
      Create an export pipeline with SAS token authentication.
    syntax: az acr export-pipeline create --resource-group $MyRG --registry $MyReg --name $MyPipeline --storage-access-mode SasToken --secret-uri https://$MyKV.vault.azure.net/secrets/$MySecret --storage-container-uri https://$MyStorage.blob.core.windows.net/$MyContainer
  - summary: |-
      Create an export pipeline with system-assigned managed identity (automatic provisioning).
    syntax: az acr export-pipeline create --resource-group $MyRG --registry $MyReg --name $MyPipeline --storage-access-mode ManagedIdentity --storage-container-uri https://$MyStorage.blob.core.windows.net/$MyContainer
  - summary: |-
      Create an export pipeline with user-assigned managed identity and all available options.
    syntax: az acr export-pipeline create --resource-group $MyRG --registry $MyReg --name $MyPipeline --storage-access-mode ManagedIdentity --storage-container-uri https://$MyStorage.blob.core.windows.net/$MyContainer --options OverwriteBlobs ContinueOnErrors --assign-identity /subscriptions/$MySubID/resourceGroups/$MyRG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/$MyIdentity
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the export pipeline.
  - isRequired: true
    name: --registry -r
    summary: |-
      Name of registry.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --storage-access-mode -m
    summary: |-
      Storage account access mode. Allowed values: ManagedIdentity, SasToken.
  - isRequired: true
    name: --storage-container-uri -c
    summary: |-
      Storage account container URI of the source or target storage account container of the form https://$MyStorageAccount.blob.core.windows.net/$MyContainer. Note that the URI may be different outside of AzureCloud.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --assign-identity -i
    summary: |-
      Managed identity for the pipeline. Provide a user-assigned identity resource ID of the form /subscriptions/$MySubID/resourceGroups/$MyRG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/$MyIdentity. If not specified, a system-assigned managed identity will be automatically provisioned.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --options -z
    summary: |-
      Space-separated list of options. May only container the following options: OverwriteBlobs,ContinueOnErrors.
  - name: --secret-uri -s
    summary: |-
      Keyvault secret URI containing a valid SAS token to the associated storage account of the form https://$MyKeyvault.vault.azure.net/secrets/$MySecret. Note that the URI may be different outside of AzureCloud. Required when --storage-access-mode is SasToken.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

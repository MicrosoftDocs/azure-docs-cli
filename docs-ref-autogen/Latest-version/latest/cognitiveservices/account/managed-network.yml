### YamlMime:AzureCLIGroup
uid: az_cognitiveservices_account_managed-network
name: az cognitiveservices account managed-network
summary: |-
  Manage the managed network settings for an Azure Cognitive Services account.
description: |-
  Managed network settings control the network isolation mode and firewall configuration for AI Foundry accounts.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Core
directCommands:
- uid: az_cognitiveservices_account_managed-network_create
  name: az cognitiveservices account managed-network create
  summary: |-
    Create a managed network for an Azure Cognitive Services account.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'cognitiveservices account managed-network' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/cognitiveservices/_help.py
  syntax: >-
    az cognitiveservices account managed-network create --managed-network {allow_internet_outbound, allow_only_approved_outbound}
                                                        --name
                                                        --resource-group
                                                        [--acquire-policy-token]
                                                        [--change-reference]
                                                        [--firewall-sku {Basic, Standard}]
                                                        [--managed-network-name]
  examples:
  - summary: |-
      Create a managed network with internet outbound access.
    syntax: az cognitiveservices account managed-network create --name my-account --resource-group my-resource-group --managed-network allow_internet_outbound
  - summary: |-
      Create a managed network with approved outbound only and a standard firewall.
    syntax: az cognitiveservices account managed-network create --name my-account --resource-group my-resource-group --managed-network allow_only_approved_outbound --firewall-sku Standard
  requiredParameters:
  - isRequired: true
    name: --managed-network
    acceptedValues: allow_internet_outbound, allow_only_approved_outbound
    summary: |-
      Isolation mode for the managed network.
  - isRequired: true
    name: --name -n
    summary: |-
      Cognitive service account name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --firewall-sku
    acceptedValues: Basic, Standard
    summary: |-
      Firewall SKU for the managed network.
  - name: --managed-network-name
    defaultValue: default
    summary: |-
      Name of the managed network. Only "default" is supported.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

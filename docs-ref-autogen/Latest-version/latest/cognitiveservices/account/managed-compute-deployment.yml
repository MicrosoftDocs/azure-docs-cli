- uid: az_cognitiveservices_account_managed-compute-deployment_update
  name: az cognitiveservices account managed-compute-deployment update
  summary: |-
    Update a managed compute deployment for Azure Cognitive Services account.
  description: |-
    Only SKU (name/capacity) and tags can be updated. Model and accelerator type are immutable after creation.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'cognitiveservices account managed-compute-deployment' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/cognitiveservices/_help.py
  syntax: >-
    az cognitiveservices account managed-compute-deployment update --name
                                                                   --resource-group
                                                                   [--acquire-policy-token]
                                                                   [--capacity --sku-capacity]
                                                                   [--change-reference]
                                                                   [--deployment-name]
                                                                   [--sku --sku-name]
                                                                   [--tags]
  examples:
  - summary: |-
      Update SKU capacity of a managed compute deployment.
    syntax: az cognitiveservices account managed-compute-deployment update -g myResourceGroup -n myAccount --deployment-name gpt-oss-120b-gpu --sku-capacity 2
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Cognitive service account name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --capacity --sku-capacity
    summary: |-
      Capacity value of the Sku of Cognitive Services account/deployment.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --deployment-name
    summary: |-
      Managed compute deployment name.
  - name: --sku --sku-name
    summary: |-
      Name of the Sku of Cognitive Services account/deployment.
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  globalParameters:

### YamlMime:AzureCLIGroup
uid: az_cognitiveservices_account_managed-compute-deployment
name: az cognitiveservices account managed-compute-deployment
summary: |-
  Manage managed compute deployments for Azure Cognitive Services accounts.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Core
directCommands:
- uid: az_cognitiveservices_account_managed-compute-deployment_create
  name: az cognitiveservices account managed-compute-deployment create
  summary: |-
    Create a managed compute deployment for Azure Cognitive Services account.
  description: |-
    Create a GPU-backed managed compute deployment associated with a Cognitive Services account.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'cognitiveservices account managed-compute-deployment' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/cognitiveservices/_help.py
  syntax: >-
    az cognitiveservices account managed-compute-deployment create --model
                                                                   --name
                                                                   --resource-group
                                                                   [--accelerator-type]
                                                                   [--acquire-policy-token]
                                                                   [--capacity --sku-capacity]
                                                                   [--change-reference]
                                                                   [--deployment-name]
                                                                   [--deployment-template]
                                                                   [--sku --sku-name]
                                                                   [--tags]
                                                                   [--version-upgrade-option]
  examples:
  - summary: |-
      Create a managed compute deployment.
    syntax: az cognitiveservices account managed-compute-deployment create -g myResourceGroup -n myAccount --deployment-name gpt-oss-120b-gpu --model "azureml://registries/azureml-openai-oss/models/gpt-oss-120b/versions/4" --deployment-template "azureml://registries/azureml-openai-oss/deploymenttemplates/gpt-oss-120b-short-context/versions/1" --accelerator-type H100_80GB --sku-name GlobalManagedCompute --sku-capacity 1 --tags environment=production team=nlp
  requiredParameters:
  - isRequired: true
    name: --model
    summary: |-
      AzureML registry model URI (e.g., azureml://registries/{registry}/models/{model}/versions/{version}).
  - isRequired: true
    name: --name -n
    summary: |-
      Cognitive service account name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --accelerator-type
    summary: |-
      GPU accelerator type (e.g., H100_80GB).
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --capacity --sku-capacity
    summary: |-
      Capacity value of the Sku of Cognitive Services account/deployment.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --deployment-name
    summary: |-
      Managed compute deployment name.
  - name: --deployment-template
    summary: |-
      AzureML registry deployment template URI (e.g., azureml://registries/{registry}/deploymenttemplates/{template}/versions/{version}).
  - name: --sku --sku-name
    summary: |-
      Name of the Sku of Cognitive Services account/deployment.
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  - name: --version-upgrade-option
    summary: |-
      Version upgrade policy. Allowed values: OnceNewDefaultVersionAvailable, OnceCurrentVersionExpired, NoAutoUpgrade.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

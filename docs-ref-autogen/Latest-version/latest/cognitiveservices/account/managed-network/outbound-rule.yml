- uid: az_cognitiveservices_account_managed-network_outbound-rule_set
  name: az cognitiveservices account managed-network outbound-rule set
  summary: |-
    Create or update a single outbound rule for the managed network.
  description: |-
    Creates or updates an outbound rule of the specified type (FQDN, PrivateEndpoint, or ServiceTag).
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'cognitiveservices account managed-network outbound-rule' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/cognitiveservices/_help.py
  syntax: >-
    az cognitiveservices account managed-network outbound-rule set --name
                                                                   --resource-group
                                                                   --rule
                                                                   --type {fqdn, privateendpoint, servicetag}
                                                                   [--acquire-policy-token]
                                                                   [--category {Dependency, Recommended, Required, UserDefined}]
                                                                   [--change-reference]
                                                                   [--destination]
                                                                   [--managed-network-name]
                                                                   [--subresource-target]
  examples:
  - summary: |-
      Create an FQDN outbound rule.
    syntax: az cognitiveservices account managed-network outbound-rule set --name my-account --resource-group my-resource-group --rule my-fqdn-rule --type fqdn --destination "*.example.com"
  - summary: |-
      Create a ServiceTag outbound rule.
    syntax: "az cognitiveservices account managed-network outbound-rule set --name my-account --resource-group my-resource-group --rule my-servicetag-rule --type servicetag --category UserDefined --destination '{\"serviceTag\": \"Storage\", \"protocol\": \"TCP\", \"portRanges\": \"443\"}'"
  - summary: |-
      Create a PrivateEndpoint outbound rule.
    syntax: az cognitiveservices account managed-network outbound-rule set --name my-account --resource-group my-resource-group --rule my-pe-rule --type privateendpoint --destination /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/my-rg/providers/Microsoft.Storage/storageAccounts/mystorageaccount --subresource-target blob
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Cognitive service account name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --rule
    summary: |-
      Name of the outbound rule.
  - isRequired: true
    name: --type
    acceptedValues: fqdn, privateendpoint, servicetag
    summary: |-
      Type of the outbound rule.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --category
    acceptedValues: Dependency, Recommended, Required, UserDefined
    summary: |-
      Category of the outbound rule.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --destination
    summary: |-
      Destination for the outbound rule. For FQDN rules, this is the FQDN string. For PrivateEndpoint rules, this is the service resource ID. For ServiceTag rules, provide a JSON string.
  - name: --managed-network-name
    defaultValue: default
    summary: |-
      Name of the managed network. Only "default" is supported.
  - name: --subresource-target
    summary: |-
      Subresource target for PrivateEndpoint outbound rules (e.g. blob, table, queue, file, web, dfs).
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

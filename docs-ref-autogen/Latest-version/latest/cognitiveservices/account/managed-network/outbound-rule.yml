### YamlMime:AzureCLIGroup
uid: az_cognitiveservices_account_managed-network_outbound-rule
name: az cognitiveservices account managed-network outbound-rule
summary: |-
  Manage outbound rules for the managed network of an Azure Cognitive Services account.
description: |-
  Outbound rules control egress traffic from the managed network. Rules can be of type FQDN, PrivateEndpoint, or ServiceTag.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'cognitiveservices account managed-network' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Core
directCommands:
- uid: az_cognitiveservices_account_managed-network_outbound-rule_bulk-set
  name: az cognitiveservices account managed-network outbound-rule bulk-set
  summary: |-
    Bulk create or update outbound rules from a YAML or JSON file.
  description: |-
    Reads outbound rules from a YAML or JSON file and creates or updates them in bulk.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'cognitiveservices account managed-network outbound-rule' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/cognitiveservices/_help.py
  syntax: >-
    az cognitiveservices account managed-network outbound-rule bulk-set --file
                                                                        --name
                                                                        --resource-group
                                                                        [--acquire-policy-token]
                                                                        [--change-reference]
                                                                        [--managed-network-name]
  examples:
  - summary: |-
      Bulk set outbound rules from a YAML file.
    syntax: az cognitiveservices account managed-network outbound-rule bulk-set --name my-account --resource-group my-resource-group --file rules.yaml
  requiredParameters:
  - isRequired: true
    name: --file
    summary: |-
      Path to a YAML or JSON file containing outbound rules definition.
  - isRequired: true
    name: --name -n
    summary: |-
      Cognitive service account name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --managed-network-name
    defaultValue: default
    summary: |-
      Name of the managed network. Only "default" is supported.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

    az fleet clustermeshprofile create --fleet-name
                                       --name
                                       --resource-group
                                       [--acquire-policy-token]
                                       [--change-reference]
                                       [--member-selector --selector]
                                       [--no-wait]
  examples:
  - summary: |-
      Create a cluster mesh profile with a label selector.
    syntax: az fleet clustermeshprofile create -g MyFleetResourceGroup -f MyFleetName -n MyClusterMeshProfile --selector "env=production"

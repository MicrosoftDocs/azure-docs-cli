- uid: az_fleet_clustermeshprofile_list-members
  name: az fleet clustermeshprofile list-members
  summary: |-
    List fleet members for a cluster mesh profile.
  description: |-
    Without --selector, lists members currently applied to the mesh profile.
    With --selector, lists members that would match the profile's label selector (i.e. candidates for the next apply).
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'fleet clustermeshprofile' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az fleet clustermeshprofile list-members --fleet-name
                                             --name
                                             --resource-group
                                             [--acquire-policy-token]
                                             [--change-reference]
                                             [--selector]
  examples:
  - summary: |-
      List members currently applied to the mesh.
    syntax: az fleet clustermeshprofile list-members -g MyFleetResourceGroup -f MyFleetName -n MyClusterMeshProfile
  - summary: |-
      List members that would match the profile's selector.
    syntax: az fleet clustermeshprofile list-members -g MyFleetResourceGroup -f MyFleetName -n MyClusterMeshProfile --selector
  requiredParameters:
  - isRequired: true
    name: --fleet-name -f
    summary: |-
      Specify the fleet name.
  - isRequired: true
    name: --name -n
    summary: |-
      Specify name for the cluster mesh profile.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --selector
    defaultValue: "False"
    summary: |-
      Filter by the profile's label selector (members that would match after apply) instead of currently applied members.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_horizondb_firewall-rule
name: az horizondb firewall-rule
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **horizondb** extension for the Azure CLI (version 2.17.1 or higher). The extension will automatically install the first time you run an **az horizondb firewall-rule** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage firewall rules for an Azure HorizonDB cluster.
description: |-
  Firewall rules control public access to a HorizonDB cluster and are applied to the cluster's default pool. Use these commands to allow inbound connections from specific IP addresses or ranges.
status: GA
sourceType: Extension
directCommands:
- uid: az_horizondb_firewall-rule_create
  name: az horizondb firewall-rule create
  summary: |-
    Create a firewall rule for an Azure HorizonDB cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az horizondb firewall-rule create --cluster-name
                                      --resource-group
                                      [--acquire-policy-token]
                                      [--change-reference]
                                      [--description]
                                      [--end-ip-address]
                                      [--name]
                                      [--start-ip-address]
  examples:
  - summary: |-
      Create a firewall rule allowing a single IP address.
    syntax: az horizondb firewall-rule create --resource-group exampleresourcegroup --cluster-name examplecluster --name allowclientip --start-ip-address 12.12.12.12
  - summary: |-
      Create a firewall rule allowing a range of IP addresses.
    syntax: az horizondb firewall-rule create --resource-group exampleresourcegroup --cluster-name examplecluster --name allowrange --start-ip-address 12.12.12.0 --end-ip-address 12.12.12.255
  - summary: |-
      Create a firewall rule allowing access from all Azure-internal IP addresses.
    syntax: az horizondb firewall-rule create --resource-group exampleresourcegroup --cluster-name examplecluster --name allowazure --start-ip-address 0.0.0.0 --end-ip-address 0.0.0.0
  requiredParameters:
  - isRequired: true
    name: --cluster-name -c
    summary: |-
      Name of the HorizonDB cluster.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      The description of the firewall rule.
  - name: --end-ip-address
    summary: |-
      The end IP address of the firewall rule (IPv4). Must be dotted-quad format. Use 0.0.0.0 to represent all Azure-internal IP addresses.
  - name: --name -n
    summary: |-
      The name of the firewall rule.
  - name: --start-ip-address
    summary: |-
      The start IP address of the firewall rule (IPv4). Must be dotted-quad format. Use 0.0.0.0 to represent all Azure-internal IP addresses.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

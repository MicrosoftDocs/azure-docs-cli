### YamlMime:AzureCLIGroup
uid: az_horizondb_private-endpoint-connection
name: az horizondb private-endpoint-connection
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **horizondb** extension for the Azure CLI (version 2.17.1 or higher). The extension will automatically install the first time you run an **az horizondb private-endpoint-connection** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage HorizonDB private endpoint connections.
status: GA
sourceType: Extension
directCommands:
- uid: az_horizondb_private-endpoint-connection_approve
  name: az horizondb private-endpoint-connection approve
  summary: |-
    Approve a HorizonDB private endpoint connection.
  status: GA
  sourceType: Extension
  syntax: >-
    az horizondb private-endpoint-connection approve --description
                                                     [--acquire-policy-token]
                                                     [--change-reference]
                                                     [--cluster-name]
                                                     [--id]
                                                     [--name]
                                                     [--resource-group]
  examples:
  - summary: |-
      Approve a private endpoint connection by cluster and connection name.
    syntax: az horizondb private-endpoint-connection approve --resource-group exampleresourcegroup --cluster-name examplecluster --name exampleconnection --description "Approved"
  - summary: |-
      Approve a private endpoint connection by resource ID.
    syntax: az horizondb private-endpoint-connection approve --id /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.HorizonDb/clusters/{clusterName}/privateEndpointConnections/{connectionName} --description "Approved"
  requiredParameters:
  - isRequired: true
    name: --description -d
    summary: |-
      Comments for the approval or rejection.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --cluster-name -c
    summary: |-
      Name of the cluster. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
  - name: --id
    summary: |-
      The resource ID of the private endpoint connection associated with the HorizonDB cluster. If specified --cluster-name/-c and --name/-n, this should be omitted.
  - name: --name -n
    summary: |-
      The name of the private endpoint connection associated with the HorizonDB cluster. Required if --id is not specified.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

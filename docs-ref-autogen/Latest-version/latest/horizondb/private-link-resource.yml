### YamlMime:AzureCLIGroup
uid: az_horizondb_private-link-resource
name: az horizondb private-link-resource
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **horizondb** extension for the Azure CLI (version 2.17.1 or higher). The extension will automatically install the first time you run an **az horizondb private-link-resource** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage HorizonDB private link resources.
status: GA
sourceType: Extension
directCommands:
- uid: az_horizondb_private-link-resource_list
  name: az horizondb private-link-resource list
  summary: |-
    List private link resources for a HorizonDB cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az horizondb private-link-resource list --cluster-name
                                            --resource-group
  examples:
  - summary: |-
      List private link resources for a HorizonDB cluster.
    syntax: az horizondb private-link-resource list --resource-group exampleresourcegroup --cluster-name examplecluster
  requiredParameters:
  - isRequired: true
    name: --cluster-name -c
    summary: |-
      Name of the cluster. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_horizondb_private-link-resource_show
  name: az horizondb private-link-resource show
  summary: |-
    Show details of a HorizonDB private link resource.
  status: GA
  sourceType: Extension
  syntax: >-
    az horizondb private-link-resource show --cluster-name
                                            --group-name
                                            --resource-group
  examples:
  - summary: |-
      Show a private link resource by group name.
    syntax: az horizondb private-link-resource show --resource-group exampleresourcegroup --cluster-name examplecluster --group-name DefaultPool
  requiredParameters:
  - isRequired: true
    name: --cluster-name -c
    summary: |-
      Name of the cluster. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
  - isRequired: true
    name: --group-name
    summary: |-
      The private link resource group name. For HorizonDB this is the pool name, for example DefaultPool.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_horizondb_private-link-resource_list
- az_horizondb_private-link-resource_show
metadata:
  description: Manage HorizonDB private link resources.

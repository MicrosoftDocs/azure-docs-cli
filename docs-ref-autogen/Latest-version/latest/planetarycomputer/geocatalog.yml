### YamlMime:AzureCLIGroup
uid: az_planetarycomputer_geocatalog
name: az planetarycomputer geocatalog
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **planetarycomputer** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az planetarycomputer geocatalog** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage GeoCatalog.
status: GA
sourceType: Extension
directCommands:
- uid: az_planetarycomputer_geocatalog_create
  name: az planetarycomputer geocatalog create
  summary: |-
    Create a GeoCatalog.
  status: GA
  sourceType: Extension
  syntax: >-
    az planetarycomputer geocatalog create --catalog-name --name
                                           --resource-group
                                           [--acquire-policy-token]
                                           [--auto-generated-domain-name-label-scope --scope {NoReuse, ResourceGroupReuse, SubscriptionReuse, TenantReuse}]
                                           [--change-reference]
                                           [--location]
                                           [--mi-user-assigned --user-assigned]
                                           [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                           [--tags]
                                           [--tier {Basic}]
  examples:
  - summary: |-
      Create a GeoCatalog
    syntax: az planetarycomputer geocatalog create --name MyGeoCatalog --resource-group MyResourceGroup --location westus2
  requiredParameters:
  - isRequired: true
    name: --catalog-name --name -n
    summary: |-
      The name of the catalog.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --auto-generated-domain-name-label-scope --scope
    defaultValue: TenantReuse
    acceptedValues: NoReuse, ResourceGroupReuse, SubscriptionReuse, TenantReuse
    summary: |-
      The scope of the auto-generated domain name label. If not provided, defaults to TenantReuse.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --location -l
    summary: |-
      The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    groupName: Resource Arguments
  - name: --mi-user-assigned --user-assigned
    summary: |-
      Set the user managed identities.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Identity Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource Arguments
  - name: --tier
    defaultValue: Basic
    acceptedValues: Basic
    summary: |-
      Tier of the catalog. This cannot be changed after the catalog is created. If not provided, defaults to Basic.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_planetarycomputer_geocatalog_identity
name: az planetarycomputer geocatalog identity
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **planetarycomputer** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az planetarycomputer geocatalog identity** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Identity.
status: GA
sourceType: Extension
directCommands:
- uid: az_planetarycomputer_geocatalog_identity_assign
  name: az planetarycomputer geocatalog identity assign
  summary: |-
    Assign user managed identities.
  status: GA
  sourceType: Extension
  syntax: >-
    az planetarycomputer geocatalog identity assign --catalog-name --name
                                                    --resource-group
                                                    [--acquire-policy-token]
                                                    [--change-reference]
                                                    [--mi-user-assigned --user-assigned]
                                                    [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
  examples:
  - summary: |-
      Assign a user-assigned managed identity
    syntax: az planetarycomputer geocatalog identity assign --name MyGeoCatalog --resource-group MyResourceGroup --user-assigned "{'/subscriptions/sub-id/resourceGroups/rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/my-identity':{}}"
  requiredParameters:
  - isRequired: true
    name: --catalog-name --name -n
    summary: |-
      The name of the catalog.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --mi-user-assigned --user-assigned
    summary: |-
      Set the user managed identities.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource.identity Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

- uid: az_site_key_download
  name: az site key download
  summary: |-
    Download the token for a site key.
  description: |-
    Downloads the site key token and saves it to a file. If --file is not specified,
    the token is saved to `<key-name>.SiteKey` in the current directory.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az site key' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az site key download --name --site-key-name
                         --resource-group
                         [--acquire-policy-token]
                         [--change-reference]
                         [--file]
  examples:
  - summary: |-
      Download a site key token
    syntax: az site key download --name TestSiteKeyName --resource-group TestRGName
  - summary: |-
      Download a site key token to a specific file
    syntax: az site key download --name TestSiteKeyName --resource-group TestRGName --file ./my-token.SiteKey
  requiredParameters:
  - isRequired: true
    name: --name --site-key-name -n
    summary: |-
      Name of the SiteKey.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of the resource group.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --file -f
    summary: |-
      Output file path for the downloaded token. Defaults to `<key-name>.SiteKey` in the current directory.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

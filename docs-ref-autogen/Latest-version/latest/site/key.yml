### YamlMime:AzureCLIGroup
uid: az_site_key
name: az site key
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **site** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az site key** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Site Keys for Azure Edge sites.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Extension
directCommands:
- uid: az_site_key_create
  name: az site key create
  summary: |-
    Create a site key linked to a site.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az site key' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az site key create --name --site-key-name
                       --resource-group
                       --site-name
                       [--acquire-policy-token]
                       [--change-reference]
                       [--token-expiry-date]
  examples:
  - summary: |-
      Create a site key at resource group scope
    syntax: az site key create --name TestSiteKeyName --resource-group TestRGName --site-name TestSiteName
  - summary: |-
      Create a site key with custom token expiry
    syntax: az site key create --name TestSiteKeyName --resource-group TestRGName --site-name TestSiteName --token-expiry-date "2026-05-01T00:00:00Z"
  requiredParameters:
  - isRequired: true
    name: --name --site-key-name -n
    summary: |-
      Name of the SiteKey.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of the resource group.
  - isRequired: true
    name: --site-name
    summary: |-
      Name of the site to link this key to. Used to construct the site ARM resource ID.
    groupName: Properties Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --token-expiry-date
    summary: |-
      Token expiry date in ISO 8601 format (e.g., 2026-05-01T00:00:00Z). Defaults to 7 days from now.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

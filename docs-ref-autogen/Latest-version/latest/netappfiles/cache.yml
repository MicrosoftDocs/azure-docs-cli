- uid: az_netappfiles_cache_update
  name: az netappfiles cache update
  summary: |-
    Update the specified Cache within the Capacity Pool.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/netappfiles/_help.py
  syntax: >-
    az netappfiles cache update [--account-name]
                                [--acquire-policy-token]
                                [--add]
                                [--cache-name --name]
                                [--change-reference]
                                [--cifs-change-notifications --cifs-change-notify {Disabled, Enabled}]
                                [--export-policy-rules --rules]
                                [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                [--ids]
                                [--key-vault-private-endpoint-resource-id --kv-private-endpoint-id]
                                [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                [--pool-name]
                                [--protocol-types]
                                [--remove]
                                [--resource-group]
                                [--set]
                                [--size]
                                [--smb-access-based-enumeration --smb-access-enumeration {Disabled, Enabled}]
                                [--smb-encryption {Disabled, Enabled}]
                                [--smb-non-browsable {Disabled, Enabled}]
                                [--subscription]
                                [--tags]
                                [--throughput-mibps]
                                [--write-back {Disabled, Enabled}]
  examples:
  - summary: |-
      Caches_CreateOrUpdate
    syntax: az netappfiles cache update --resource-group myRG --account-name account1 --pool-name pool1 --cache-name cache1 --size 107374182400
  optionalParameters:
  - name: --account-name -a
    summary: |-
      The name of the NetApp account.
    groupName: Resource Id Arguments
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --cache-name --name -n
    summary: |-
      The name of the cache resource.
    groupName: Resource Id Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --cifs-change-notifications --cifs-change-notify
    acceptedValues: Disabled, Enabled
    summary: |-
      Flag indicating whether a CIFS change notification is enabled for the cache.
    groupName: Properties Arguments
  - name: --export-policy-rules --rules
    summary: |-
      Export policy rule  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: ExportPolicy Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --key-vault-private-endpoint-resource-id --kv-private-endpoint-id
    summary: |-
      The resource ID of private endpoint for KeyVault. It must reside in the same VNET as the volume. Only applicable if encryptionKeySource = 'Microsoft.KeyVault'.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --pool-name -p
    summary: |-
      The name of the capacity pool.
    groupName: Resource Id Arguments
  - name: --protocol-types
    summary: |-
      Set of supported protocol types, which include NFSv3, NFSv4 and SMB protocol  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  - name: --size
    summary: |-
      Maximum storage quota allowed for a file system in bytes. Valid values are in the range 50GiB to 1PiB. Values expressed in bytes as multiples of 1GiB.
    groupName: Properties Arguments
  - name: --smb-access-based-enumeration --smb-access-enumeration
    acceptedValues: Disabled, Enabled
    summary: |-
      Enables access-based enumeration share property for SMB Shares. Only applicable for SMB/DualProtocol volume.
    groupName: SmbSettings Arguments
  - name: --smb-encryption
    acceptedValues: Disabled, Enabled
    summary: |-
      Enables encryption for in-flight smb3 data. Only applicable for SMB/DualProtocol cache.
    groupName: SmbSettings Arguments
  - name: --smb-non-browsable
    acceptedValues: Disabled, Enabled
    summary: |-
      Enables non-browsable property for SMB Shares. Only applicable for SMB/DualProtocol volume.
    groupName: SmbSettings Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Body Arguments
  - name: --throughput-mibps
    summary: |-
      Maximum throughput in MiB/s that can be achieved by this cache volume and this will be accepted as input only for manual qosType cache.
    groupName: Properties Arguments
  - name: --write-back
    acceptedValues: Disabled, Enabled
    summary: |-
      Flag indicating whether writeback is enabled for the cache.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_netappfiles_cache_wait
  name: az netappfiles cache wait
  summary: |-
    Place the CLI in a waiting state until a condition is met.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/netappfiles/_help.py
  syntax: >-
    az netappfiles cache wait [--account-name]
                              [--acquire-policy-token]
                              [--cache-name --name]
                              [--change-reference]
                              [--created]
                              [--custom]
                              [--deleted]
                              [--exists]
                              [--ids]
                              [--interval]
                              [--pool-name]
                              [--resource-group]
                              [--subscription]
                              [--timeout]
                              [--updated]
  optionalParameters:
  - name: --account-name -a
    summary: |-
      The name of the NetApp account.
    groupName: Resource Id Arguments
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --cache-name --name -n
    summary: |-
      The name of the cache resource.
    groupName: Resource Id Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --created
    defaultValue: "False"
    summary: |-
      Wait until created with 'provisioningState' at 'Succeeded'.
    groupName: Wait Condition Arguments
  - name: --custom
    summary: |-
      Wait until the condition satisfies a custom JMESPath query. E.g. provisioningState!='InProgress', instanceView.statuses[?code=='PowerState/running'].
    groupName: Wait Condition Arguments
  - name: --deleted
    defaultValue: "False"
    summary: |-
      Wait until deleted.
    groupName: Wait Condition Arguments
  - name: --exists
    defaultValue: "False"
    summary: |-
      Wait until the resource exists.
    groupName: Wait Condition Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --interval
    defaultValue: "30"
    summary: |-
      Polling interval in seconds.
    groupName: Wait Condition Arguments
  - name: --pool-name -p
    summary: |-
      The name of the capacity pool.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --timeout
    defaultValue: "3600"
    summary: |-
      Maximum wait in seconds.
    groupName: Wait Condition Arguments
  - name: --updated
    defaultValue: "False"
    summary: |-
      Wait until updated with provisioningState at 'Succeeded'.
    groupName: Wait Condition Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

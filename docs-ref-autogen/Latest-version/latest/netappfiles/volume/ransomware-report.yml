### YamlMime:AzureCLIGroup
uid: az_netappfiles_volume_ransomware-report
name: az netappfiles volume ransomware-report
summary: |-
  Manage Advanced Ransomware(ARP) Reports.
status: GA
sourceType: Core
directCommands:
- uid: az_netappfiles_volume_ransomware-report_clear-suspect
  name: az netappfiles volume ransomware-report clear-suspect
  summary: |-
    Clear ransomware suspects for the given Advanced Ransomware Protection (ARP) report. You should evaluate the report to determine whether the activity is acceptable (false positive) or whether an attack seems malicious.ARP creates snapshots named Anti_ransomware_backup when it detects a potential ransomware threat. You can use one of these ARP snapshots or another snapshot of your volume to restore data",.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/netappfiles/_help.py
  syntax: >-
    az netappfiles volume ransomware-report clear-suspect --extensions
                                                          --resolution {FalsePositive, PotentialThreat}
                                                          [--account-name]
                                                          [--acquire-policy-token]
                                                          [--change-reference]
                                                          [--ids]
                                                          [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                                          [--pool-name]
                                                          [--ransomware-report-name]
                                                          [--resource-group]
                                                          [--subscription]
                                                          [--volume-name]
  examples:
  - summary: |-
      RansomwareReports_ClearSuspects
    syntax: az netappfiles volume ransomware-report clear-suspect --resource-group myRG --account-name account1 --pool-name pool1 --volume-name volume1 --ransomware-report-name ransomwareReport1 --resolution PotentialThreat --extensions "[.threat]"
  requiredParameters:
  - isRequired: true
    name: --extensions
    summary: |-
      List of file extensions resolved (PotentialThreat or FalsePositive)  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Body Arguments
  - isRequired: true
    name: --resolution
    acceptedValues: FalsePositive, PotentialThreat
    summary: |-
      ARP report suspect resolution.
    groupName: Body Arguments
  optionalParameters:
  - name: --account-name -a
    summary: |-
      The name of the NetApp account.
    groupName: Resource Id Arguments
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --pool-name -p
    summary: |-
      The name of the capacity pool.
    groupName: Resource Id Arguments
  - name: --ransomware-report-name
    summary: |-
      The name of the ransomware report.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --volume-name -v
    summary: |-
      The name of the volume.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_netappfiles_volume_ransomware-report_list
  name: az netappfiles volume ransomware-report list
  summary: |-
    List all ransomware reports for the volume.
  description: |-
    Returns a list of the Advanced Ransomware Protection (ARP) reports for the volume.
    ARP reports are created with a list of suspected files when it detects any combination of high data entropy, abnormal volume activity with data encryption, and unusual file extensions.
    ARP creates snapshots named Anti_ransomware_backup when it detects a potential ransomware threat. You can use one of these ARP snapshots or another snapshot of your volume to restore data".
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/netappfiles/_help.py
  syntax: >-
    az netappfiles volume ransomware-report list --account-name
                                                 --pool-name
                                                 --resource-group
                                                 --volume-name
                                                 [--max-items]
                                                 [--next-token]
  examples:
  - summary: |-
      RansomwareReports_List
    syntax: az netappfiles volume ransomware-report list --resource-group myRG --account-name account1 --pool-name pool1 --volume-name volume1
  requiredParameters:
  - isRequired: true
    name: --account-name -a
    summary: |-
      The name of the NetApp account.
  - isRequired: true
    name: --pool-name -p
    summary: |-
      The name of the capacity pool.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --volume-name -v
    summary: |-
      The name of the volume.
  optionalParameters:
  - name: --max-items
    summary: |-
      Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
    groupName: Pagination Arguments
  - name: --next-token
    summary: |-
      Token to specify where to start paginating. This is the token value from a previously truncated response.
    groupName: Pagination Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_netappfiles_volume_ransomware-report_show
  name: az netappfiles volume ransomware-report show
  summary: |-
    Get details of the specified ransomware report (ARP) `current` gets the latest active report if there is an active event.
  description: |-
    Get details of the specified ransomware report (ARP)ARP reports are created with a list of suspected files when it detects any combination of high data entropy, abnormal volume activity with data encryption, and unusual file extensions.ARP creates snapshots named Anti_ransomware_backup when it detects a potential ransomware threat. You can use one of these ARP snapshots or another snapshot of your volume to restore data.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/netappfiles/_help.py
  syntax: >-
    az netappfiles volume ransomware-report show [--account-name]
                                                 [--ids]
                                                 [--name --ransomware-report-name]
                                                 [--pool-name]
                                                 [--resource-group]
                                                 [--subscription]
                                                 [--volume-name]
  examples:

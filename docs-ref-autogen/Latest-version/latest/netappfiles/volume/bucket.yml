### YamlMime:AzureCLIGroup
uid: az_netappfiles_volume_bucket
name: az netappfiles volume bucket
summary: |-
  Manage Bucket.
description: |-
  Manage Azure NetApp Files (ANF) Bucket Resources.
status: GA
sourceType: Core
directCommands:
- uid: az_netappfiles_volume_bucket_create
  name: az netappfiles volume bucket create
  summary: |-
    Create a bucket for a volume. A bucket allows additional services, such as AI services, connect to the volume data contained in those buckets.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/netappfiles/_help.py
  syntax: >-
    az netappfiles volume bucket create --account-name
                                        --bucket-name --name
                                        --pool-name
                                        --resource-group
                                        --volume-name
                                        [--acquire-policy-token]
                                        [--cert-conflict-action --on-certificate-conflict-action {Fail, Update}]
                                        [--cert-kv-uri --certificate-key-vault-uri]
                                        [--certificate-name]
                                        [--certificate-object]
                                        [--change-reference]
                                        [--credentials-key-vault-uri --creds-kv-uri]
                                        [--fqdn]
                                        [--group-id]
                                        [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                        [--path]
                                        [--permissions {ReadOnly, ReadWrite}]
                                        [--secret-name]
                                        [--user-id]
                                        [--username]
  examples:
  - summary: |-
      Buckets_CreateOrUpdate
    syntax: az netappfiles volume bucket create --resource-group myRG --account-name account1 --pool-name pool1 --volume-name volume1 --bucket-name bucket1 --path /path --group-id 1000 --user-id 1001 --permissions ReadOnly --fqdn fullyqualified.domainname.com --certificate-object <REDACTED> --on-certificate-conflict-action Update
  requiredParameters:
  - isRequired: true
    name: --account-name -a
    summary: |-
      The name of the NetApp account.
  - isRequired: true
    name: --bucket-name --name -n
    summary: |-
      The name of the bucket.
  - isRequired: true
    name: --pool-name -p
    summary: |-
      The name of the capacity pool.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --volume-name -v
    summary: |-
      The name of the volume.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --cert-conflict-action --on-certificate-conflict-action
    acceptedValues: Fail, Update
    summary: |-
      Action to take when there is a certificate conflict. Possible values include: 'Update', 'Fail'.
    groupName: Server Arguments
  - name: --cert-kv-uri --certificate-key-vault-uri
    summary: |-
      The base URI of the Azure Key Vault that is used when retrieving the bucket certificate.
    groupName: CertificateAkvDetails Arguments
  - name: --certificate-name
    summary: |-
      The name of the bucket server certificate stored in the Azure Key Vault.
    groupName: CertificateAkvDetails Arguments
  - name: --certificate-object
    summary: |-
      The base64-encoded contents of a PEM file, which includes both the bucket server's certificate and private key. It is generated by the end user and allows the user to access volume data in a read-only manner. Note: This is only used when Azure Key Vault is not configured. This property is mutually exclusive with the Azure Key Vault 'akv' properties.  If value is blank it's asked from the tty.
    groupName: Server Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --credentials-key-vault-uri --creds-kv-uri
    summary: |-
      The base URI of the Azure Key Vault that is used when storing the bucket credentials.
    groupName: CredentialsAkvDetails Arguments
  - name: --fqdn
    summary: |-
      The host part of the bucket URL, resolving to the bucket IP address and allowed by the server certificate.
    groupName: Server Arguments
  - name: --group-id
    summary: |-
      The NFS user's GID.
    groupName: NfsUser Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --path
    defaultValue: /
    summary: |-
      The volume path mounted inside the bucket. The default is the root path '/' if no value is provided when the bucket is created.
    groupName: Properties Arguments
  - name: --permissions
    defaultValue: ReadOnly
    acceptedValues: ReadOnly, ReadWrite
    summary: |-
      Access permissions for the bucket. Either ReadOnly or ReadWrite. The default is ReadOnly if no value is provided during bucket creation.
    groupName: Properties Arguments
  - name: --secret-name
    summary: |-
      The name of the secret stored in Azure Key Vault. The associated key pair has the following structure:  { "access_key_id": `"<REDACTED>"`, "secret_access_key": `"<REDACTED>"` }.
    groupName: CredentialsAkvDetails Arguments
  - name: --user-id
    summary: |-
      The NFS user's UID.
    groupName: NfsUser Arguments
  - name: --username
    summary: |-
      The CIFS user's username.
    groupName: CifsUser Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

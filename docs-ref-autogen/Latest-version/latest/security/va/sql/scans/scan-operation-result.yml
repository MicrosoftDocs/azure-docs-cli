### YamlMime:AzureCLIGroup
uid: az_security_va_sql_scans_scan-operation-result
name: az security va sql scans scan-operation-result
summary: |-
  Manage Scan Operation Result.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az security va sql scans' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Core
directCommands:
- uid: az_security_va_sql_scans_scan-operation-result_show
  name: az security va sql scans scan-operation-result show
  summary: |-
    Get the result of a scan operation initiated by the InitiateScan action.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az security va sql scans scan-operation-result' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/security/_help.py
  syntax: >-
    az security va sql scans scan-operation-result show --operation-id
                                                        --resource-id
                                                        [--database-name]
  examples:
  - summary: |-
      Poll a scan operation result by its operation id on an Azure SQL database.
    syntax: az security va sql scans scan-operation-result show --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Sql/servers/{server}/databases/{db} --operation-id 00000000-0000-0000-0000-000000000000
  requiredParameters:
  - isRequired: true
    name: --operation-id
    summary: |-
      The operation id of the scan operation returned by 'security va sql scans initiate-scan'.
  - isRequired: true
    name: --resource-id
    summary: |-
      The fully qualified Azure Resource manager identifier of the resource.
  optionalParameters:
  - name: --database-name
    summary: |-
      The name of the database the scan was initiated against. Required when the original scan was initiated at the server-level scope.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_security_va_sql_scans_scan-operation-result_show

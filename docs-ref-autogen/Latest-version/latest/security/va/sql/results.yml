### YamlMime:AzureCLIGroup
uid: az_security_va_sql_results
name: az security va sql results
summary: |-
  View Sql Vulnerability Assessment scan results.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az security va sql' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Core
directCommands:
- uid: az_security_va_sql_results_list
  name: az security va sql results list
  summary: |-
    List a list of scan results for a single scan record.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az security va sql results' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/security/_help.py
  syntax: >-
    az security va sql results list --resource-id
                                    --scan-id
                                    [--database-name]
                                    [--max-items]
                                    [--next-token]
  examples:
  - summary: |-
      List all scan results for a given scan id on an Azure SQL database.
    syntax: az security va sql results list --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Sql/servers/{server}/databases/{db} --scan-id Scan_2026-01-01T00-00-00Z
  - summary: |-
      List scan results on a SQL DB hosted on an Azure virtual machine.
    syntax: az security va sql results list --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Compute/virtualMachines/{vm} --database-name MyDb --scan-id Scan_2026-01-01T00-00-00Z
  requiredParameters:
  - isRequired: true
    name: --resource-id
    summary: |-
      The fully qualified Azure Resource manager identifier of the resource.
  - isRequired: true
    name: --scan-id
    summary: |-
      The scan Id.
  optionalParameters:
  - name: --database-name
    summary: |-
      The name of the database to assess. Required when the API is called on the parent resource (e.g., server level) rather than on a specific database resource, since the database name is not part of the resource URI. This is the only way to assess system databases (e.g., master), which cannot be referenced directly in the resource URI.
  - name: --max-items
    summary: |-
      Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
    groupName: Pagination Arguments
  - name: --next-token
    summary: |-
      Token to specify where to start paginating. This is the token value from a previously truncated response.
    groupName: Pagination Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_security_va_sql_results_show
  name: az security va sql results show
  summary: |-
    Get the scan results of a single rule in a scan record.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az security va sql results' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/security/_help.py
  syntax: >-
    az security va sql results show --resource-id
                                    --rule-id --scan-result-id
                                    --scan-id
                                    [--database-name]
  examples:
  - summary: |-
      Show results for rule VA1234 from a given scan id on an Azure SQL database.
    syntax: az security va sql results show --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Sql/servers/{server}/databases/{db} --scan-id Scan_2026-01-01T00-00-00Z --rule-id VA1234
  - summary: |-
      Show results for a single rule on an Arc-enabled SQL server.
    syntax: az security va sql results show --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.HybridCompute/machines/{arc} --database-name MyDb --scan-id Scan_2026-01-01T00-00-00Z --rule-id VA1234
  requiredParameters:
  - isRequired: true
    name: --resource-id
    summary: |-
      The fully qualified Azure Resource manager identifier of the resource.
  - isRequired: true
    name: --rule-id --scan-result-id
    summary: |-
      The rule Id of the results.
  - isRequired: true
    name: --scan-id
    summary: |-
      The scan Id.
  optionalParameters:
  - name: --database-name
    summary: |-
      The name of the database to assess. Required when the API is called on the parent resource (e.g., server level) rather than on a specific database resource, since the database name is not part of the resource URI. This is the only way to assess system databases (e.g., master), which cannot be referenced directly in the resource URI.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_security_va_sql_results_list
- az_security_va_sql_results_show
metadata:

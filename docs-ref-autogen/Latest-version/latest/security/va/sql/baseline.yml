### YamlMime:AzureCLIGroup
uid: az_security_va_sql_baseline
name: az security va sql baseline
summary: |-
  View and manage Sql Vulnerability Assessment baseline.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az security va sql' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Core
directCommands:
- uid: az_security_va_sql_baseline_add
  name: az security va sql baseline add
  summary: |-
    Set a list of baseline rules. Will overwrite any previously existing results (for all rules).
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az security va sql baseline' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/security/_help.py
  syntax: >-
    az security va sql baseline add --resource-id
                                    [--acquire-policy-token]
                                    [--change-reference]
                                    [--database-name]
                                    [--latest-scan {0, 1, f, false, n, no, t, true, y, yes}]
                                    [--results]
  examples:
  - summary: |-
      Set baseline for all rules on an Azure SQL database using the latest scan results.
    syntax: az security va sql baseline add --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Sql/servers/{server}/databases/{db} --latest-scan true
  - summary: |-
      Set baseline for multiple rules with explicit results on a SQL DB hosted on an Azure VM.
    syntax: az security va sql baseline add --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Compute/virtualMachines/{vm} --database-name MyDb --results '{"VA1234":[["col1","col2"],["col3","col4"]],"VA5678":[["user1","SELECT"]]}'
  - summary: |-
      Set baseline at the server level using latest scan results (system database 'master').
    syntax: az security va sql baseline add --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Sql/servers/{server} --database-name master --latest-scan true
  requiredParameters:
  - isRequired: true
    name: --resource-id
    summary: |-
      The fully qualified Azure Resource manager identifier of the resource.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --database-name
    summary: |-
      The name of the database to assess. Required when the API is called on the parent resource (e.g., server level) rather than on a specific database resource, since the database name is not part of the resource URI. This is the only way to assess system databases (e.g., master), which cannot be referenced directly in the resource URI.
  - name: --latest-scan
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Take results from latest scan.
    groupName: Body Arguments
  - name: --results
    summary: |-
      Expected results to be inserted into the baseline. Leave this field empty if latestScan == true.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Body Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

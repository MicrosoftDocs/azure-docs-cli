### YamlMime:AzureCLIGroup
uid: az_security_va_sql
name: az security va sql
summary: |-
  Manage Defender for Cloud vulnerability assessment.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az security va' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Core
directCommands:
- uid: az_security_va_sql_create
  name: az security va sql create
  summary: |-
    Create the SQL Vulnerability Assessment settings.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az security va sql' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/security/_help.py
  syntax: >-
    az security va sql create --resource-id
                              [--acquire-policy-token]
                              [--change-reference]
                              [--state {Disabled, Enabled}]
  examples:
  - summary: |-
      Enable SQL Vulnerability Assessment on an Azure SQL server.
    syntax: az security va sql create --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Sql/servers/{server} --state Enabled
  - summary: |-
      Enable SQL Vulnerability Assessment on a SQL server hosted on an Azure virtual machine.
    syntax: az security va sql create --resource-id /subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Compute/virtualMachines/{vm} --state Enabled
  requiredParameters:
  - isRequired: true
    name: --resource-id
    summary: |-
      The fully qualified Azure Resource manager identifier of the resource.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --state
    acceptedValues: Disabled, Enabled
    summary: |-
      Represents the state of a SQL Vulnerability Assessment.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

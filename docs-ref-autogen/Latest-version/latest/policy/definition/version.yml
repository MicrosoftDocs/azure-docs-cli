- uid: az_policy_definition_version_update
  name: az policy definition version update
  summary: |-
    Update a policy definition version.
  description: |-
    Update the policy definition version in the given subscription or management group with the given name and version by applying the given properties.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/resource/_help.py
  syntax: >-
    az policy definition version update --name
                                        --version
                                        [--acquire-policy-token]
                                        [--add]
                                        [--change-reference]
                                        [--description]
                                        [--display-name]
                                        [--external-evaluation-enforcement-settings --external-settings]
                                        [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                        [--management-group]
                                        [--metadata]
                                        [--mode]
                                        [--params]
                                        [--remove]
                                        [--rule --rules]
                                        [--set]
  examples:
  - summary: |-
      Update a policy definition version
    syntax: az policy definition version update -n readOnlyStorage --display-name "Updated display name goes here"
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      The name of the policy definition.
  - isRequired: true
    name: --version
    summary: |-
      The policy definition version.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      The policy definition description.
    groupName: Properties Arguments
  - name: --display-name
    summary: |-
      The display name of the policy definition.
    groupName: Properties Arguments
  - name: --external-evaluation-enforcement-settings --external-settings
    summary: |-
      The details of the source of external evaluation results required by the policy during enforcement evaluation.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --management-group
    summary: |-
      The management group.
  - name: --metadata
    summary: |-
      The policy definition metadata.  Support shorthand-syntax(full value only), json-file and yaml-file.
    groupName: Properties Arguments
  - name: --mode -m
    summary: |-
      The policy definition mode.
    groupName: Properties Arguments
  - name: --params -p
    summary: |-
      The policy rule parameter definitions.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --rule --rules
    summary: |-
      The policy rule.  Support shorthand-syntax(full value only), json-file and yaml-file.
    groupName: Properties Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_policy_definition_version_create
- az_policy_definition_version_delete
- az_policy_definition_version_list
- az_policy_definition_version_show
- az_policy_definition_version_update

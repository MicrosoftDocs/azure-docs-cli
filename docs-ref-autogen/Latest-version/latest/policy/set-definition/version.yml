### YamlMime:AzureCLIGroup
uid: az_policy_set-definition_version
name: az policy set-definition version
summary: |-
  Manage Version.
status: GA
sourceType: Core
directCommands:
- uid: az_policy_set-definition_version_create
  name: az policy set-definition version create
  summary: |-
    Create a policy set definition version.
  description: |-
    Create a policy set definition version in the given subscription or management group with the given name and other properties.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/resource/_help.py
  syntax: >-
    az policy set-definition version create --name
                                            --version
                                            [--acquire-policy-token]
                                            [--change-reference]
                                            [--definition-groups]
                                            [--definitions]
                                            [--description]
                                            [--display-name]
                                            [--management-group]
                                            [--metadata]
                                            [--params]
  examples:
  - summary: |-
      Create a policy set definition with older version
    syntax: "az policy set-definition version create -n readOnlyStorage --definitions \"[ { 'policyDefinitionId': '/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyDefinitions/{policyDefinitionName}' } ]\" --version 1.1.0"
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      The name of the policy set definition.
  - isRequired: true
    name: --version
    summary: |-
      The policy set definition version.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --definition-groups
    summary: |-
      The metadata describing groups of policy definition references within the policy set definition.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --definitions
    summary: |-
      An array of policy definition references.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --description
    summary: |-
      The policy set definition description.
    groupName: Properties Arguments
  - name: --display-name
    summary: |-
      The display name of the policy set definition.
    groupName: Properties Arguments
  - name: --management-group
    summary: |-
      The management group.
  - name: --metadata
    summary: |-
      The policy set definition metadata.  Support shorthand-syntax(full value only), json-file and yaml-file.
    groupName: Properties Arguments
  - name: --params -p
    summary: |-
      The policy set definition parameter definitions.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

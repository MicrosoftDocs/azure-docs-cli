- uid: az_policy_set-definition_version_update
  name: az policy set-definition version update
  summary: |-
    Update a policy set definition version.
  description: |-
    Update the policy set definition version in the given subscription or management group with the given name and version by applying the given properties.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/resource/_help.py
  syntax: >-
    az policy set-definition version update --name
                                            --version
                                            [--acquire-policy-token]
                                            [--add]
                                            [--change-reference]
                                            [--definition-groups]
                                            [--definitions]
                                            [--description]
                                            [--display-name]
                                            [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                            [--management-group]
                                            [--metadata]
                                            [--params]
                                            [--remove]
                                            [--set]
  examples:
  - summary: |-
      Update a policy set definition version
    syntax: az az policy set-definition version update -n readOnlyStorage --display-name "Updated display name goes here"
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      The name of the policy set definition.
  - isRequired: true
    name: --version
    summary: |-
      The policy set definition version.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --definition-groups
    summary: |-
      The metadata describing groups of policy definition references within the policy set definition.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --definitions
    summary: |-
      An array of policy definition references.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --description
    summary: |-
      The policy set definition description.
    groupName: Properties Arguments
  - name: --display-name
    summary: |-
      The display name of the policy set definition.
    groupName: Properties Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --management-group
    summary: |-
      The management group.
  - name: --metadata
    summary: |-
      The policy set definition metadata.  Support shorthand-syntax(full value only), json-file and yaml-file.
    groupName: Properties Arguments
  - name: --params -p
    summary: |-
      The policy set definition parameter definitions.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

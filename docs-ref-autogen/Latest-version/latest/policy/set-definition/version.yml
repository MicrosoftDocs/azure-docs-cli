- uid: az_policy_set-definition_version_list
  name: az policy set-definition version list
  summary: |-
    Retrieve policy set definition versions.
  description: |-
    Retrieve the list of all policy set definition versions for a policy definition in the given subscription or management group.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/resource/_help.py
  syntax: >-
    az policy set-definition version list --name
                                          [--expand]
                                          [--management-group]
                                          [--max-items]
                                          [--next-token]
                                          [--top]
  examples:
  - summary: |-
      List policy set definitions
    syntax: az policy set-definition version list --name CostManagement
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      The name of the policy set definition.
  optionalParameters:
  - name: --expand
    summary: |-
      Comma-separated list of additional properties to be included in the response. Supported values are 'LatestDefinitionVersion, EffectiveDefinitionVersion'.
  - name: --management-group
    summary: |-
      The management group.
  - name: --max-items
    summary: |-
      Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
    groupName: Pagination Arguments
  - name: --next-token
    summary: |-
      Token to specify where to start paginating. This is the token value from a previously truncated response.
    groupName: Pagination Arguments
  - name: --top
    summary: |-
      Maximum number of records to return. When the $top filter is not provided, it will return 500 records.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

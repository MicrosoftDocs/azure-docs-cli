### YamlMime:AzureCLIGroup
uid: az_policy_enrollment
name: az policy enrollment
summary: |-
  Manage policy enrollments.
description: |-
  Policy enrollments specify resources that a policy assignment on 'Enroll' mode applies to.
status: GA
sourceType: Core
directCommands:
- uid: az_policy_enrollment_create
  name: az policy enrollment create
  summary: |-
    Create a policy enrollment.
  description: |-
    Create a policy enrollment with the given name and scope. Policy enrollments apply a policy assignment to resources within their scope. For example, when you create a policy enrollment at resource group scope for a policy assignment at the same or higher scope level, the enrollment applies to all applicable resources in the resource group, optionally filtering which policy definitions or resources are included.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/resource/_help.py
  syntax: >-
    az policy enrollment create [--acquire-policy-token]
                                [--assignment-scope-validation {Default, DoNotValidate}]
                                [--change-reference]
                                [--description]
                                [--display-name]
                                [--metadata]
                                [--name]
                                [--policy-assignment]
                                [--policy-definition-reference-ids]
                                [--resource-group]
                                [--resource-selectors]
                                [--scope]
  examples:
  - summary: |-
      Create a policy enrollment in default subscription
    syntax: az policy enrollment create -n enrollTestVm --policy-assignment "/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyAssignments/limitVMSku"
  - summary: |-
      Create a policy enrollment in the resource group
    syntax: az policy enrollment create -n enrollTestVm --policy-assignment "/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyAssignments/limitVMSku" --resource-group MyResourceGroup
  - summary: |-
      Create a policy enrollment in the management group
    syntax: az policy enrollment create -n enrollTestVm --policy-assignment "/subscriptions/{subscriptionId}/providers/Microsoft.Authorization/policyAssignments/limitVMSku" --scope "/providers/Microsoft.Management/managementGroups/{managementGroupName}"
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --assignment-scope-validation -v
    acceptedValues: Default, DoNotValidate
    summary: |-
      The option whether to validate the enrollment is at or under the assignment scope.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      The description of the policy enrollment.
    groupName: Properties Arguments
  - name: --display-name
    summary: |-
      The display name of the policy enrollment.
    groupName: Properties Arguments
  - name: --metadata
    summary: |-
      The policy enrollment metadata. Metadata is an open ended object and is typically a collection of key value pairs.  Support shorthand-syntax(full value only), json-file and yaml-file.
    groupName: Properties Arguments
  - name: --name -n
    summary: |-
      The name of the policy enrollment.
  - name: --policy-assignment -a
    summary: |-
      The policy assignment to enroll.
    groupName: Properties Arguments
  - name: --policy-definition-reference-ids -r
    summary: |-
      The policy definition reference IDs.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - name: --resource-selectors
    summary: |-
      The resource selector list to filter policies by resource properties.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --scope
    summary: |-
      The fully qualified Azure Resource manager identifier of the resource.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

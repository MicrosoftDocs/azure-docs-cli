- uid: az_policy_enrollment_list
  name: az policy enrollment list
  summary: |-
    Retrieve all applicable policy enrollments.
  description: |-
    Retrieve the list of all policy enrollments applicable to the given resource group, subscription or management group.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/resource/_help.py
  syntax: >-
    az policy enrollment list [--disable-scope-strict-match {0, 1, f, false, n, no, t, true, y, yes}]
                              [--filter]
                              [--management-group]
                              [--max-items]
                              [--next-token]
                              [--resource-group]
                              [--scope]
  examples:
  - summary: |-
      List policy enrollments for management group
    syntax: az policy enrollment list --management-group DevOrg --filter atScopeAndBelow()
  - summary: |-
      List policy enrollments for resource group
    syntax: az policy enrollment list --resource-group TestResourceGroup
  - summary: |-
      List policy enrollments for subscription
    syntax: az policy enrollment list
  optionalParameters:
  - name: --disable-scope-strict-match -d
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Include policy enrollments either inherited from parent scopes or at child scopes.
  - name: --filter
    summary: |-
      Filter list results.
  - name: --management-group
    summary: |-
      The management group.
  - name: --max-items
    summary: |-
      Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
    groupName: Pagination Arguments
  - name: --next-token
    summary: |-
      Token to specify where to start paginating. This is the token value from a previously truncated response.
    groupName: Pagination Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - name: --scope
    summary: |-
      Scope at which to list applicable policy enrollments. If scope is not provided, the scope will be the implied or specified subscription.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

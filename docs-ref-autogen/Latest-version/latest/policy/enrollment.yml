                                [--display-name]
                                [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                [--metadata]
                                [--policy-assignment]
                                [--policy-definition-reference-ids]
                                [--remove]
                                [--resource-group]
                                [--resource-selectors]
                                [--scope]
                                [--set]
  examples:

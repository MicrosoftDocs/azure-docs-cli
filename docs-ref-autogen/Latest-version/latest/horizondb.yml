### YamlMime:AzureCLIGroup
uid: az_horizondb
name: az horizondb
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **horizondb** extension for the Azure CLI (version 2.17.1 or higher). The extension will automatically install the first time you run an **az horizondb** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Azure HorizonDB.
status: GA
sourceType: Extension
directCommands:
- uid: az_horizondb_create
  name: az horizondb create
  summary: |-
    Create a new Azure HorizonDB cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az horizondb create --administrator-login
                        --administrator-login-password
                        --name
                        --resource-group
                        [--acquire-policy-token]
                        [--change-reference]
                        [--location]
                        [--replica-count]
                        [--tags]
                        [--v-cores]
                        [--version]
                        [--zone-placement-policy {BestEffort, Strict}]
  examples:
  - summary: |-
      Create a new HorizonDB cluster.
    syntax: az horizondb create --name examplecluster --resource-group exampleresourcegroup --location centralus --administrator-login myadmin --administrator-login-password examplepassword --version 17 --v-cores 4 --replica-count 3
  - summary: |-
      Create a HorizonDB cluster with zone placement policy.
    syntax: az horizondb create --name examplecluster --resource-group exampleresourcegroup --location centralus --administrator-login myadmin --administrator-login-password examplepassword --version 17 --v-cores 4 --replica-count 3 --zone-placement-policy Strict
  requiredParameters:
  - isRequired: true
    name: --administrator-login
    summary: |-
      The administrator login name for the cluster.
  - isRequired: true
    name: --administrator-login-password -p
    summary: |-
      The administrator login password.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the cluster. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --location -l
    summary: |-
      Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.
  - name: --replica-count
    summary: |-
      Number of replicas.
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  - name: --v-cores
    summary: |-
      Number of vCores.
  - name: --version -v
    summary: |-
      The version of the HorizonDb cluster.
  - name: --zone-placement-policy
    acceptedValues: BestEffort, Strict
    summary: |-
      Defines how replicas are placed across availability zones.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_horizondb_delete
  name: az horizondb delete
  summary: |-
    Delete an Azure HorizonDB cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az horizondb delete [--acquire-policy-token]
                        [--change-reference]
                        [--ids]
                        [--name]
                        [--resource-group]
                        [--subscription]
                        [--yes]
  examples:
  - summary: |-
      Delete an Azure HorizonDB cluster.
    syntax: az horizondb delete --name examplecluster --resource-group exampleresourcegroup
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --name -n
    summary: |-
      Name of the cluster. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

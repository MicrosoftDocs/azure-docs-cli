- uid: az_horizondb_update
  name: az horizondb update
  summary: |-
    Update an existing Azure HorizonDB cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az horizondb update [--acquire-policy-token]
                        [--administrator-login-password]
                        [--change-reference]
                        [--ids]
                        [--name]
                        [--no-wait]
                        [--parameter-group]
                        [--public-access {Disabled, Enabled}]
                        [--resource-group]
                        [--subscription]
                        [--tags]
                        [--v-cores]
                        [--yes]
  examples:
  - summary: |-
      Update an existing HorizonDB cluster to have 6 vCores.
    syntax: az horizondb update --name examplecluster --resource-group exampleresourcegroup --v-cores 6
  - summary: |-
      Assign a parameter group to an existing HorizonDB cluster.
    syntax: az horizondb update --name examplecluster --resource-group exampleresourcegroup --parameter-group /subscriptions/{subscriptionId}/resourceGroups/{resourceGroup}/providers/Microsoft.HorizonDb/parameterGroups/{parameterGroup}
  - summary: |-
      Enable public access on an existing HorizonDB cluster (detects your client IP and prompts to create a firewall rule).
    syntax: az horizondb update --name examplecluster --resource-group exampleresourcegroup --public-access Enabled
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --administrator-login-password -p
    summary: |-
      The administrator login password.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --name -n
    summary: |-
      Name of the cluster. The name can contain only lowercase letters, numbers, and the hyphen (-) character. Minimum 3 characters and maximum 63 characters.
    groupName: Resource Id Arguments
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --parameter-group
    summary: |-
      The resource ID of the parameter group.
  - name: --public-access
    acceptedValues: Disabled, Enabled
    summary: |-
      Enable or disable public access on the cluster. 'Enabled' detects your current client IP and prompts to create a firewall rule on the default pool. 'Disabled' points you to the 'az horizondb firewall-rule' commands to remove public access.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  - name: --v-cores
    summary: |-
      Number of vCores.
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

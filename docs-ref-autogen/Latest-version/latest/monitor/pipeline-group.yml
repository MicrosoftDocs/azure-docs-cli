### YamlMime:AzureCLIGroup
uid: az_monitor_pipeline-group
name: az monitor pipeline-group
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **monitor-pipeline-group** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az monitor pipeline-group** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Azure Monitor Pipelines.
status: GA
sourceType: Extension
directCommands:
- uid: az_monitor_pipeline-group_create
  name: az monitor pipeline-group create
  summary: |-
    Create a pipeline group instance.
  status: GA
  sourceType: Extension
  syntax: >-
    az monitor pipeline-group create --name --pipeline-group-name
                                     --resource-group
                                     [--acquire-policy-token]
                                     [--change-reference]
                                     [--execution-placement]
                                     [--exporters]
                                     [--extended-location]
                                     [--location]
                                     [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                     [--processors]
                                     [--receivers]
                                     [--replicas]
                                     [--service]
                                     [--tags]
                                     [--tls-configurations]
  requiredParameters:
  - isRequired: true
    name: --name --pipeline-group-name -n
    summary: |-
      The name of pipeline group. The name is case insensitive.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --execution-placement
    summary: |-
      Constraints for guiding the execution environment of the pipeline group.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --exporters
    summary: |-
      The exporters specified for a pipeline group instance.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --extended-location
    summary: |-
      Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource Arguments
  - name: --location -l
    summary: |-
      The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    groupName: Resource Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --processors
    summary: |-
      The processors specified for a pipeline group instance.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --receivers
    summary: |-
      The receivers specified for a pipeline group instance.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --replicas
    summary: |-
      Defines the amount of replicas of the pipeline group instance.
    groupName: Properties Arguments
  - name: --service
    summary: |-
      The service section for a given pipeline group instance.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource Arguments
  - name: --tls-configurations
    summary: |-
      TLS configurations for the pipeline group instance.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

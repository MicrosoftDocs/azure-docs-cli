uid: az_monitor_account_metrics-container
name: az monitor account metrics-container
summary: |-
  Manage Metrics Container.
status: GA
sourceType: Core
directCommands:
- uid: az_monitor_account_metrics-container_create
  name: az monitor account metrics-container create
  summary: |-
    Create metrics container settings for a monitoring account.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/monitor/_help.py
  syntax: >-
    az monitor account metrics-container create --azure-monitor-workspace-name
                                                --metrics-container-name --name
                                                --resource-group
                                                [--acquire-policy-token]
                                                [--change-reference]
                                                [--version]
  examples:
  - summary: |-
      Create the default metrics container for an Azure Monitor workspace
    syntax: az monitor account metrics-container create -w myWorkspace -g myRG -n default
  requiredParameters:
  - isRequired: true
    name: --azure-monitor-workspace-name -w
    summary: |-
      The name of the Azure Monitor Workspace. The name is case insensitive.
  - isRequired: true
    name: --metrics-container-name --name -n
    summary: |-
      The name of the MetricsContainer.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --version
    summary: |-
      The version of Metrics Query Service that this AMW will use for all metric queries.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

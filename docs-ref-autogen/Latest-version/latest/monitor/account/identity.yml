### YamlMime:AzureCLIGroup
uid: az_monitor_account_identity
name: az monitor account identity
summary: |-
  Manage Identity.
status: GA
sourceType: Core
directCommands:
- uid: az_monitor_account_identity_assign
  name: az monitor account identity assign
  summary: |-
    Assign the user or system managed identities.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/monitor/_help.py
  syntax: >-
    az monitor account identity assign --azure-monitor-workspace-name --name
                                       --resource-group
                                       [--acquire-policy-token]
                                       [--change-reference]
                                       [--mi-system-assigned --system-assigned]
                                       [--mi-user-assigned --user-assigned]
  examples:
  - summary: |-
      Assign a system-assigned managed identity to an Azure Monitor workspace
    syntax: az monitor account identity assign -n myWorkspace -g myRG --system-assigned
  - summary: |-
      Assign a user-assigned managed identity to an Azure Monitor workspace
    syntax: az monitor account identity assign -n myWorkspace -g myRG --user-assigned /subscriptions/sub/resourceGroups/rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/myIdentity
  requiredParameters:
  - isRequired: true
    name: --azure-monitor-workspace-name --name -n
    summary: |-
      The name of the Azure Monitor workspace.  The name is case insensitive.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --mi-system-assigned --system-assigned
    summary: |-
      Set the system managed identity.
    groupName: Resource.identity Arguments
  - name: --mi-user-assigned --user-assigned
    summary: |-
      Set the user managed identities.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource.identity Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

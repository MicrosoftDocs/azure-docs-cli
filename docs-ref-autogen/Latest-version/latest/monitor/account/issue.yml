- uid: az_monitor_account_issue_create
  name: az monitor account issue create
  summary: |-
    Create a new issue or updates an existing one.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/monitor/_help.py
  syntax: >-
    az monitor account issue create --azure-monitor-workspace-name
                                    --issue-name --name
                                    --resource-group
                                    [--acquire-policy-token]
                                    [--background]
                                    [--change-reference]
                                    [--impact-time]
                                    [--notifications]
                                    [--related]
                                    [--severity]
                                    [--status {Canceled, Closed, InProgress, Mitigated, New}]
                                    [--title]
  examples:
  - summary: |-
      Create a new issue in an Azure Monitor workspace
    syntax: az monitor account issue create --azure-monitor-workspace-name myWorkspace -g myRG -n myIssue --title "My Issue" --severity High --status New
  requiredParameters:
  - isRequired: true
    name: --azure-monitor-workspace-name -w
    summary: |-
      The name of the Azure Monitor Workspace. The name is case insensitive.
  - isRequired: true
    name: --issue-name --name -n
    summary: |-
      The name of the IssueResource.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --background
    summary: |-
      The issue background information  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --impact-time
    summary: |-
      The issue impact time (in UTC).
    groupName: Properties Arguments
  - name: --notifications
    summary: |-
      The issue notification settings  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --related
    summary: |-
      Related resource or alert that is to be added to the issue (default: empty - the issue will be created without any related resources or alerts).
  - name: --severity
    summary: |-
      The issue severity.
    groupName: Properties Arguments
  - name: --status
    acceptedValues: Canceled, Closed, InProgress, Mitigated, New
    summary: |-
      The issue status.
    groupName: Properties Arguments
  - name: --title
    summary: |-
      The issue title.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

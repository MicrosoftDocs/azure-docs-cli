summary: |-
  Manage Issue.
status: GA
sourceType: Core
directCommands:
- uid: az_monitor_account_issue_add-investigation-result
  name: az monitor account issue add-investigation-result
  summary: |-
    Adds investigation result.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/monitor/_help.py
  syntax: >-
    az monitor account issue add-investigation-result --id
                                                      --result
                                                      [--acquire-policy-token]
                                                      [--azure-monitor-workspace-name]
                                                      [--change-reference]
                                                      [--created-at]
                                                      [--ids]
                                                      [--issue-name]
                                                      [--last-modified-at]
                                                      [--origin]
                                                      [--resource-group]
                                                      [--subscription]
  examples:
  - summary: |-
      Add an investigation result to an issue
    syntax: az monitor account issue add-investigation-result --azure-monitor-workspace-name myWorkspace -g myRG --issue-name myIssue --text "Investigation findings" --id 00000000-0000-0000-0000-000000000000
  requiredParameters:
  - isRequired: true
    name: --id
    summary: |-
      The identifier of the investigation.
    groupName: Body Arguments
  - isRequired: true
    name: --result
    summary: |-
      The result of this investigation.
    groupName: Body Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --azure-monitor-workspace-name -w
    summary: |-
      The name of the Azure Monitor Workspace. The name is case insensitive.
    groupName: Resource Id Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --created-at
    summary: |-
      The creation time of the investigation (in UTC).
    groupName: Body Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --issue-name
    summary: |-
      The name of the IssueResource.
    groupName: Resource Id Arguments
  - name: --last-modified-at
    summary: |-
      The last update time of the investigation (in UTC).
    groupName: Body Arguments
  - name: --origin
    summary: |-
      The origin of the investigation  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Body Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

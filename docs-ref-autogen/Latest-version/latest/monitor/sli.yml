- uid: az_monitor_sli_update
  name: az monitor sli update
  summary: |-
    Update an SLI resource.
  description: |-
    Managed-identity changes must be applied to all three surfaces in a single
    PUT, because the service validates set-equality across them:
    1. ``identity.userAssignedIdentities`` (top-level ARM identity dictionary).
    2. ``properties.destinationAmwAccounts[].identity``.
    3. ``properties.sliProperties.{signals|goodSignals|totalSignals}.signalSources[].sourceAmwAccountManagedIdentity``.
    Window-based SLIs populate the ``signals`` slot; request-based SLIs populate
    ``goodSignals`` and ``totalSignals``. Run ``az monitor sli show`` first to
    confirm the destination/signal-source indices and which slot is in use.
    The examples below assume the window-based ``signals`` slot with one
    destination AMW and one signal source.
    Note: UAMI ARM IDs contain ``.`` (for example ``Microsoft.ManagedIdentity``),
    so they cannot be addressed as path segments by ``--set/--remove`` (azure-cli
    splits the path on ``.``). To change ``identity.userAssignedIdentities``,
    replace the whole map by passing a JSON value rooted at ``identity.userAssignedIdentities``.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az monitor sli' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/monitor/_help.py
  syntax: >-
    az monitor sli update --service-group-name
                          --sli-name
                          [--acquire-policy-token]
                          [--add]
                          [--amw-accounts --destination-amw-accounts]
                          [--baseline-properties]
                          [--category {Availability, Latency}]
                          [--change-reference]
                          [--description]
                          [--enable-alert {0, 1, f, false, n, no, t, true, y, yes}]
                          [--evaluation-type {RequestBased, WindowBased}]
                          [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                          [--remove]
                          [--set]
                          [--sli-properties]
  examples:
  - summary: |-
      Update the description.
    syntax: az monitor sli update --service-group-name MyServiceGroup --sli-name MySli --set properties.description="Updated API availability SLI"
  - summary: |-
      Rotate the source-AMW managed identity (signal source 0) to a new UAMI.
    syntax: az monitor sli update --service-group-name MyServiceGroup --sli-name MySli --set 'identity.userAssignedIdentities={"<new-source-uami-arm-id>":{}}' --set 'properties.sliProperties.signals.signalSources[0].sourceAmwAccountManagedIdentity=<new-source-uami-arm-id>'
  - summary: |-
      Rotate the destination-AMW managed identity (destination 0) to a new UAMI.
    syntax: az monitor sli update --service-group-name MyServiceGroup --sli-name MySli --set 'identity.userAssignedIdentities={"<new-destination-uami-arm-id>":{}}' --set 'properties.destinationAmwAccounts[0].identity=<new-destination-uami-arm-id>'
  - summary: |-
      Rotate the source-AMW and destination-AMW managed identities together in a single update (single UAMI used for both).
    syntax: az monitor sli update --service-group-name MyServiceGroup --sli-name MySli --set 'identity.userAssignedIdentities={"<new-uami-arm-id>":{}}' --set 'properties.destinationAmwAccounts[0].identity=<new-uami-arm-id>' --set 'properties.sliProperties.signals.signalSources[0].sourceAmwAccountManagedIdentity=<new-uami-arm-id>'
  requiredParameters:
  - isRequired: true
    name: --service-group-name
    summary: |-
      The name of the service group.
  - isRequired: true
    name: --sli-name
    summary: |-
      Name of the SLI that is given by the user.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --amw-accounts --destination-amw-accounts
    summary: |-
      Destination AMW accounts.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --baseline-properties
    summary: |-
      Defines the SLO baseline associated with the SLI.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --category
    acceptedValues: Availability, Latency
    summary: |-
      Specifies the category of the SLI, used to classify signals such as Availability and Latency.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      A user-provided description of the SLI, with a maximum length of 1000 characters.
    groupName: Properties Arguments
  - name: --enable-alert
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      A flag to determine whether alert is enabled.
    groupName: Properties Arguments
  - name: --evaluation-type
    acceptedValues: RequestBased, WindowBased
    summary: |-
      Determines how the SLI is evaluated—either based on request counts or time windows.
    groupName: Properties Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  - name: --sli-properties
    summary: |-
      Defines the SLI properties associated with the SLI.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

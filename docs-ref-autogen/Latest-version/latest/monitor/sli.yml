### YamlMime:AzureCLIGroup
uid: az_monitor_sli
name: az monitor sli
summary: |-
  Manage Service Level Indicators (SLIs) in Azure Monitor.
description: |-
  Identity model: SLIs only support user-assigned managed identities (UAMIs).
  System-assigned identity is not supported by the service. A UAMI must be
  referenced in three places that the service keeps in sync:
  1. The ARM identity block (`identity.userAssignedIdentities`).
  2. Each destination AMW (`properties.destinationAmwAccounts[].identity`).
  3. Each signal source (`properties.sliProperties.{signals|goodSignals|
  totalSignals}.signalSources[].sourceAmwAccountManagedIdentity`).
  The service rejects PUTs where these three sets disagree. To rotate a UAMI,
  update all three surfaces in a single `az monitor sli update` call so the
  PUT is atomic. See `az monitor sli update --help` for worked rotation
  examples. Run `az monitor sli show` first to confirm the actual indices
  and which signal slot (`signals` for window-based, `goodSignals` +
  `totalSignals` for request-based) is populated.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Core
directCommands:
- uid: az_monitor_sli_create
  name: az monitor sli create
  summary: |-
    Create an SLI resource.
  description: |-
    A user-assigned managed identity is required and must match the identity
    referenced by each destination AMW account and each signal source. Complex
    object arguments (``--baseline-properties``, ``--destination-amw-accounts``,
    ``--sli-properties``) are easiest to pass via JSON files using the
    ``@filename.json`` syntax.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az monitor sli' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/monitor/_help.py
  syntax: >-
    az monitor sli create --mi-user-assigned --user-assigned
                          --service-group-name
                          --sli-name
                          [--acquire-policy-token]
                          [--amw-accounts --destination-amw-accounts]
                          [--baseline-properties]
                          [--category {Availability, Latency}]
                          [--change-reference]
                          [--description]
                          [--enable-alert {0, 1, f, false, n, no, t, true, y, yes}]
                          [--evaluation-type {RequestBased, WindowBased}]
                          [--sli-properties]
  examples:
  - summary: |-
      Create a window-based availability SLI from JSON payload files.
    syntax: az monitor sli create --service-group-name MyServiceGroup --sli-name MySli --user-assigned <uami-arm-id> --category Availability --evaluation-type WindowBased --description "API availability SLI" --baseline-properties @baseline.json --destination-amw-accounts @destinations.json --sli-properties @sli-properties.json
  requiredParameters:
  - isRequired: true
    name: --mi-user-assigned --user-assigned
    summary: |-
      Set the user managed identities. At least one user-assigned managed identity is required; system-assigned identity is not supported by this service.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Identity Arguments
  - isRequired: true
    name: --service-group-name
    summary: |-
      The name of the service group.
  - isRequired: true
    name: --sli-name
    summary: |-
      Name of the SLI that is given by the user.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --amw-accounts --destination-amw-accounts
    summary: |-
      Destination AMW accounts.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --baseline-properties
    summary: |-
      Defines the SLO baseline associated with the SLI.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --category
    acceptedValues: Availability, Latency
    summary: |-
      Specifies the category of the SLI, used to classify signals such as Availability and Latency.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      A user-provided description of the SLI, with a maximum length of 1000 characters.
    groupName: Properties Arguments
  - name: --enable-alert
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      A flag to determine whether alert is enabled.
    groupName: Properties Arguments
  - name: --evaluation-type
    acceptedValues: RequestBased, WindowBased
    summary: |-
      Determines how the SLI is evaluated—either based on request counts or time windows.
    groupName: Properties Arguments
  - name: --sli-properties
    summary: |-
      Defines the SLI properties associated with the SLI.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

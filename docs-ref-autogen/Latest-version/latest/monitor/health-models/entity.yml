### YamlMime:AzureCLIGroup
uid: az_monitor_health-models_entity
name: az monitor health-models entity
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **health-models** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az monitor health-models entity** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Entity.
status: GA
sourceType: Extension
directCommands:
- uid: az_monitor_health-models_entity_add-data-annotation
  name: az monitor health-models entity add-data-annotation
  summary: |-
    Add a data annotation to an entity.
  status: GA
  sourceType: Extension
  syntax: >-
    az monitor health-models entity add-data-annotation --annotation-details
                                                        [--acquire-policy-token]
                                                        [--change-reference]
                                                        [--description]
                                                        [--entity-name]
                                                        [--health-model-name]
                                                        [--ids]
                                                        [--resource-group]
                                                        [--subscription]
  examples:
  - summary: |-
      Entities_AddDataAnnotation
    syntax: az monitor health-models entity add-data-annotation --resource-group rgopenapi --health-model-name myHealthModel --entity-name entity1 --annotation-details "{environment:production,deploymentId:deploy-2026-04-10-001,changedBy:release-pipeline}" --description Production deployment of v2.4.1
  requiredParameters:
  - isRequired: true
    name: --annotation-details
    summary: |-
      Annotation details as a dynamic key-value pair bag. Service-enforced limits: a maximum of 10 entries per annotation and a maximum value length of 256 characters. Requests exceeding these limits will be rejected with a 400 response.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Body Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      Optional description of the annotation.
    groupName: Body Arguments
  - name: --entity-name
    summary: |-
      Name of the entity. Must be unique within a health model.
    groupName: Resource Id Arguments
  - name: --health-model-name
    summary: |-
      Name of health model resource.
    groupName: Resource Id Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_monitor_health-models_entity_create
  name: az monitor health-models entity create
  summary: |-
    Create a Entity.
  status: GA
  sourceType: Extension
  syntax: >-
    az monitor health-models entity create --entity-name --name
                                           --health-model-name
                                           --resource-group
                                           [--acquire-policy-token]
                                           [--alerts]
                                           [--canvas-position]
                                           [--change-reference]
                                           [--display-name]
                                           [--health-objective]
                                           [--icon]
                                           [--impact {Limited, Standard, Suppressed}]
                                           [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                           [--signal-groups]
                                           [--tags]
  examples:
  - summary: |-
      Entities_CreateOrUpdate
    syntax: az monitor health-models entity create --resource-group rgopenapi --health-model-name myHealthModel --entity-name uszrxbdkxesdrxhmagmzywebgbjj --display-name My entity --canvas-position "{x:14,y:13}" --icon "{icon-name:Custom,custom-data:rcitntvapruccrhtxmkqjphbxunkz}" --health-objective 62 --impact Standard --tags "{key1376:'sample tag'}" --signal-groups "{azure-resource:{authentication-setting:auth123,azure-resource-id:/subscriptions/12345678-1234-1234-1234-123456789012/resourceGroups/rg1/providers/Microsoft.Compute/virtualMachines/vm1,azure-resource-kind:functionapp,signals:[{signalKind:AzureResourceMetric,name:uniqueSignalName1,signal-definition-name:sigdef1,metric-namespace:microsoft.compute/virtualMachines,metric-name:cpuusage,aggregation-type:None,dimension-filter:'node eq '/node1'/',display-name:'CPU usage',refresh-interval:PT1M,time-grain:PT1M,data-unit:Count,evaluation-rules:{degradedRule:{operator:LowerThan,threshold:10},unhealthyRule:{operator:LowerThan,threshold:1}}}]},azure-log-analytics:{authentication-setting:auth123,log-analytics-workspace-resource-id:/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg/providers/Microsoft.OperationalInsights/workspaces/myworkspace,signals:[{signalKind:LogAnalyticsQuery,name:uniqueSignalName2,signal-definition-name:null,evaluation-rules:{degradedRule:{operator:GreaterThan,threshold:1},unhealthyRule:{operator:GreaterThan,threshold:5}},refresh-interval:PT1M,query-text:'print 1',time-grain:PT30M,value-column-name:result,display-name:'Test LA signal',data-unit:'my unit'}]},azure-monitor-workspace:{authentication-setting:auth123,azure-monitor-workspace-resource-id:/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg/providers/Microsoft.OperationalInsights/workspaces/myworkspace,signals:[{signalKind:PrometheusMetricsQuery,name:pod-cpu-usage,signal-definition-name:PodCpuUsageDefinition,display-name:'Pod CPU Usage',refresh-interval:PT1M,data-unit:Percent,query-text:\'rate(container_cpu_usage_seconds_total{pod=~"my-app-.*"}[5m]) * 100\',time-grain:PT5M,evaluation-rules:{degradedRule:{operator:GreaterThan,threshold:70},unhealthyRule:{operator:GreaterThan,threshold:90}}}]},dependencies:{aggregation-type:MinHealthy,unit:Percentage,degraded-threshold:80,unhealthy-threshold:50}}" --alerts "{unhealthy:{severity:Sev1,description:'Alert description',actionGroupIds:[/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg/providers/Microsoft.Insights/actionGroups/myactiongroup]},degraded:{severity:Sev4,description:'Alert description',actionGroupIds:[/subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/rg/providers/Microsoft.Insights/actionGroups/myactiongroup]}}"
  requiredParameters:
  - isRequired: true
    name: --entity-name --name -n
    summary: |-
      Name of the entity. Must be unique within a health model.
  - isRequired: true
    name: --health-model-name
    summary: |-
      Name of health model resource.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-

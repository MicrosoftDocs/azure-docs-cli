- uid: az_monitor_health-models_entity_wait
  name: az monitor health-models entity wait
  summary: |-
    Place the CLI in a waiting state until a condition is met.
  status: GA
  sourceType: Extension
  syntax: >-
    az monitor health-models entity wait [--acquire-policy-token]
                                         [--change-reference]
                                         [--created]
                                         [--custom]
                                         [--deleted]
                                         [--entity-name --name]
                                         [--exists]
                                         [--health-model-name]
                                         [--ids]
                                         [--interval]
                                         [--resource-group]
                                         [--subscription]

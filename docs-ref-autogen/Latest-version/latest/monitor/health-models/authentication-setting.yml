  syntax: >-
    az monitor health-models authentication-setting create --authentication-setting-name --name
                                                           --health-model-name
                                                           --resource-group
                                                           [--acquire-policy-token]
                                                           [--change-reference]
                                                           [--display-name]
                                                           [--managed-identity]
                                                           [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
  examples:
  - summary: |-
      AuthenticationSettings_CreateOrUpdate
    syntax: az monitor health-models authentication-setting create --resource-group myResourceGroup --health-model-name myHealthModel --authentication-setting-name myAuthSetting --display-name myDisplayName
  requiredParameters:
  - isRequired: true
    name: --authentication-setting-name --name -n

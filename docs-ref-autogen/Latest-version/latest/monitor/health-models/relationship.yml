uid: az_monitor_health-models_relationship
name: az monitor health-models relationship
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **health-models** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az monitor health-models relationship** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Relationship.
status: GA
sourceType: Extension
directCommands:
- uid: az_monitor_health-models_relationship_create
  name: az monitor health-models relationship create
  summary: |-
    Create a Relationship.
  status: GA
  sourceType: Extension
  syntax: >-
    az monitor health-models relationship create --health-model-name
                                                 --name --relationship-name
                                                 --resource-group
                                                 [--acquire-policy-token]
                                                 [--change-reference]
                                                 [--child-entity-name]
                                                 [--display-name]
                                                 [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                                 [--parent-entity-name]
                                                 [--tags]
  examples:
  - summary: |-
      Relationships_CreateOrUpdate
    syntax: az monitor health-models relationship create --resource-group rgopenapi --health-model-name model1 --relationship-name rel1 --display-name My relationship --parent-entity-name Entity1 --child-entity-name Entity2 --tags "{key9681:ixfvzsfnpvkkbrce}"
  requiredParameters:
  - isRequired: true
    name: --health-model-name
    summary: |-
      Name of health model resource.
  - isRequired: true
    name: --name --relationship-name -n
    summary: |-
      Name of the relationship. Must be unique within a health model. For example, a concatenation of parentEntityName and childEntityName can be used as the name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --child-entity-name
    summary: |-
      Resource name of the child entity.
    groupName: Properties Arguments
  - name: --display-name
    summary: |-
      Display name.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --parent-entity-name
    summary: |-
      Resource name of the parent entity.
    groupName: Properties Arguments
  - name: --tags
    summary: |-
      Optional set of tags (key-value pairs)  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

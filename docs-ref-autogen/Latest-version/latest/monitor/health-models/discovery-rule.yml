### YamlMime:AzureCLIGroup
uid: az_monitor_health-models_discovery-rule
name: az monitor health-models discovery-rule
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **health-models** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az monitor health-models discovery-rule** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Discoveryrule.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az monitor health-models' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Extension
directCommands:
- uid: az_monitor_health-models_discovery-rule_create
  name: az monitor health-models discovery-rule create
  summary: |-
    Create a DiscoveryRule.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az monitor health-models discovery-rule' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az monitor health-models discovery-rule create --discovery-rule-name --name
                                                   --health-model-name
                                                   --resource-group
                                                   [--acquire-policy-token]
                                                   [--add-recommended-signals {Disabled, Enabled}]
                                                   [--add-resource-health-signal {Disabled, Enabled}]
                                                   [--authentication-setting]
                                                   [--change-reference]
                                                   [--discover-relationships {Disabled, Enabled}]
                                                   [--display-name]
                                                   [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                                   [--specification]
  examples:
  - summary: |-
      DiscoveryRules_CreateOrUpdate
    syntax: az monitor health-models discovery-rule create --resource-group myResourceGroup --health-model-name myHealthModel --discovery-rule-name myDiscoveryRule --authentication-setting authSetting1 --display-name myDisplayName --discover-relationships Enabled --add-recommended-signals Enabled --specification "{resourceGraphQuery:'resources | where subscriptionId == '/7ddfffd7-9b32-40df-1234-828cbd55d6f4'/ | where resourceGroup == '/my-rg'/',resource-graph-query:{resource-graph-query:'resources | where subscriptionId == '/7ddfffd7-9b32-40df-1234-828cbd55d6f4'/ | where resourceGroup == '/my-rg'/'}}" --add-resource-health-signal Enabled
  requiredParameters:
  - isRequired: true
    name: --discovery-rule-name --name -n
    summary: |-
      Name of the discovery rule. Must be unique within a health model.
  - isRequired: true
    name: --health-model-name
    summary: |-
      Name of health model resource.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add-recommended-signals
    acceptedValues: Disabled, Enabled
    summary: |-
      Whether to add all recommended signals to the discovered entities.
    groupName: Properties Arguments
  - name: --add-resource-health-signal
    defaultValue: Enabled
    acceptedValues: Disabled, Enabled
    summary: |-
      Whether to automatically add a signal for the Azure resource's availability state from Azure Resource Health to the discovered entities. Defaults to `Enabled`: discovery rules updated via this API version without setting this field will begin emitting a Resource Health availability signal. Pass `Disabled` to preserve pre-`2026-05-01-preview` behavior.
    groupName: Properties Arguments
  - name: --authentication-setting
    summary: |-
      Reference to the name of the authentication setting which is used for querying Azure Resource Graph. The same authentication setting will also be assigned to any discovered entities.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --discover-relationships
    acceptedValues: Disabled, Enabled
    summary: |-
      Whether to create relationships between the discovered entities based on a set of built-in rules. These relationships cannot be manually deleted.
    groupName: Properties Arguments
  - name: --display-name
    summary: |-
      Display name.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --specification
    summary: |-
      Specification of the discovery rule defining how entities are discovered.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

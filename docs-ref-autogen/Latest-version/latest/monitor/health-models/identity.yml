uid: az_monitor_health-models_identity
name: az monitor health-models identity
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **health-models** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az monitor health-models identity** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Identity.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az monitor health-models' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Extension
directCommands:
- uid: az_monitor_health-models_identity_assign
  name: az monitor health-models identity assign
  summary: |-
    Assign the user or system managed identities.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az monitor health-models identity' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az monitor health-models identity assign --health-model-name --name
                                             --resource-group
                                             [--acquire-policy-token]
                                             [--change-reference]
                                             [--mi-system-assigned --system-assigned]
                                             [--mi-user-assigned --user-assigned]
                                             [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
  examples:
  - summary: |-
      HealthModels_Create
    syntax: az monitor health-models identity assign --resource-group rgopenapi --health-model-name model1
  requiredParameters:
  - isRequired: true
    name: --health-model-name --name -n
    summary: |-
      Name of health model resource.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --mi-system-assigned --system-assigned
    summary: |-
      Set the system managed identity.
    groupName: Resource.identity Arguments
  - name: --mi-user-assigned --user-assigned
    summary: |-
      Set the user managed identities.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource.identity Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_webapp_log_startup
name: az webapp log startup
summary: |-
  View web app container startup logs.
description: |-
  View startup logs written during container initialization for Linux web apps. Use when a container fails to start, crashes on cold start, times out waiting for a port, or returns HTTP 502/503 errors after deployment. These logs contain platform lifecycle events and container stdout/stderr output.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Core
directCommands:
- uid: az_webapp_log_startup_list
  name: az webapp log startup list
  summary: |-
    List all container startup log files for a web app.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'webapp log startup' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  syntax: >-
    az webapp log startup list --name
                               --resource-group
                               [--instance]
                               [--outcome {failure, success}]
                               [--slot]
  examples:
  - summary: |-
      List all startup log files
    syntax: az webapp log startup list --name MyWebApp --resource-group MyResourceGroup
  - summary: |-
      List only failure logs
    syntax: az webapp log startup list --name MyWebApp --resource-group MyResourceGroup --outcome failure
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using `az configure --defaults web=<name>`.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --instance
    summary: |-
      Filter by worker instance name.
  - name: --outcome
    acceptedValues: failure, success
    summary: |-
      Filter by startup outcome.
  - name: --slot -s
    summary: |-
      The name of the slot. Default to the production slot if not specified.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_webapp_log_startup_show
  name: az webapp log startup show
  summary: |-
    Show the content of a container startup log.
  description: |-
    By default, shows the most recent startup log (preferring a failure log when one exists for the latest date). Use --filename to view a specific log file, or --instance to scope the latest-log lookup to a specific worker. --filename and --instance are mutually exclusive.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'webapp log startup' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  syntax: >-
    az webapp log startup show --name
                               --resource-group
                               [--filename]
                               [--instance]
                               [--slot]
  examples:
  - summary: |-
      Show the latest startup log (prefers failures)
    syntax: az webapp log startup show --name MyWebApp --resource-group MyResourceGroup
  - summary: |-
      Show a specific startup log file
    syntax: az webapp log startup show --name MyWebApp --resource-group MyResourceGroup --filename 2026_04_13_lw0sdlwk000002_failure.log
  - summary: |-
      Show the latest startup log for a specific worker instance
    syntax: az webapp log startup show --name MyWebApp --resource-group MyResourceGroup --instance lw0sdlwk000002
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the web app. If left unspecified, a name will be randomly generated. You can configure the default using `az configure --defaults web=<name>`.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --filename -f
    summary: |-
      Name of a specific startup log file to display. If not specified, shows the latest log (preferring failures).
  - name: --instance
    summary: |-
      Filter by worker instance name.
  - name: --slot -s
    summary: |-
      The name of the slot. Default to the production slot if not specified.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_webapp_log_startup_list
- az_webapp_log_startup_show
metadata:
  description: View startup logs written during container initialization for Linux web apps. Use when a container fails to start, crashes on cold start, times out waiting for a port, or returns HTTP 502/503 errors after deployment. These logs contain platform lifecycle events and container stdout/stderr output.

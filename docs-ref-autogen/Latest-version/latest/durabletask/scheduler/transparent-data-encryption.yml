                                                                --scheduler-name
                                                                [--acquire-policy-token]
                                                                [--change-reference]
                                                                [--key-source {CustomerManaged, MicrosoftManaged}]
                                                                [--key-vault-key-uri]
                                                                [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]

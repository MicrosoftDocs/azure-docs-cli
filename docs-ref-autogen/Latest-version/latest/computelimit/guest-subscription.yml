### YamlMime:AzureCLIGroup
uid: az_computelimit_guest-subscription
name: az computelimit guest-subscription
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **computelimit** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az computelimit guest-subscription** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Guest Subscription.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az computelimit' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Extension
directCommands:
- uid: az_computelimit_guest-subscription_add
  name: az computelimit guest-subscription add
  summary: |-
    Add a subscription as a guest to consume the compute limits shared by the host subscription.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az computelimit guest-subscription' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az computelimit guest-subscription add [--acquire-policy-token]
                                           [--change-reference]
                                           [--guest-subscription-id --id]
                                           [--ids]
                                           [--location]
                                           [--subscription]
  examples:
  - summary: |-
      Add a guest subscription
    syntax: az computelimit guest-subscription add --location eastus --guest-subscription-id 11111111-1111-1111-1111-111111111111
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --guest-subscription-id --id
    summary: |-
      The guest subscription id.
    groupName: Resource Id Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --location -l
    summary: |-
      The Azure location name.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_computelimit_guest-subscription_list

### YamlMime:AzureCLIGroup
uid: az_afd_waf-log-analytic_ranking
name: az afd waf-log-analytic ranking
importantNote: >-
  > [!NOTE]

  > This command group has commands that are defined in both Azure CLI and at least one extension. Install each extension to benefit from its extended capabilities. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage WAF related ranking statistics for AFD profile.
status: GA
sourceType: Core and Extension
directCommands:
- uid: az_afd_waf-log-analytic_ranking_list
  name: az afd waf-log-analytic ranking list
  summary: |-
    Get WAF log analytics charts for AFD profile.
  status: GA
  sourceType: Core
  syntax: >-
    az afd waf-log-analytic ranking list --date-time-begin
                                         --date-time-end
                                         --max-ranking
                                         --metrics
                                         --profile-name
                                         --rankings
                                         --resource-group
                                         [--actions]
                                         [--rule-types]
  requiredParameters:
  - isRequired: true
    name: --date-time-begin
    summary: |-
      The start datetime.
  - isRequired: true
    name: --date-time-end
    summary: |-
      The end datetime.
  - isRequired: true
    name: --max-ranking
    summary: |-
      The maximum number of rows to return based on the ranking.
  - isRequired: true
    name: --metrics
    summary: |-
      Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
  - isRequired: true
    name: --profile-name
    summary: |-
      Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group. which is unique within the resource group.
  - isRequired: true
    name: --rankings
    summary: |-
      Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --actions
    summary: |-
      Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
  - name: --rule-types
    summary: |-
      Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

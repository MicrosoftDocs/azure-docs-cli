  status: GA
  sourceType: Extension
  syntax: >-
    az afd profile update [--acquire-policy-token]
                          [--add]
                          [--change-reference]
                          [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                          [--identity]
                          [--ids]
                          [--log-scrubbing]
                          [--name --profile-name]
                          [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                          [--origin-response-timeout-seconds]
                          [--remove]
                          [--resource-group]
                          [--set]
                          [--subscription]
                          [--tags]
  examples:
  - summary: |-
      Profiles_Create
    syntax: az afd profile update --resource-group RG --profile-name profile1 --sku Premium_AzureFrontDoor
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-

### YamlMime:AzureCLIGroup
uid: az_afd_origin
name: az afd origin
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **cdn** extension for the Azure CLI (version 2.85.0 or higher). The extension will automatically install the first time you run an **az afd origin** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage origins within the specified origin group.
status: GA
sourceType: Extension
directCommands:
- uid: az_afd_origin_create
  name: az afd origin create
  summary: |-
    Create a new origin within the specified origin group.
  status: GA
  sourceType: Extension
  syntax: >-
    az afd origin create --name --origin-name
                         --origin-group-name
                         --profile-name
                         --resource-group
                         [--acquire-policy-token]
                         [--change-reference]
                         [--enabled-state {Disabled, Enabled}]
                         [--enforce-certificate-name-check {0, 1, f, false, n, no, t, true, y, yes}]
                         [--host-name]
                         [--http-port]
                         [--https-port]
                         [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                         [--origin-host-header]
                         [--priority]
                         [--shared-private-link-resource]
                         [--weight]
  examples:
  - summary: |-
      AFDOrigins_Create
    syntax: az afd origin create --resource-group RG --profile-name profile1 --origin-group-name origingroup1 --origin-name origin1 --enabled-state Enabled --host-name host1.blob.core.windows.net --http-port 80 --https-port 443 --origin-host-header host1.foo.com
  requiredParameters:
  - isRequired: true
    name: --name --origin-name -n
    summary: |-
      Name of the origin that is unique within the profile.
  - isRequired: true
    name: --origin-group-name
    summary: |-
      Name of the origin group which is unique within the profile.
  - isRequired: true
    name: --profile-name
    summary: |-
      Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --enabled-state
    acceptedValues: Disabled, Enabled
    summary: |-
      Whether to enable health probes to be made against backends defined under backendPools. Health probes can only be disabled if there is a single enabled backend in single enabled backend pool.
    groupName: Properties Arguments
  - name: --enforce-certificate-name-check
    defaultValue: "True"
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Whether to enable certificate name check at origin level.
    groupName: Properties Arguments
  - name: --host-name
    summary: |-
      The address of the origin. Domain names, IPv4 addresses, and IPv6 addresses are supported.This should be unique across all origins in an endpoint.
    groupName: Properties Arguments
  - name: --http-port
    defaultValue: "80"
    summary: |-
      The value of the HTTP port. Must be between 1 and 65535.
    groupName: Properties Arguments
  - name: --https-port
    defaultValue: "443"
    summary: |-
      The value of the HTTPS port. Must be between 1 and 65535.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --origin-host-header
    summary: |-
      The host header value sent to the origin with each request. If you leave this blank, the request hostname determines this value. Azure Front Door origins, such as Web Apps, Blob Storage, and Cloud Services require this host header value to match the origin hostname by default. This overrides the host header defined at Endpoint.
    groupName: Properties Arguments
  - name: --priority
    summary: |-
      Priority of origin in given origin group for load balancing. Higher priorities will not be used for load balancing if any lower priority origin is healthy.Must be between 1 and 5.
    groupName: Properties Arguments
  - name: --shared-private-link-resource
    summary: |-
      The properties of the private link resource for private origin.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --weight
    summary: |-
      Weight of the origin in given origin group for load balancing. Must be between 1 and 1000.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_afd_secret
name: az afd secret
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **cdn** extension for the Azure CLI (version 2.85.0 or higher). The extension will automatically install the first time you run an **az afd secret** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage secrets within the specified profile.
status: GA
sourceType: Extension
directCommands:
- uid: az_afd_secret_create
  name: az afd secret create
  summary: |-
    Create a new Secret within the specified profile.
  status: GA
  sourceType: Extension
  syntax: >-
    az afd secret create --name --secret-name
                         --profile-name
                         --resource-group
                         [--acquire-policy-token]
                         [--change-reference]
                         [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                         [--parameters]
  examples:
  - summary: |-
      Secrets_Create
    syntax: az afd secret create --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secretVersion:abcdef1234578900abcdef1234567890,useLatestVersion:False,customer-certificate:{secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secret-version:abcdef1234578900abcdef1234567890,use-latest-version:False}}"
  - summary: |-
      Secrets_CreateCustomerCertificateType
    syntax: az afd secret create --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secretVersion:abcdef1234578900abcdef1234567890,useLatestVersion:False,customer-certificate:{secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secret-version:abcdef1234578900abcdef1234567890,use-latest-version:False}}" --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secretVersion:abcdef1234578900abcdef1234567890,useLatestVersion:False,customer-certificate:{secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secret-version:abcdef1234578900abcdef1234567890,use-latest-version:False}}"
  - summary: |-
      Secrets_CreateMtlsCertificateChainType
    syntax: az afd secret create --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secretVersion:abcdef1234578900abcdef1234567890,useLatestVersion:False,customer-certificate:{secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secret-version:abcdef1234578900abcdef1234567890,use-latest-version:False}}" --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secretVersion:abcdef1234578900abcdef1234567890,useLatestVersion:False,customer-certificate:{secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secret-version:abcdef1234578900abcdef1234567890,use-latest-version:False}}" --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vaults/kvName/secrets/mTLSCertificateChainname},secretVersion:abcdef1234578900abcdef1234567890,mtls-certificate-chain:{secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vaults/kvName/secrets/mTLSCertificateChainname},secret-version:abcdef1234578900abcdef1234567890}}"
  - summary: |-
      Secrets_CreateUrlSigningKeyType
    syntax: az afd secret create --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secretVersion:abcdef1234578900abcdef1234567890,useLatestVersion:False,customer-certificate:{secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secret-version:abcdef1234578900abcdef1234567890,use-latest-version:False}}" --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secretVersion:abcdef1234578900abcdef1234567890,useLatestVersion:False,customer-certificate:{secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secret-version:abcdef1234578900abcdef1234567890,use-latest-version:False}}" --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vaults/kvName/secrets/mTLSCertificateChainname},secretVersion:abcdef1234578900abcdef1234567890,mtls-certificate-chain:{secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vaults/kvName/secrets/mTLSCertificateChainname},secret-version:abcdef1234578900abcdef1234567890}}" --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{keyId:customKeyId,secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/urlsigningkeyname},secretVersion:abcdef1234578900abcdef1234567890,url-signing-key:{key-id:customKeyId,secret-source:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/urlsigningkeyname},secret-version:abcdef1234578900abcdef1234567890}}"
  requiredParameters:
  - isRequired: true
    name: --name --secret-name -n
    summary: |-
      Name of the Secret under the profile.
  - isRequired: true
    name: --profile-name
    summary: |-
      Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --parameters
    summary: |-
      Object which contains secret parameters  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

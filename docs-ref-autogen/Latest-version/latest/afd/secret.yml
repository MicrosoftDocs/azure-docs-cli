                         [--name --secret-name]
                         [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                         [--parameters]
                         [--profile-name]
                         [--remove]
                         [--resource-group]
                         [--set]
                         [--subscription]
  examples:
  - summary: |-
      Secrets_Create
    syntax: az afd secret update --resource-group RG --profile-name profile1 --secret-name secret1 --parameters "{type:CustomerCertificate,secretSource:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.KeyVault/vault/kvName/secrets/certificatename},secretVersion:abcdef1234578900abcdef1234567890,useLatestVersion:False}"

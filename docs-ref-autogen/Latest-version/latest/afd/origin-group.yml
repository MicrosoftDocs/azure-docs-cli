### YamlMime:AzureCLIGroup
uid: az_afd_origin-group
name: az afd origin-group
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **cdn** extension for the Azure CLI (version 2.85.0 or higher). The extension will automatically install the first time you run an **az afd origin-group** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage origin groups under the specified profile.
status: GA
sourceType: Extension
directCommands:
- uid: az_afd_origin-group_create
  name: az afd origin-group create
  summary: |-
    Create a new origin group within the specified profile.
  status: GA
  sourceType: Extension
  syntax: >-
    az afd origin-group create --name --origin-group-name
                               --profile-name
                               --resource-group
                               [--acquire-policy-token]
                               [--additional-latency-in-milliseconds]
                               [--authentication]
                               [--change-reference]
                               [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                               [--probe-interval-in-seconds]
                               [--probe-path]
                               [--probe-protocol {Http, Https, NotSet}]
                               [--probe-request-type {GET, HEAD, NotSet}]
                               [--sample-size]
                               [--successful-samples-required]
  examples:
  - summary: |-
      AFDOriginGroups_Create
    syntax: az afd origin-group create --resource-group RG --profile-name profile1 --origin-group-name origingroup1 --authentication "{type:UserAssignedIdentity,scope:'https://www.contoso.com/.default',user-assigned-identity:{id:/subscriptions/subid/resourcegroups/RG/providers/Microsoft.ManagedIdentity/userAssignedIdentities/user-assigned-id-1}}" --probe-interval-in-seconds 10 --probe-path /path2 --probe-protocol NotSet --probe-request-type NotSet --additional-latency-in-milliseconds 1000 --sample-size 3 --successful-samples-required 3 --traffic-restoration-time-to-healed-or-new-endpoints-in-minutes 5
  requiredParameters:
  - isRequired: true
    name: --name --origin-group-name -n
    summary: |-
      Name of the origin group which is unique within the endpoint.
  - isRequired: true
    name: --profile-name
    summary: |-
      Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --additional-latency-in-milliseconds
    summary: |-
      The additional latency in milliseconds for probes to fall into the lowest latency bucket.
    groupName: LoadBalancingSettings Arguments
  - name: --authentication
    summary: |-
      Authentication settings for origin in origin group.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --probe-interval-in-seconds
    summary: |-
      The number of seconds between health probes.Default is 240sec.
    groupName: HealthProbeSettings Arguments
  - name: --probe-path
    summary: |-
      The path relative to the origin that is used to determine the health of the origin.
    groupName: HealthProbeSettings Arguments
  - name: --probe-protocol
    acceptedValues: Http, Https, NotSet
    summary: |-
      Protocol to use for health probe.
    groupName: HealthProbeSettings Arguments
  - name: --probe-request-type
    acceptedValues: GET, HEAD, NotSet
    summary: |-
      The type of health probe request that is made.
    groupName: HealthProbeSettings Arguments
  - name: --sample-size
    summary: |-
      The number of samples to consider for load balancing decisions.
    groupName: LoadBalancingSettings Arguments
  - name: --successful-samples-required
    summary: |-
      The number of samples within the sample period that must succeed.
    groupName: LoadBalancingSettings Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

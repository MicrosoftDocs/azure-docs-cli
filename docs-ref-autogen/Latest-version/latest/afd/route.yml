### YamlMime:AzureCLIGroup
uid: az_afd_route
name: az afd route
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **cdn** extension for the Azure CLI (version 2.85.0 or higher). The extension will automatically install the first time you run an **az afd route** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage routes under an AFD endpoint.
status: GA
sourceType: Extension
directCommands:
- uid: az_afd_route_create
  name: az afd route create
  summary: |-
    Create a new route with the specified route name under the specified subscription, resource group, profile, and AzureFrontDoor endpoint.
  status: GA
  sourceType: Extension
  syntax: >-
    az afd route create --endpoint-name
                        --name --route-name
                        --profile-name
                        --resource-group
                        [--acquire-policy-token]
                        [--cache-configuration]
                        [--change-reference]
                        [--enabled-state {Disabled, Enabled}]
                        [--formatted-custom-domains]
                        [--formatted-rule-sets]
                        [--forwarding-protocol {HttpOnly, HttpsOnly, MatchRequest}]
                        [--https-redirect {Disabled, Enabled}]
                        [--link-to-default-domain {Disabled, Enabled}]
                        [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                        [--origin-group]
                        [--origin-path]
                        [--patterns-to-match]
                        [--supported-protocols]
  examples:
  - summary: |-
      Routes_Create
    syntax: az afd route create --resource-group RG --profile-name profile1 --endpoint-name endpoint1 --route-name route1 --cache-configuration "{compression-settings:{content-types-to-compress:[text/html,application/octet-stream],is-compression-enabled:True},query-parameters:querystring=test,query-string-caching-behavior:IgnoreSpecifiedQueryStrings}" --formatted-custom-domains "[{id:/subscriptions/subid/resourceGroups/RG/providers/Microsoft.Cdn/profiles/profile1/customDomains/domain1}]" --enabled-state Enabled --forwarding-protocol MatchRequest --https-redirect Enabled --link-to-default-domain Enabled --origin-group /subscriptions/subid/resourceGroups/RG/providers/Microsoft.Cdn/profiles/profile1/originGroups/originGroup1 --origin-path None --patterns-to-match "[/*]" --formatted-rule-sets "[{id:/subscriptions/subid/resourceGroups/RG/providers/Microsoft.Cdn/profiles/profile1/ruleSets/ruleSet1}]" --supported-protocols "[Https,Http]"
  requiredParameters:
  - isRequired: true
    name: --endpoint-name
    summary: |-
      Name of the endpoint under the profile which is unique globally.
  - isRequired: true
    name: --name --route-name -n
    summary: |-
      Name of the routing rule.
  - isRequired: true
    name: --profile-name
    summary: |-
      Name of the Azure Front Door Standard or Azure Front Door Premium profile which is unique within the resource group.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --cache-configuration
    summary: |-
      The caching configuration for this route. To disable caching, do not provide a cacheConfiguration object.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --enabled-state
    acceptedValues: Disabled, Enabled
    summary: |-
      Whether to enable use of this rule. Permitted values are 'Enabled' or 'Disabled'.
    groupName: Properties Arguments
  - name: --formatted-custom-domains
    summary: |-
      Domains referenced by this endpoint.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --formatted-rule-sets
    summary: |-
      Rule sets referenced by this endpoint.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --forwarding-protocol
    defaultValue: MatchRequest
    acceptedValues: HttpOnly, HttpsOnly, MatchRequest
    summary: |-
      Protocol this rule will use when forwarding traffic to backends.
    groupName: Properties Arguments
  - name: --https-redirect
    defaultValue: Disabled
    acceptedValues: Disabled, Enabled
    summary: |-
      Whether to automatically redirect HTTP traffic to HTTPS traffic. Note that this is a easy way to set up this rule and it will be the first rule that gets executed.
    groupName: Properties Arguments
  - name: --link-to-default-domain
    defaultValue: Disabled
    acceptedValues: Disabled, Enabled
    summary: |-
      Whether this route will be linked to the default endpoint domain.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --origin-group
    summary: |-
      Name or ID of the origin group to be associated with.
    groupName: OriginGroup Arguments
  - name: --origin-path
    summary: |-
      A directory path on the origin that AzureFrontDoor can use to retrieve content from, e.g. contoso.cloudapp.net/originpath.
    groupName: Properties Arguments
  - name: --patterns-to-match
    summary: |-
      The route patterns of the rule.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --supported-protocols
    defaultValue: "['Http', 'Https']"
    summary: |-
      List of supported protocols for this route.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_afd_route_delete

      Remove 2 user assigned identities.
    syntax: az sig identity remove -g myResourceGroup -r myGalleryName --user-assigned id1 id2
  - summary: |-
      Remove all user assigned identities.
    syntax: az sig identity remove -g myResourceGroup -r myGalleryName --user-assigned
  - summary: |-
      Remove the system assigned ientity and user assigned identity.
    syntax: az sig identity remove -g myResourceGroup -r myGalleryName --system-assigned --user-assigned

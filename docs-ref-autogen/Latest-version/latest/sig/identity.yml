### YamlMime:AzureCLIGroup
uid: az_sig_identity
name: az sig identity
summary: |-
  Manage Identity.
status: GA
sourceType: Core
directCommands:
- uid: az_sig_identity_assign
  name: az sig identity assign
  summary: |-
    Assign the user or system managed identities.
  status: GA
  sourceType: Core
  syntax: >-
    az sig identity assign --gallery-name
                           --resource-group
                           [--acquire-policy-token]
                           [--change-reference]
                           [--mi-system-assigned --system-assigned]
                           [--mi-user-assigned --user-assigned]
                           [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
  examples:
  - summary: |-
      Enable the system assigned identity.
    syntax: az sig identity assign -g MyResourceGroup -r MyGalleryName --system-assigned
  - summary: |-
      Add a user assigned identity.
    syntax: az sig identity assign -g MyResourceGroup -r MyGalleryName --user-assigned id1
  - summary: |-
      Add 2 user assigned identities.
    syntax: az sig identity assign -g MyResourceGroup -r MyGalleryName --user-assigned id1 id2
  - summary: |-
      Enable system assigned identity and add a user assigned identity.
    syntax: az sig identity assign -g MyResourceGroup -r MyGalleryName --system-assigned --user-assigned id1
  requiredParameters:
  - isRequired: true
    name: --gallery-name -r
    summary: |-
      The name of the Shared Image Gallery.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --mi-system-assigned --system-assigned
    summary: |-
      Set the system managed identity.
    groupName: Gallery.identity Arguments
  - name: --mi-user-assigned --user-assigned
    summary: |-
      Set the user managed identities.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Gallery.identity Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

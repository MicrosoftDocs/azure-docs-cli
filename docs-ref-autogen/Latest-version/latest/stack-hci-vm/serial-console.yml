### YamlMime:AzureCLIGroup
uid: az_stack-hci-vm_serial-console
name: az stack-hci-vm serial-console
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **stack-hci-vm** extension for the Azure CLI (version 2.15.0 or higher). The extension will automatically install the first time you run an **az stack-hci-vm serial-console** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage serial console access for Azure Local virtual machines (applies to multi-rack deployments only).
status: GA
sourceType: Extension
directCommands:
- uid: az_stack-hci-vm_serial-console_connect
  name: az stack-hci-vm serial-console connect
  summary: |-
    Connect to the serial console of an Azure Local virtual machine (applies to multi-rack deployments only).
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm serial-console connect --name
                                           --resource-group
                                           [--acquire-policy-token]
                                           [--change-reference]
  examples:
  - summary: |-
      ConnectToSerialConsole
    syntax: az stack-hci-vm serial-console connect --name "test-vm" --resource-group "test-rg"
  requiredParameters:
  - isRequired: true
    name: --name
    summary: |-
      Name of the virtual machine.
    description: |-
      Usage: --name "test-vm".
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Resource group of the virtual machine.
    description: |-
      Usage: --resource-group "test-rg".
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_stack-hci-vm_serial-console_connect
metadata:
  description: Manage serial console access for Azure Local virtual machines (applies to multi-rack deployments only).

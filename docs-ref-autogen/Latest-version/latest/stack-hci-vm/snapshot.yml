### YamlMime:AzureCLIGroup
uid: az_stack-hci-vm_snapshot
name: az stack-hci-vm snapshot
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **stack-hci-vm** extension for the Azure CLI (version 2.15.0 or higher). The extension will automatically install the first time you run an **az stack-hci-vm snapshot** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage snapshots with stack-hci-vm (applies to multi-rack deployments only).
status: GA
sourceType: Extension
directCommands:
- uid: az_stack-hci-vm_snapshot_create
  name: az stack-hci-vm snapshot create
  summary: |-
    Create a snapshot from a source disk (applies to multi-rack deployments only).
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm snapshot create --custom-location
                                    --name
                                    --resource-group
                                    [--acquire-policy-token]
                                    [--change-reference]
                                    [--location]
                                    [--polling-interval]
                                    [--source-resource-id]
                                    [--tags]
  examples:
  - summary: |-
      CreateSnapshotFromDisk
    syntax: az stack-hci-vm snapshot create --resource-group "test-rg" --custom-location "/subscriptions/a95612cb-f1fa-4daa-a4fd-272844fa512c/resourceGroups/dogfoodarc/providers/Microsoft.ExtendedLocation/customLocations/dogfood-location" --location "West US2" --name "test-snapshot" --source-resource-id "/subscriptions/a95612cb-f1fa-4daa-a4fd-272844fa512c/resourceGroups/dogfoodarc/providers/Microsoft.AzureStackHCI/virtualHardDisks/test-vhd"
  requiredParameters:
  - isRequired: true
    name: --custom-location
    summary: |-
      The ID of the custom location.
  - isRequired: true
    name: --name
    summary: |-
      Name of the snapshot.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --location -l
    summary: |-
      If location is not specified, the location of the resource group is used.
  - name: --polling-interval
    summary: |-
      ARM polling interval for long running operations.
  - name: --source-resource-id
    summary: |-
      ARM ID of the source disk to create the snapshot from.
    description: |-
      Usage: --source-resource-id "/subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.AzureStackHCI/virtualHardDisks/{diskName}"
      This is required when creating a snapshot using the Copy create option.
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

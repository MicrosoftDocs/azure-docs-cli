### YamlMime:AzureCLIGroup
uid: az_stack-hci-vm_network_lb_backend-pool
name: az stack-hci-vm network lb backend-pool
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **stack-hci-vm** extension for the Azure CLI (version 2.15.0 or higher). The extension will automatically install the first time you run an **az stack-hci-vm network lb backend-pool** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage backend address pools on a load balancer.
status: GA
sourceType: Extension
directCommands:
- uid: az_stack-hci-vm_network_lb_backend-pool_add
  name: az stack-hci-vm network lb backend-pool add
  summary: |-
    Add a backend address pool and its NIC targets.
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm network lb backend-pool add --address
                                                --lb-name
                                                --name
                                                --resource-group
                                                [--acquire-policy-token]
                                                [--change-reference]
                                                [--lnet-id]
                                                [--vnet-id]
  examples:
  - summary: |-
      Add Backend Pool With Two NICs
    syntax: az stack-hci-vm network lb backend-pool add --resource-group "test-rg" --lb-name "test-lb" --name "web-pool" --vnet-id /subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.AzureStackHCI/virtualNetworks/test-vnet --address name=web-1 nic-ip-config=/subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.AzureStackHCI/networkInterfaces/vm1-nic/ipConfigurations/ipconfig --address name=web-2 nic-ip-config=/subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.AzureStackHCI/networkInterfaces/vm2-nic/ipConfigurations/ipconfig
  requiredParameters:
  - isRequired: true
    name: --address
    summary: |-
      Repeatable key/value describing NIC IP configurations.
  - isRequired: true
    name: --lb-name
    summary: |-
      Name of the load balancer that owns the backend pool.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the backend address pool to create.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --lnet-id
    summary: |-
      Resource ID of the logical network associated with these addresses.
  - name: --vnet-id
    summary: |-
      Virtual network resource ID backing the pool.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

- uid: az_stack-hci-vm_network_lb_backend-pool_update
  name: az stack-hci-vm network lb backend-pool update
  summary: |-
    Update a backend pool's network scope or replace all addresses.
  description: |-
    WARNING: The --address parameter uses replacement semantics, not additive. 
    Supplying any --address values will REPLACE ALL existing addresses in the pool.
    To add new addresses, make sure to include all existing addresses in the command.
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm network lb backend-pool update --lb-name
                                                   --name
                                                   --resource-group
                                                   [--acquire-policy-token]
                                                   [--address]
                                                   [--change-reference]
                                                   [--lnet-id]
                                                   [--vnet-id]
  examples:
  - summary: |-
      Update backend addresses (WARNING removes any addresses not listed)
    syntax: az stack-hci-vm network lb backend-pool update --resource-group "test-rg" --lb-name "test-lb" --name "web-pool" --address name=api-1 nic-ip-config=/subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.AzureStackHCI/networkInterfaces/api-nic/ipConfigurations/ipconfig
  requiredParameters:
  - isRequired: true
    name: --lb-name
    summary: |-
      Name of the load balancer that owns the backend pool.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the backend address pool to update.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --address
    summary: |-
      REPLACES all backend addresses with provided addresses. Uses the same key=value schema as add. WARNING: This is not additive - any existing addresses not included as separate --address args will be removed.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --lnet-id
    summary: |-
      Updated logical network resource ID. Provide empty string to clear.
  - name: --vnet-id
    summary: |-
      Updated virtual network resource ID. Provide empty string to clear.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

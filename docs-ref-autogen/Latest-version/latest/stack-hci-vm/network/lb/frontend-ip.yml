### YamlMime:AzureCLIGroup
uid: az_stack-hci-vm_network_lb_frontend-ip
name: az stack-hci-vm network lb frontend-ip
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **stack-hci-vm** extension for the Azure CLI (version 2.15.0 or higher). The extension will automatically install the first time you run an **az stack-hci-vm network lb frontend-ip** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage frontend IP configurations on a load balancer.
status: GA
sourceType: Extension
directCommands:
- uid: az_stack-hci-vm_network_lb_frontend-ip_add
  name: az stack-hci-vm network lb frontend-ip add
  summary: |-
    Add a frontend IP configuration to an existing load balancer.
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm network lb frontend-ip add --lb-name
                                               --name
                                               --resource-group
                                               [--allocation-method {Dynamic, Static}]
                                               [--private-ip]
                                               [--public-ip-id]
                                               [--subnet-id]
  examples:
  - summary: |-
      Add Dynamic Frontend
    syntax: az stack-hci-vm network lb frontend-ip add --resource-group "test-rg" --lb-name "test-lb" --name "fe-dyn" --allocation-method Dynamic --subnet-id /subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.AzureStackHCI/virtualNetworks/test-vnet/subnets/subnet1
  - summary: |-
      Add Static Frontend
    syntax: az stack-hci-vm network lb frontend-ip add --resource-group "test-rg" --lb-name "test-lb" --name "fe-static" --allocation-method Static --private-ip 10.0.0.5 --subnet-id /subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.AzureStackHCI/virtualNetworks/test-vnet/subnets/subnet1
  requiredParameters:
  - isRequired: true
    name: --lb-name
    summary: |-
      Name of the load balancer that owns the frontend IP.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the frontend IP configuration to create.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --allocation-method
    acceptedValues: Dynamic, Static
    summary: |-
      Set Static to select a private IP, otherwise Dynamic.
  - name: --private-ip
    summary: |-
      Static private IP to assign when using Static allocation.
  - name: --public-ip-id
    summary: |-
      Resource ID of the public IP to associate with this frontend configuration.
  - name: --subnet-id
    summary: |-
      Resource ID of the subnet that provides connectivity.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_stack-hci-vm_network_lb_frontend-ip_delete

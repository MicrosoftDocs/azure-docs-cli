- uid: az_stack-hci-vm_network_lb_lb-rule_update
  name: az stack-hci-vm network lb lb-rule update
  summary: |-
    Update ports, protocols, or probe bindings on an existing rule.
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm network lb lb-rule update --lb-name
                                              --name
                                              --resource-group
                                              [--backend-pool-name]
                                              [--backend-port]
                                              [--frontend-ip-name]
                                              [--frontend-port]
                                              [--load-distribution]
                                              [--probe]
                                              [--protocol {Tcp, Udp}]
  examples:
  - summary: |-
      Change Backend Port
    syntax: az stack-hci-vm network lb lb-rule update --resource-group "test-rg" --lb-name "test-lb" --name "https-rule" --backend-port 9443
  requiredParameters:
  - isRequired: true
    name: --lb-name
    summary: |-
      Name of the load balancer that owns the rule.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the load balancing rule to update.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --backend-pool-name
    summary: |-
      Updated backend pool reference.
  - name: --backend-port
    summary: |-
      Updated backend port.
  - name: --frontend-ip-name
    summary: |-
      Updated frontend IP configuration reference.
  - name: --frontend-port
    summary: |-
      Updated frontend port.
  - name: --load-distribution
    summary: |-
      Updated load distribution policy. Provide empty string to clear.
  - name: --probe
    summary: |-
      Updated probe reference. Provide empty string to clear.
  - name: --protocol
    acceptedValues: Tcp, Udp
    summary: |-
      Updated protocol.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.

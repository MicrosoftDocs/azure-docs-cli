### YamlMime:AzureCLIGroup
uid: az_stack-hci-vm_network_lb_lb-rule
name: az stack-hci-vm network lb lb-rule
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **stack-hci-vm** extension for the Azure CLI (version 2.15.0 or higher). The extension will automatically install the first time you run an **az stack-hci-vm network lb lb-rule** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage load-balancing rules on a load balancer.
status: GA
sourceType: Extension
directCommands:
- uid: az_stack-hci-vm_network_lb_lb-rule_add
  name: az stack-hci-vm network lb lb-rule add
  summary: |-
    Create a load-balancing rule that binds a frontend, backend pool, and optional probe.
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm network lb lb-rule add --backend-pool-name
                                           --backend-port
                                           --frontend-ip-name
                                           --frontend-port
                                           --lb-name
                                           --name
                                           --protocol {Tcp, Udp}
                                           --resource-group
                                           [--load-distribution]
                                           [--probe]
  examples:
  - summary: |-
      Add HTTPS Rule
    syntax: az stack-hci-vm network lb lb-rule add --resource-group "test-rg" --lb-name "test-lb" --name "https-rule" --frontend-ip-name "fe-static" --backend-pool-name "web-pool" --protocol Tcp --frontend-port 443 --backend-port 8443 --probe "healthz"
  requiredParameters:
  - isRequired: true
    name: --backend-pool-name
    summary: |-
      Name of the backend address pool referenced by this rule.
  - isRequired: true
    name: --backend-port
    summary: |-
      Backend port to forward traffic to.
  - isRequired: true
    name: --frontend-ip-name
    summary: |-
      Name of the frontend IP configuration referenced by this rule.
  - isRequired: true
    name: --frontend-port
    summary: |-
      Frontend port to listen on.
  - isRequired: true
    name: --lb-name
    summary: |-
      Name of the load balancer that owns the rule.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the load balancing rule to create.
  - isRequired: true
    name: --protocol
    acceptedValues: Tcp, Udp
    summary: |-
      Protocol handled by the rule.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --load-distribution
    summary: |-
      Load distribution policy to apply.
  - name: --probe
    summary: |-
      Name of the health probe to associate with this rule.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_stack-hci-vm_network_lb_lb-rule_delete

### YamlMime:AzureCLIGroup
uid: az_stack-hci-vm_network_lb_probe
name: az stack-hci-vm network lb probe
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **stack-hci-vm** extension for the Azure CLI (version 2.15.0 or higher). The extension will automatically install the first time you run an **az stack-hci-vm network lb probe** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage health probes attached to load balancers.
status: GA
sourceType: Extension
directCommands:
- uid: az_stack-hci-vm_network_lb_probe_add
  name: az stack-hci-vm network lb probe add
  summary: |-
    Add a TCP or HTTP health probe.
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm network lb probe add --lb-name
                                         --name
                                         --port
                                         --protocol {Http, Tcp}
                                         --resource-group
                                         [--acquire-policy-token]
                                         [--change-reference]
                                         [--interval]
                                         [--path]
                                         [--threshold]
  examples:
  - summary: |-
      Add HTTP Probe
    syntax: az stack-hci-vm network lb probe add --resource-group "test-rg" --lb-name "test-lb" --name "healthz" --protocol Http --port 8080 --path /healthz --interval 10 --threshold 2
  requiredParameters:
  - isRequired: true
    name: --lb-name
    summary: |-
      Name of the load balancer that owns the health probe.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the health probe to create.
  - isRequired: true
    name: --port
    summary: |-
      Port to probe on the backend instances.
  - isRequired: true
    name: --protocol
    acceptedValues: Http, Tcp
    summary: |-
      Specify Tcp or Http.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --interval
    summary: |-
      Probe interval in seconds.
  - name: --path
    summary: |-
      Required when protocol is Http.
  - name: --threshold
    summary: |-
      Number of consecutive failures before marking backend unhealthy.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

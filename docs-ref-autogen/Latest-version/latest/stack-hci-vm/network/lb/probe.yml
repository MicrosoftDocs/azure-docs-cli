- uid: az_stack-hci-vm_network_lb_probe_update
  name: az stack-hci-vm network lb probe update
  summary: |-
    Update probe settings such as interval or threshold.
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm network lb probe update --lb-name
                                            --name
                                            --resource-group
                                            [--acquire-policy-token]
                                            [--change-reference]
                                            [--interval]
                                            [--path]
                                            [--port]
                                            [--protocol {Http, Tcp}]
                                            [--threshold]
  examples:
  - summary: |-
      Slow Down Probe Frequency
    syntax: az stack-hci-vm network lb probe update --resource-group "test-rg" --lb-name "test-lb" --name "healthz" --interval 15 --threshold 4
  requiredParameters:
  - isRequired: true
    name: --lb-name
    summary: |-
      Name of the load balancer that owns the health probe.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the health probe to update.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --interval
    summary: |-
      Updated probe interval in seconds.
  - name: --path
    summary: |-
      Updated probe path. Provide empty string to clear.
  - name: --port
    summary: |-
      Updated port to probe.
  - name: --protocol
    acceptedValues: Http, Tcp
    summary: |-
      Updated probe protocol.
  - name: --threshold
    summary: |-
      Updated unhealthy threshold.
  globalParameters:
  - name: --debug

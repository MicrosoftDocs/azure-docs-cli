### YamlMime:AzureCLIGroup
uid: az_stack-hci-vm_network_nat_inbound-rule
name: az stack-hci-vm network nat inbound-rule
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **stack-hci-vm** extension for the Azure CLI (version 2.15.0 or higher). The extension will automatically install the first time you run an **az stack-hci-vm network nat inbound-rule** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage inbound NAT rules with stack-hci-vm.
status: GA
sourceType: Extension
directCommands:
- uid: az_stack-hci-vm_network_nat_inbound-rule_create
  name: az stack-hci-vm network nat inbound-rule create
  summary: |-
    Create an inbound NAT rule.
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm network nat inbound-rule create --backend-ip-config
                                                    --backend-port
                                                    --frontend-port
                                                    --name
                                                    --nat-gateway-name
                                                    --protocol
                                                    --public-ip-address
                                                    --resource-group
                                                    [--acquire-policy-token]
                                                    [--change-reference]
                                                    [--custom-location]
                                                    [--location]
                                                    [--polling-interval]
                                                    [--tags]
  examples:
  - summary: |-
      CreateInboundRule
    syntax: az stack-hci-vm network nat inbound-rule create --resource-group "test-rg" --nat-gateway-name "test-nat" --name "sshRule" --location "eastus" --custom-location "/subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.ExtendedLocation/customLocations/test-location" --protocol "Tcp" --frontend-port 2222 --backend-port 22 --backend-ip-config "/subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.Network/networkInterfaces/vm1nic/ipConfigurations/ipconfig1" --public-ip-address "/subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.Network/publicIPAddresses/test-pip1"
  requiredParameters:
  - isRequired: true
    name: --backend-ip-config
    summary: |-
      Resource ID of the backend IP configuration.
  - isRequired: true
    name: --backend-port
    summary: |-
      Backend port for the inbound rule.
  - isRequired: true
    name: --frontend-port
    summary: |-
      Frontend port for the inbound rule.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the inbound NAT rule.
  - isRequired: true
    name: --nat-gateway-name
    summary: |-
      Name of the NAT gateway.
  - isRequired: true
    name: --protocol
    summary: |-
      Protocol for the NAT rule. Allowed values: Tcp, Udp.
  - isRequired: true
    name: --public-ip-address
    summary: |-
      Resource ID of the public IP address for this NAT rule.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --custom-location
    summary: |-
      The ID of the custom location. If omitted, inherited from the parent NAT gateway.
  - name: --location -l
    summary: |-
      If location is not specified, the location of the resource group is used.
  - name: --polling-interval
    summary: |-
      ARM polling interval for long running operations.
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

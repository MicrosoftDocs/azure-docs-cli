### YamlMime:AzureCLIGroup
uid: az_stack-hci-vm_network_lb
name: az stack-hci-vm network lb
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **stack-hci-vm** extension for the Azure CLI (version 2.15.0 or higher). The extension will automatically install the first time you run an **az stack-hci-vm network lb** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage load balancers with stack-hci-vm.
status: GA
sourceType: Extension
directCommands:
- uid: az_stack-hci-vm_network_lb_create
  name: az stack-hci-vm network lb create
  summary: |-
    Create a load balancer.
  status: GA
  sourceType: Extension
  syntax: >-
    az stack-hci-vm network lb create --custom-location
                                      --name
                                      --resource-group
                                      [--backend-pool]
                                      [--frontend-ip]
                                      [--lb-rule]
                                      [--location]
                                      [--probe]
                                      [--tags]
  examples:
  - summary: |-
      Create load balancer with dynamic frontend IP
    syntax: az stack-hci-vm network lb create --resource-group "test-rg" --name "web-lb" --location "eastus" --custom-location "/subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.ExtendedLocation/customLocations/test-location" --frontend-ip name=web-fe allocation-method=Dynamic subnet-id="/subscriptions/xxxx/resourceGroups/test-rg/providers/Microsoft.Network/virtualNetworks/test-vnet/subnets/subnet1"
  - summary: |-
      Create load balancer with static frontend IP, backend pool, rule, and probe
    syntax: az stack-hci-vm network lb create --resource-group "test-rg" --name "complex-lb" --location "eastus" --custom-location "/subscriptions/xxxx/customLocations/test-location" --frontend-ip name=static-fe allocation-method=Static private-ip=10.0.0.5 subnet-id="/subscriptions/xxxx/vnet/subnet1" --backend-pool name=web-pool vnet-id="/subscriptions/xxxx/vnet1" addresses="/subscriptions/xxxx/nic1/ipconfigurations/ipconfig1","/subscriptions/xxxx/nic2/ipconfigurations/ipconfig1" --lb-rule name=http-rule frontend-ip-name=static-fe backend-pool-name=web-pool protocol=Tcp frontend-port=80 backend-port=8080 --probe name=health-probe protocol=Tcp port=80
  - summary: |-
      Create load balancer with multiple frontend IPs
    syntax: az stack-hci-vm network lb create --resource-group "test-rg" --name "multi-fe-lb" --location "eastus" --custom-location "/subscriptions/xxxx/customLocations/test-location" --frontend-ip name=dynamic-fe allocation-method=Dynamic subnet-id="/sub/sn1" --frontend-ip name=static-fe1 allocation-method=Static private-ip=10.0.0.5 subnet-id="/sub/sn2" --frontend-ip name=static-fe2 allocation-method=Static private-ip=10.0.0.6 subnet-id="/sub/sn2"
  requiredParameters:
  - isRequired: true
    name: --custom-location
    summary: |-
      The ID of the custom location.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the load balancer.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --backend-pool
    summary: |-
      Backend address pool (repeatable). Required: name and addresses=`<nic-ip-config-id>`[,`<nic-ip-config-id>`...]. Optional: vnet-id=`<id>` or lnet-id=`<id>` (exactly one when provided). Example: --backend-pool name=pool1 vnet-id=/sub/vnet1 addresses=/sub/.../nic1/ipConfigurations/ipconfig1,/sub/.../nic2/ipConfigurations/ipconfig2.
  - name: --frontend-ip
    summary: |-
      Frontend IP configuration (repeatable). Required: name and at least one of subnet-id or public-ip-id. Optional: allocation-method=`<Static|Dynamic>` (defaults to Dynamic) and private-ip=`<ip>` (Static only). Example: --frontend-ip name=fe1 subnet-id=/sub/vnet/sn1.
  - name: --lb-rule
    summary: |-
      Load balancing rule (repeatable). Format: name=`<name>` frontend-ip=`<fe-name>` backend-pool=`<pool-name>` protocol=`<Tcp|Udp>` frontend-port=`<port>` backend-port=`<port>` [probe=`<probe-name>`] [load-distribution=`<policy>`]. Example: --lb-rule name=http frontend-ip=fe1 backend-pool=pool1 protocol=Tcp frontend-port=80 backend-port=8080.
  - name: --location -l
    summary: |-
      If location is not specified, the location of the resource group is used.
  - name: --probe
    summary: |-
      Health probe. Can be specified multiple times. Format: name=`<name>` protocol=`<Tcp|Http>` port=`<port>` [path=`<path>`] [interval=`<secs>`] [threshold=`<count>`]. Note: HTTP probes require path parameter. Example: --probe name=health protocol=Tcp port=80.
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_managedcleanroom_frontend_analytics
name: az managedcleanroom frontend analytics
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **managedcleanroom** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az managedcleanroom frontend analytics** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage collaboration analytics.
status: GA
sourceType: Extension
directCommands:
- uid: az_managedcleanroom_frontend_analytics_show
  name: az managedcleanroom frontend analytics show
  summary: |-
    Show analytics information.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics show --collaboration-id
                                                [--api-version {2026-03-01-preview}]
  examples:
  - summary: |-
      Show analytics information for a collaboration
    syntax: az managedcleanroom frontend analytics show -c <collaboration-id>
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  optionalParameters:
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_managedcleanroom_frontend_analytics_skr-policy
  name: az managedcleanroom frontend analytics skr-policy
  summary: |-
    Get SKR policy for a dataset.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics skr-policy --collaboration-id
                                                      --dataset-id
                                                      [--api-version {2026-03-01-preview}]
  examples:
  - summary: |-
      Get SKR policy for a specific dataset
    syntax: az managedcleanroom frontend analytics skr-policy -c <collaboration-id> -d <dataset-id>
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  - isRequired: true
    name: --dataset-id -d
    summary: |-
      Dataset identifier for which to retrieve SKR policy.
  optionalParameters:
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

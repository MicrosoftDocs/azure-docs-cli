### YamlMime:AzureCLIGroup
uid: az_managedcleanroom_frontend_oidc
name: az managedcleanroom frontend oidc
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **managedcleanroom** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az managedcleanroom frontend oidc** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage OIDC configuration.
status: GA
sourceType: Extension
directCommands:
- uid: az_managedcleanroom_frontend_oidc_keys
  name: az managedcleanroom frontend oidc keys
  summary: |-
    Get OIDC signing keys (JWKS).
  description: |-
    Retrieves the JSON Web Key Set (JWKS) containing the public keys used
    to verify OIDC tokens issued by the collaboration. This endpoint returns
    the keys in standard JWKS format.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend oidc keys --collaboration-id
                                           [--api-version {2026-03-01-preview}]
  examples:
  - summary: |-
      Get OIDC signing keys
    syntax: az managedcleanroom frontend oidc keys --collaboration-id <cid>
  - summary: |-
      Get OIDC signing keys (short form)
    syntax: az managedcleanroom frontend oidc keys -c <cid>
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  optionalParameters:
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_managedcleanroom_frontend_oidc_set-issuer-url
  name: az managedcleanroom frontend oidc set-issuer-url
  summary: |-
    Set OIDC issuer URL for a collaboration.
  description: |-
    Configures the OIDC issuer URL for the collaboration. This URL is used
    for OpenID Connect authentication and token validation.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend oidc set-issuer-url --collaboration-id
                                                     --url
                                                     [--api-version {2026-03-01-preview}]
  examples:
  - summary: |-
      Set OIDC issuer URL
    syntax: az managedcleanroom frontend oidc set-issuer-url               --collaboration-id <cid>               --url https://oidc.example.com
  - summary: |-
      Set OIDC issuer URL (short form)
    syntax: az managedcleanroom frontend oidc set-issuer-url -c <cid> --url https://oidc.example.com
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  - isRequired: true
    name: --url
    summary: |-
      OIDC issuer URL.
  optionalParameters:
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

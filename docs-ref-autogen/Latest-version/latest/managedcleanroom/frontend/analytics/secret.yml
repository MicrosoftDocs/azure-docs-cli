### YamlMime:AzureCLIGroup
uid: az_managedcleanroom_frontend_analytics_secret
name: az managedcleanroom frontend analytics secret
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **managedcleanroom** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az managedcleanroom frontend analytics secret** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage analytics secrets.
status: GA
sourceType: Extension
directCommands:
- uid: az_managedcleanroom_frontend_analytics_secret_set
  name: az managedcleanroom frontend analytics secret set
  summary: |-
    Set an analytics secret.
  description: |-
    Sets or updates a secret in the analytics collaboration. Secrets are
    used for secure configuration values needed by analytics workloads.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics secret set --collaboration-id
                                                      --secret-name
                                                      --secret-value
                                                      [--api-version {2026-03-01-preview}]
  examples:
  - summary: |-
      Set an analytics secret
    syntax: az managedcleanroom frontend analytics secret set               --collaboration-id <cid>               --secret-name <name>               --secret-value <value>
  - summary: |-
      Set secret (short form)
    syntax: az managedcleanroom frontend analytics secret set -c <cid> --secret-name mySecret --secret-value myValue
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  - isRequired: true
    name: --secret-name -n
    summary: |-
      Secret name.
  - isRequired: true
    name: --secret-value -v
    summary: |-
      Secret value.
  optionalParameters:
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_managedcleanroom_frontend_analytics_secret_set
metadata:
  description: Manage analytics secrets.

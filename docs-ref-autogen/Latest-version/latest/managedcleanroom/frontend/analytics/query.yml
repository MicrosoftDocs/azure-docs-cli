- uid: az_managedcleanroom_frontend_analytics_query_vote
  name: az managedcleanroom frontend analytics query vote
  summary: |-
    Vote on a query (accept or reject).
  description: |-
    Submits a vote for a query in the collaboration. This unified endpoint
    allows you to accept or reject a query with a single command.

    This command replaces the deprecated 'vote accept' and 'vote reject'
    commands in version 1.0.0b4.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics query vote --collaboration-id
                                                      --document-id
                                                      --vote-action
                                                      [--acquire-policy-token]
                                                      [--api-version {2026-03-01-preview}]
                                                      [--change-reference]
                                                      [--proposal-id]
  examples:
  - summary: |-
      Accept a query vote
    syntax: az managedcleanroom frontend analytics query vote               --collaboration-id <cid>               --document-id <document-id>               --vote-action accept
  - summary: |-
      Reject a query vote
    syntax: az managedcleanroom frontend analytics query vote               --collaboration-id <cid>               --document-id <document-id>               --vote-action reject
  - summary: |-
      Accept query vote (short form)
    syntax: az managedcleanroom frontend analytics query vote -c <cid> -d <doc-id> --vote-action accept
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  - isRequired: true
    name: --document-id -d
    summary: |-
      Document identifier (dataset, query, or consent document).
  - isRequired: true
    name: --vote-action
    summary: |-
      Vote action (accept or reject).
    description: |-
      The vote action to perform:
      - accept: Approve the query
      - reject: Reject the query.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --proposal-id
    summary: |-
      Optional proposal ID.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

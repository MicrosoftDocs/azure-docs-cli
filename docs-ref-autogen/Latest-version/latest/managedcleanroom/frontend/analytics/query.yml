    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_managedcleanroom_frontend_analytics_query_publish
  name: az managedcleanroom frontend analytics query publish
  summary: |-
    Publish a query to the collaboration.
  description: |-
    Publish a query configuration with SQL segments, execution sequence, and dataset mappings.
    Query segments can be provided as @file.json (full segment object including executionSequence)
    or as inline SQL strings (requires --execution-sequence parameter). The execution sequence
    defines which segments run in parallel (same number) or sequentially (different numbers).
    Cannot mix @file.json and inline SQL segments in the same command.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics query publish --collaboration-id
                                                         --document-id
                                                         [--acquire-policy-token]
                                                         [--api-version {2026-03-01-preview}]
                                                         [--body]
                                                         [--change-reference]
                                                         [--execution-sequence]
                                                         [--input-datasets]
                                                         [--output-dataset]
                                                         [--query-segment]
  examples:
  - summary: |-
      Publish a query with segments from JSON files (segment files include executionSequence)
    syntax: >-
      az managedcleanroom frontend analytics query publish \
        --collaboration-id my-collab-123 \
        --document-id my-query \
        --query-segment @segment1.json \
        --query-segment @segment2.json \
        --query-segment @segment3.json \
        --input-datasets "dataset1:view1,dataset2:view2" \
        --output-dataset "output-dataset:results"

      Note: Each segment JSON file should contain:

      data, executionSequence, preConditions, postFilters fields
  - summary: |-
      Publish a query with inline SQL segments (requires --execution-sequence)
    syntax: >-
      az managedcleanroom frontend analytics query publish \
        --collaboration-id my-collab-123 \
        --document-id my-query \
        --query-segment "SELECT * FROM table1" \
        --query-segment "SELECT * FROM table2" \
        --execution-sequence "1,2" \
        --input-datasets "dataset1:view1" \
        --output-dataset "output-dataset:results"
  - summary: |-
      Publish a query using a JSON body file (legacy mode)
    syntax: az managedcleanroom frontend analytics query publish               --collaboration-id my-collab-123               --document-id my-query               --body @query-config.json
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  - isRequired: true
    name: --document-id -d
    summary: |-
      Query document identifier.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  - name: --body
    summary: |-
      JSON configuration file path (@file.json) or JSON string (legacy mode).
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --execution-sequence
    summary: |-
      Comma-separated execution sequence numbers (e.g., "1,1,2"). Must match segment count.
  - name: --input-datasets
    summary: |-
      Comma-separated input datasets as datasetId:viewName pairs.
  - name: --output-dataset
    summary: |-
      Output dataset as datasetId:viewName.
  - name: --query-segment
    summary: |-
      Query segment SQL (@file.sql or inline). Repeatable. Order matters.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_managedcleanroom_frontend_analytics_query_run
  name: az managedcleanroom frontend analytics query run
  summary: |-
    Run a query in the collaboration.
  description: |-
    Execute a published query with optional configuration parameters.
    A run ID is automatically generated if not provided.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics query run --collaboration-id
                                                     --document-id
                                                     [--acquire-policy-token]
                                                     [--api-version {2026-03-01-preview}]
                                                     [--body]
                                                     [--change-reference]
                                                     [--dry-run]
                                                     [--end-date]
                                                     [--start-date]
                                                     [--use-optimizer]
  examples:
  - summary: |-
      Run a query with default settings
    syntax: az managedcleanroom frontend analytics query run               --collaboration-id my-collab-123               --document-id my-query
  - summary: |-
      Run a query with dry run and date range
    syntax: az managedcleanroom frontend analytics query run               --collaboration-id my-collab-123               --document-id my-query               --dry-run               --start-date "2024-01-01"               --end-date "2024-12-31"
  - summary: |-
      Run a query with optimizer enabled
    syntax: az managedcleanroom frontend analytics query run               --collaboration-id my-collab-123               --document-id my-query               --use-optimizer
  - summary: |-
      Run a query using a JSON body file (legacy mode)
    syntax: az managedcleanroom frontend analytics query run               --collaboration-id my-collab-123               --document-id my-query               --body @run-config.json
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  - isRequired: true
    name: --document-id -d
    summary: |-
      Query document identifier.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  - name: --body
    summary: |-
      JSON configuration file path (@file.json) or JSON string (legacy mode).
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --dry-run
    defaultValue: "False"
    summary: |-
      Perform a dry run without executing the query.
  - name: --end-date
    summary: |-
      End date for query execution.
  - name: --start-date
    summary: |-
      Start date for query execution.
  - name: --use-optimizer
    defaultValue: "False"
    summary: |-
      Use query optimizer.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

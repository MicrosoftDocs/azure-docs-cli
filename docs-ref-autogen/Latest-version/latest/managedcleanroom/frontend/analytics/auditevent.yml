### YamlMime:AzureCLIGroup
uid: az_managedcleanroom_frontend_analytics_auditevent
name: az managedcleanroom frontend analytics auditevent
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **managedcleanroom** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az managedcleanroom frontend analytics auditevent** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  View audit events.
status: GA
sourceType: Extension
directCommands:
- uid: az_managedcleanroom_frontend_analytics_auditevent_list
  name: az managedcleanroom frontend analytics auditevent list
  summary: |-
    List audit events for a collaboration.
  description: |-
    Retrieves audit events for a collaboration with optional filtering.

    Filter options:
    - scope: Filter by audit event scope (e.g., 'dataset', 'query', 'collaboration')
    - from_seqno: Starting sequence number for event range
    - to_seqno: Ending sequence number for event range.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics auditevent list --collaboration-id
                                                           [--api-version {2026-03-01-preview}]
                                                           [--from-seqno]
                                                           [--scope]
                                                           [--to-seqno]
  examples:
  - summary: |-
      List all audit events
    syntax: az managedcleanroom frontend analytics auditevent list -c <collaboration-id>
  - summary: |-
      List audit events for dataset scope
    syntax: az managedcleanroom frontend analytics auditevent list               --collaboration-id <cid>               --scope dataset
  - summary: |-
      List audit events in sequence number range
    syntax: az managedcleanroom frontend analytics auditevent list               --collaboration-id <cid>               --from-seqno 100               --to-seqno 200
  - summary: |-
      List dataset audit events in specific range
    syntax: az managedcleanroom frontend analytics auditevent list               -c <cid>               --scope dataset               --from-seqno 50               --to-seqno 150
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  optionalParameters:
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  - name: --from-seqno
    summary: |-
      Optional starting sequence number.
  - name: --scope
    summary: |-
      Optional scope filter.
  - name: --to-seqno
    summary: |-
      Optional ending sequence number.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_managedcleanroom_frontend_analytics_auditevent_list
metadata:
  description: View audit events.

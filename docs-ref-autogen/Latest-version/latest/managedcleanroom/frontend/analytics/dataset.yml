### YamlMime:AzureCLIGroup
uid: az_managedcleanroom_frontend_analytics_dataset
name: az managedcleanroom frontend analytics dataset
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **managedcleanroom** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az managedcleanroom frontend analytics dataset** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage collaboration datasets.
status: GA
sourceType: Extension
directCommands:
- uid: az_managedcleanroom_frontend_analytics_dataset_list
  name: az managedcleanroom frontend analytics dataset list
  summary: |-
    List datasets for a collaboration.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics dataset list --collaboration-id
                                                        [--api-version {2026-03-01-preview}]
  examples:
  - summary: |-
      List datasets
    syntax: az managedcleanroom frontend analytics dataset list -c <collaboration-id>
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  optionalParameters:
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_managedcleanroom_frontend_analytics_dataset_publish
  name: az managedcleanroom frontend analytics dataset publish
  summary: |-
    Publish a dataset to the collaboration.
  description: |-
    Publish a dataset configuration with storage, schema, access policy, and identity information.
    Supports both SSE (Server-Side Encryption) and CPK (Customer-Provided Key) encryption modes.
    You can use either individual parameters or a JSON body file for configuration.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics dataset publish --collaboration-id
                                                           --document-id
                                                           [--access-mode]
                                                           [--acquire-policy-token]
                                                           [--allowed-fields]
                                                           [--api-version {2026-03-01-preview}]
                                                           [--body]
                                                           [--change-reference]
                                                           [--container-name]
                                                           [--dek-keyvault-url]
                                                           [--dek-secret-id]
                                                           [--encryption-mode]
                                                           [--identity-client-id]
                                                           [--identity-issuer-url]
                                                           [--identity-name]
                                                           [--identity-tenant-id]
                                                           [--kek-keyvault-url]
                                                           [--kek-maa-url]
                                                           [--kek-secret-id]
                                                           [--schema-file]
                                                           [--schema-format]
                                                           [--storage-account-type]
                                                           [--storage-account-url]
                                                           [--subdirectory]
  examples:
  - summary: |-
      Publish a dataset using SSE encryption with individual parameters
    syntax: az managedcleanroom frontend analytics dataset publish               --collaboration-id my-collab-123               --document-id my-dataset               --storage-account-url https://mystorageaccount.blob.core.windows.net               --container-name datasets               --storage-account-type AzureStorageAccount               --encryption-mode SSE               --schema-file @schema.json               --access-mode ReadWrite               --allowed-fields "customer_id,revenue,date"               --identity-name northwind-identity               --identity-client-id fb907136-1234-5678-9abc-def012345678               --identity-tenant-id 72f988bf-1234-5678-9abc-def012345678               --identity-issuer-url https://oidc.example.com/issuer
  - summary: |-
      Publish a dataset using CPK encryption with individual parameters
    syntax: az managedcleanroom frontend analytics dataset publish               --collaboration-id my-collab-123               --document-id my-dataset               --storage-account-url https://mystorageaccount.blob.core.windows.net               --container-name datasets               --storage-account-type AzureStorageAccount               --encryption-mode CPK               --schema-file @schema.json               --access-mode ReadWrite               --identity-name northwind-identity               --identity-client-id fb907136-1234-5678-9abc-def012345678               --identity-tenant-id 72f988bf-1234-5678-9abc-def012345678               --identity-issuer-url https://oidc.example.com/issuer               --dek-keyvault-url https://mykeyvault.vault.azure.net               --dek-secret-id dek-secret-123               --kek-keyvault-url https://mykeyvault.vault.azure.net               --kek-secret-id kek-secret-123               --kek-maa-url https://sharedeus.eus.attest.azure.net
  - summary: |-
      Publish a dataset using a JSON body file (legacy mode)
    syntax: az managedcleanroom frontend analytics dataset publish               --collaboration-id my-collab-123               --document-id my-dataset               --body @dataset-config.json
  - summary: |-
      Publish a dataset mounted at a subdirectory
    syntax: az managedcleanroom frontend analytics dataset publish               --collaboration-id my-collab-123               --document-id my-dataset               --storage-account-url https://mystorageaccount.blob.core.windows.net               --container-name datasets               --storage-account-type AzureStorageAccount               --encryption-mode SSE               --schema-file @schema.json               --access-mode ReadWrite               --identity-name northwind-identity               --identity-client-id fb907136-1234-5678-9abc-def012345678               --identity-tenant-id 72f988bf-1234-5678-9abc-def012345678               --identity-issuer-url https://oidc.example.com/issuer               --subdirectory year=2026/month=05
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  - isRequired: true
    name: --document-id -d
    summary: |-
      Dataset document identifier.
  optionalParameters:
  - name: --access-mode
    summary: |-
      Access mode (e.g., ReadWrite).
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --allowed-fields
    summary: |-
      Comma-separated list of allowed field names.
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  - name: --body
    summary: |-
      JSON configuration file path (@file.json) or JSON string (legacy mode).
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --container-name
    summary: |-
      Blob container name.
  - name: --dek-keyvault-url
    summary: |-
      Key Vault URL for DEK (CPK mode only).
  - name: --dek-secret-id
    summary: |-
      DEK secret ID (CPK mode only).
  - name: --encryption-mode
    summary: |-
      Encryption mode (SSE or CPK).
  - name: --identity-client-id
    summary: |-
      Managed identity client ID (GUID).
  - name: --identity-issuer-url
    summary: |-
      OIDC issuer URL (HTTPS).
  - name: --identity-name
    summary: |-
      Managed identity name.
  - name: --identity-tenant-id
    summary: |-
      Tenant ID (GUID).
  - name: --kek-keyvault-url
    summary: |-
      Key Vault URL for KEK (CPK mode only).
  - name: --kek-maa-url
    summary: |-
      MAA URL for KEK (CPK mode only).
  - name: --kek-secret-id
    summary: |-
      KEK secret ID (CPK mode only).
  - name: --schema-file
    summary: |-
      Path to schema file (@path/to/schema.json) containing field definitions.
  - name: --schema-format
    summary: |-
      Schema format (default is Delta).
  - name: --storage-account-type
    summary: |-
      Storage account type (e.g., AzureStorageAccount).
  - name: --storage-account-url
    summary: |-
      Azure Storage account URL.
  - name: --subdirectory
    summary: |-
      Optional subdirectory/prefix inside the storage container to mount.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_managedcleanroom_frontend_analytics_dataset_queries
  name: az managedcleanroom frontend analytics dataset queries
  summary: |-
    List queries that use a specific dataset.
  description: |-
    Retrieves a list of all queries that reference the specified dataset
    as an input. This is useful for understanding dataset dependencies
    and impact analysis.
  status: GA
  sourceType: Extension
  syntax: >-
    az managedcleanroom frontend analytics dataset queries --collaboration-id
                                                           --document-id
                                                           [--acquire-policy-token]
                                                           [--api-version {2026-03-01-preview}]
                                                           [--change-reference]
  examples:
  - summary: |-
      List queries using a dataset
    syntax: az managedcleanroom frontend analytics dataset queries               --collaboration-id <cid>               --document-id <dataset-document-id>
  - summary: |-
      List queries using a dataset (short form)
    syntax: az managedcleanroom frontend analytics dataset queries -c <cid> -d <dataset-doc-id>
  requiredParameters:
  - isRequired: true
    name: --collaboration-id -c
    summary: |-
      Collaboration identifier.
  - isRequired: true
    name: --document-id -d
    summary: |-
      Document identifier (dataset, query, or consent document).
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --api-version
    defaultValue: 2026-03-01-preview
    acceptedValues: 2026-03-01-preview
    summary: |-
      API version to use for this request. Default: 2026-03-01-preview.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_service-group
name: az service-group
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **servicegroup** extension for the Azure CLI (version 2.67.0 or higher). The extension will automatically install the first time you run an **az service-group** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Azure Service Groups.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Extension
directCommands:
- uid: az_service-group_create
  name: az service-group create
  summary: |-
    Create or update a service group.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az service-group' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az service-group create --name
                            [--acquire-policy-token]
                            [--change-reference]
                            [--display-name]
                            [--kind]
                            [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                            [--parent]
                            [--tags]
  examples:
  - summary: |-
      Create a service group under the tenant root
    syntax: az service-group create --name MyServiceGroup --display-name "My Service Group" --parent resource-id="/providers/Microsoft.Management/serviceGroups/<tenantId>"
  - summary: |-
      Create a child service group under an existing parent
    syntax: az service-group create --name ChildGroup --display-name "Child" --parent resource-id="/providers/Microsoft.Management/serviceGroups/ParentGroup"
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      ServiceGroup Name.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --display-name
    summary: |-
      The display name of the service group.
    groupName: Properties Arguments
  - name: --kind
    summary: |-
      The kind of the service group.
    groupName: Resource Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --parent
    summary: |-
      The details of the parent service group.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --tags
    summary: |-
      The service group tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_capacity_reservation
name: az capacity reservation
summary: |-
  Manage capacity reservation.
status: GA
sourceType: Core
directCommands:
- uid: az_capacity_reservation_create
  name: az capacity reservation create
  summary: |-
    Create operation to create or update a capacity reservation. Please note some properties can be set only during capacity reservation creation. Please refer to https://aka.ms/CapacityReservation for more details.
  status: GA
  sourceType: Core
  syntax: >-
    az capacity reservation create --capacity-reservation-group
                                   --capacity-reservation-name --name
                                   --resource-group
                                   [--capacity]
                                   [--location]
                                   [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                   [--sku]
                                   [--tags]
                                   [--zone]
  examples:
  - summary: |-
      Create a capacity reservation.
    syntax: az capacity reservation create -c ReservationGroupName -n ReservationName -g MyResourceGroup --sku Standard_A0
  - summary: |-
      Create a capacity reservation with specific capacity and zones.
    syntax: az capacity reservation create -c ReservationGroupName -n ReservationName -l centraluseuap -g MyResourceGroup  --sku Standard_A1_v2 --capacity 5 --zone 1 --tags key=val
  requiredParameters:
  - isRequired: true
    name: --capacity-reservation-group -c
    summary: |-
      The name of the capacity reservation group.
  - isRequired: true
    name: --capacity-reservation-name --name -n
    summary: |-
      The name of the capacity reservation.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --capacity
    summary: |-
      Specify the number of virtual machines in the scale set.
  - name: --location -l
    summary: |-
      Resource location  When not specified, the location of the resource group will be used.
  - name: --no-wait
    parameterValueGroup: "0, 1, f, false, n, no, t, true, y, yes"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --sku -s
    summary: |-
      The SKU of the resource for which capacity needs be reserved. Currently VM Skus with the capability called \"CapacityReservationSupported\" set to true are supported. Refer to List Microsoft.Compute SKUs in a region (https://learn.microsoft.com/rest/api/compute/resourceskus/list) for supported values.
  - name: --tags
    summary: |-
      Resource tags  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
  - name: --zone -z
    summary: |-
      Availability Zone to use for this capacity reservation. The zone has to be single value and also should be part for the list of zones specified during the capacity reservation group creation. The zone can be assigned only during creation. If not provided, the reservation supports only non-zonal deployments. If provided, enforces VM/VMSS using this capacity reservation to be in same zone.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
- uid: az_capacity_reservation_delete
  name: az capacity reservation delete
  summary: |-
    Delete operation to delete a capacity reservation. This operation is allowed only when all the associated resources are disassociated from the capacity reservation. Please refer to https://aka.ms/CapacityReservation for more details.
  status: GA
  sourceType: Core
  syntax: >-
    az capacity reservation delete [--capacity-reservation-group]
                                   [--capacity-reservation-name --name]
                                   [--ids]
                                   [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                   [--resource-group]
                                   [--subscription]
                                   [--yes]
  examples:
  - summary: |-
      Delete a capacity reservation.
    syntax: az capacity reservation delete -c ReservationGroupName -n ReservationName -g MyResourceGroup --yes
  optionalParameters:
  - name: --capacity-reservation-group -c
    summary: |-
      The name of the capacity reservation group.
  - name: --capacity-reservation-name --name -n
    summary: |-
      The name of the capacity reservation.
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
  - name: --no-wait
    parameterValueGroup: "0, 1, f, false, n, no, t, true, y, yes"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
- uid: az_capacity_reservation_list
  name: az capacity reservation list
  summary: |-
    List all of the capacity reservations in the specified capacity reservation group. Use the nextLink property in the response to get the next page of capacity reservations.
  status: GA
  sourceType: Core
  syntax: >-
    az capacity reservation list --capacity-reservation-group
                                 --resource-group
                                 [--max-items]
                                 [--next-token]
  examples:
  - summary: |-
      List capacity reservation.
    syntax: az capacity reservation list -c ReservationGroupName -g MyResourceGroup
  requiredParameters:
  - isRequired: true
    name: --capacity-reservation-group -c
    summary: |-
      The name of the capacity reservation group.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --max-items
    summary: |-
      Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
  - name: --next-token
    summary: |-
      Token to specify where to start paginating. This is the token value from a previously truncated response.
- uid: az_capacity_reservation_show
  name: az capacity reservation show
  summary: |-
    Retrieve information about the capacity reservation.
  status: GA
  sourceType: Core
  syntax: >-
    az capacity reservation show [--capacity-reservation-group]
                                 [--capacity-reservation-name --name]
                                 [--ids]
                                 [--instance-view {0, 1, f, false, n, no, t, true, y, yes}]
                                 [--resource-group]
                                 [--subscription]
  examples:
  - summary: |-
      Get a capacity reservation.
    syntax: az capacity reservation show -c ReservationGroupName -n ReservationName -g MyResourceGroup
  - summary: |-
      Get a capacity reservation containing the instance views.
    syntax: az capacity reservation show -c ReservationGroupName -n ReservationName -g MyResourceGroup --instance-view
  optionalParameters:
  - name: --capacity-reservation-group -c
    summary: |-
      The name of the capacity reservation group.
  - name: --capacity-reservation-name --name -n
    summary: |-
      The name of the capacity reservation.
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
  - name: --instance-view -i
    parameterValueGroup: "0, 1, f, false, n, no, t, true, y, yes"
    summary: |-
      Retrieve a snapshot of the runtime properties of the capacity reservation that is managed by the platform and can change outside of control plane operations.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
- uid: az_capacity_reservation_update
  name: az capacity reservation update
  summary: |-
    Update operation to update a capacity reservation.
  status: GA
  sourceType: Core
  syntax: >-
    az capacity reservation update [--capacity]
                                   [--capacity-reservation-group]
                                   [--capacity-reservation-name --name]
                                   [--ids]
                                   [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                   [--resource-group]
                                   [--subscription]
                                   [--tags]
  examples:
  - summary: |-
      Update a capacity reservation.
    syntax: az capacity reservation update -c ReservationGroupName -n ReservationName -g MyResourceGroup --capacity 5 --tags key=val
  optionalParameters:
  - name: --capacity
    summary: |-
      Specify the number of virtual machines in the scale set.
  - name: --capacity-reservation-group -c
    summary: |-
      The name of the capacity reservation group.
  - name: --capacity-reservation-name --name -n
    summary: |-
      The name of the capacity reservation.
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
  - name: --no-wait
    parameterValueGroup: "0, 1, f, false, n, no, t, true, y, yes"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --tags
    summary: |-
      Resource tags  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
- uid: az_capacity_reservation_wait
  name: az capacity reservation wait
  summary: |-
    Place the CLI in a waiting state until a condition is met.
  status: GA
  sourceType: Core
  syntax: >-
    az capacity reservation wait [--capacity-reservation-group]
                                 [--capacity-reservation-name --name]
                                 [--created]
                                 [--custom]
                                 [--deleted]
                                 [--exists]
                                 [--expand {instanceView}]
                                 [--ids]
                                 [--interval]
                                 [--resource-group]
                                 [--subscription]
                                 [--timeout]
                                 [--updated]
  optionalParameters:
  - name: --capacity-reservation-group -c
    summary: |-
      The name of the capacity reservation group.
  - name: --capacity-reservation-name --name -n
    summary: |-
      The name of the capacity reservation.
  - name: --created
    defaultValue: "False"
    summary: |-
      Wait until created with 'provisioningState' at 'Succeeded'.
  - name: --custom
    summary: |-
      Wait until the condition satisfies a custom JMESPath query. E.g. provisioningState!='InProgress', instanceView.statuses[?code=='PowerState/running'].
  - name: --deleted
    defaultValue: "False"
    summary: |-
      Wait until deleted.
  - name: --exists
    defaultValue: "False"
    summary: |-
      Wait until the resource exists.
  - name: --expand
    parameterValueGroup: "instanceView"
    summary: |-
      The expand expression to apply on the operation. 'InstanceView' retrieves a snapshot of the runtime properties of the capacity reservation that is managed by the platform and can change outside of control plane operations.
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
  - name: --interval
    defaultValue: "30"
    summary: |-
      Polling interval in seconds.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --timeout
    defaultValue: "3600"
    summary: |-
      Maximum wait in seconds.
  - name: --updated
    defaultValue: "False"
    summary: |-
      Wait until updated with provisioningState at 'Succeeded'.
commands:
- az_capacity_reservation_create
- az_capacity_reservation_delete
- az_capacity_reservation_group
- az_capacity_reservation_group_create
- az_capacity_reservation_group_delete
- az_capacity_reservation_group_list
- az_capacity_reservation_group_show
- az_capacity_reservation_group_update
- az_capacity_reservation_list
- az_capacity_reservation_show
- az_capacity_reservation_update
- az_capacity_reservation_wait
globalParameters:
- name: --debug
  summary: |-
    Increase logging verbosity to show all debug logs.
- name: --help -h
  summary: |-
    Show this help message and exit.
- name: --only-show-errors
  summary: |-
    Only show errors, suppressing warnings.
- name: --output -o
  defaultValue: "json"
  parameterValueGroup: "json, jsonc, none, table, tsv, yaml, yamlc"
  summary: |-
    Output format.
- name: --query
  summary: |-
    JMESPath query string. See <a href="http://jmespath.org/">http://jmespath.org/</a> for more information and examples.
- name: --subscription
  summary: |-
    Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
- name: --verbose
  summary: |-
    Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_functionapp_update-strategy_config
name: az functionapp update-strategy config
summary: |-
  Manage a function app's update strategy configuration.
status: GA
sourceType: Core
directCommands:
- uid: az_functionapp_update-strategy_config_set
  name: az functionapp update-strategy config set
  summary: |-
    Set or update a function app's update strategy configuration.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/appservice/_help.py
  syntax: >-
    az functionapp update-strategy config set --type {Recreate, RollingUpdate}
                                              [--acquire-policy-token]
                                              [--change-reference]
                                              [--ids]
                                              [--name]
                                              [--resource-group]
                                              [--subscription]
  examples:
  - summary: |-
      Set the update strategy to Recreate.
    syntax: az functionapp update-strategy config set --name MyFunctionApp --resource-group MyResourceGroup --type Recreate
  - summary: |-
      Set the update strategy to RollingUpdate.
    syntax: az functionapp update-strategy config set --name MyFunctionApp --resource-group MyResourceGroup --type RollingUpdate
  requiredParameters:
  - isRequired: true
    name: --type
    acceptedValues: Recreate, RollingUpdate
    summary: |-
      The update strategy type. Allowed values: Recreate, RollingUpdate.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --name -n
    summary: |-
      Name of the function app.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_functionapp_update-strategy_config_show

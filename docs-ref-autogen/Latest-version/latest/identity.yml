### YamlMime:AzureCLIGroup
uid: az_identity
name: az identity
summary: |-
  Manage Managed Identity.
status: GA
sourceType: Core
directCommands:
- uid: az_identity_create
  name: az identity create
  summary: |-
    Create an identity in the specified subscription and resource group.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/identity/_help.py
  syntax: >-
    az identity create --name --resource-name
                       --resource-group
                       [--acquire-policy-token]
                       [--change-reference]
                       [--isolation-scope {None, Regional}]
                       [--location]
                       [--resource-restriction]
                       [--tags]
  examples:
  - summary: |-
      Create an identity with a name and a resource group.
    syntax: az identity create --name myIdentityName --resource-group myResourceGroup
  - summary: |-
      Create an identity using the resource restrictions and isolation scope parameter.
    syntax: az identity create --name myIdentityName --resource-group myResourceGroup --resource-restriction {"providers":["Microsoft.Compute"]} --isolation-scope Regional
  requiredParameters:
  - isRequired: true
    name: --name --resource-name -n
    summary: |-
      The name of the identity resource.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --isolation-scope
    acceptedValues: None, Regional
    summary: |-
      Enum to configure regional restrictions on identity assignment, as necessary.
    groupName: Properties Arguments
  - name: --location -l
    summary: |-
      The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    groupName: Parameters Arguments
  - name: --resource-restriction
    summary: |-
      Restrictions on which resource providers this identity can be assigned to.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Parameters Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

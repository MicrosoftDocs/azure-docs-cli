- uid: az_documentdb_mongocluster_restore
  name: az documentdb mongocluster restore
  summary: |-
    Restore a mongo cluster to a new cluster from a point in time.
  description: |-
    Creates a new mongo cluster from the backup of an existing (or deleted) source
    cluster at the requested point in time.
  status: GA
  sourceType: Extension
  syntax: >-
    az documentdb mongocluster restore --admin-password
                                       --admin-user
                                       --cluster-name --name
                                       --resource-group
                                       --restore-time
                                       --source-cluster
                                       [--acquire-policy-token]
                                       [--change-reference]
                                       [--location]
                                       [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
  examples:
  - summary: |-
      Restore a cluster to a point in time.
    syntax: az documentdb mongocluster restore -n RestoredCluster -g MyResourceGroup --location eastus2 --source-cluster MySourceCluster --restore-time "2026-06-30T10:00:00Z" --admin-user dbadmin --admin-password MyP@ssw0rd123!
  requiredParameters:
  - isRequired: true
    name: --admin-password -p
    summary: |-
      The administrator password.  If value is blank it's asked from the tty.
    groupName: Administrator Arguments
  - isRequired: true
    name: --admin-user -u
    summary: |-
      The administrator user name.
    groupName: Administrator Arguments
  - isRequired: true
    name: --cluster-name --name -n
    summary: |-
      The name of the mongo cluster.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --restore-time
    summary: |-
      UTC point in time to restore from, in ISO-8601 format (for example: 2026-06-30T10:00:00Z).
    groupName: Restore Arguments
  - isRequired: true
    name: --source-cluster
    summary: |-
      Name or resource ID of the source mongo cluster to restore from. If a name is given, the current subscription and resource group are assumed.
    groupName: Restore Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --location -l
    summary: |-
      The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    groupName: Resource Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

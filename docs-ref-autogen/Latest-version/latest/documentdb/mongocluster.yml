                                      [--high-availability {Disabled, SameZone, ZoneRedundantPreferred}]
                                      [--ids]
                                      [--network-bypass-mode {AzureCosmosDB, None}]
                                      [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                      [--preview-features]
                                      [--public-network-access {Disabled, Enabled}]
                                      [--remove]
                                      [--resource-group]
                                      [--server-version]
                                      [--set]
                                      [--shard-count]
                                      [--storage-size]
                                      [--storage-type {PremiumSSD, PremiumSSDv2}]
                                      [--subscription]
                                      [--tags]
                                      [--tier]
  examples:
  - summary: |-
      Update a mongo cluster's compute tier.
    syntax: az documentdb mongocluster update -n MyCluster -g MyResourceGroup --tier M40
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --admin-password -p
    summary: |-
      The administrator password.  If value is blank it's asked from the tty.
    groupName: Administrator Arguments
  - name: --admin-user -u
    summary: |-
      The administrator user name.
    groupName: Administrator Arguments
  - name: --auth-allowed-modes
    summary: |-
      Space-separated list of allowed authentication modes for data access. Allowed values: NativeAuth, MicrosoftEntraID. Example: --auth-allowed-modes NativeAuth MicrosoftEntraID  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: AuthConfig Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --cluster-name --name -n
    summary: |-
      The name of the mongo cluster.
    groupName: Resource Id Arguments
  - name: --data-api-mode
    acceptedValues: Disabled, Enabled
    summary: |-
      Enable or disable the Mongo Data API on the cluster. Allowed values: Enabled, Disabled. Example: --data-api-mode Enabled.
    groupName: DataApi Arguments
  - name: --encryption
    summary: |-
      The encryption configuration for the cluster. Depends on identity being configured.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --high-availability
    acceptedValues: Disabled, SameZone, ZoneRedundantPreferred
    summary: |-
      The target high availability mode requested for the cluster.
    groupName: HighAvailability Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --network-bypass-mode
    acceptedValues: AzureCosmosDB, None
    summary: |-
      The network bypass mode for the cluster. Setting to 'AzureCosmosDB' allows Azure Cosmos DB service to bypass network restrictions.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --preview-features
    summary: |-
      List of private endpoint connections.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --public-network-access
    acceptedValues: Disabled, Enabled
    summary: |-
      Whether or not public endpoint access is allowed for this mongo cluster.
    groupName: Properties Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --server-version
    summary: |-
      The Mongo DB server version. Defaults to the latest available version if not specified.
    groupName: Properties Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  - name: --shard-count
    summary: |-
      Number of shards to provision on the cluster.
    groupName: Sharding Arguments
  - name: --storage-size
    summary: |-
      The size of the data disk assigned to each server.
    groupName: Storage Arguments
  - name: --storage-type
    acceptedValues: PremiumSSD, PremiumSSDv2
    summary: |-
      The type of storage to provision the cluster servers with.
    groupName: Storage Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource Arguments
  - name: --tier
    summary: |-
      The compute tier to assign to the cluster, where each tier maps to a virtual-core and memory size. Example values: 'M30', 'M40'.
    groupName: Compute Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_documentdb_mongocluster_wait
  name: az documentdb mongocluster wait
  summary: |-
    Place the CLI in a waiting state until a condition is met.
  status: GA
  sourceType: Extension
  syntax: >-
    az documentdb mongocluster wait [--acquire-policy-token]
                                    [--change-reference]
                                    [--cluster-name --name]
                                    [--created]
                                    [--custom]
                                    [--deleted]
                                    [--exists]
                                    [--ids]
                                    [--interval]
                                    [--resource-group]
                                    [--subscription]
                                    [--timeout]
                                    [--updated]
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --cluster-name --name -n
    summary: |-
      The name of the mongo cluster.
    groupName: Resource Id Arguments
  - name: --created
    defaultValue: "False"
    summary: |-
      Wait until created with 'provisioningState' at 'Succeeded'.
    groupName: Wait Condition Arguments
  - name: --custom
    summary: |-
      Wait until the condition satisfies a custom JMESPath query. E.g. provisioningState!='InProgress', instanceView.statuses[?code=='PowerState/running'].
    groupName: Wait Condition Arguments
  - name: --deleted
    defaultValue: "False"
    summary: |-
      Wait until deleted.
    groupName: Wait Condition Arguments
  - name: --exists
    defaultValue: "False"
    summary: |-
      Wait until the resource exists.
    groupName: Wait Condition Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --interval
    defaultValue: "30"
    summary: |-
      Polling interval in seconds.
    groupName: Wait Condition Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --timeout
    defaultValue: "3600"
    summary: |-
      Maximum wait in seconds.
    groupName: Wait Condition Arguments
  - name: --updated
    defaultValue: "False"
    summary: |-
      Wait until updated with provisioningState at 'Succeeded'.
    groupName: Wait Condition Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

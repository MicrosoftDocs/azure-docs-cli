### YamlMime:AzureCLIGroup
uid: az_documentdb_mongocluster_user
name: az documentdb mongocluster user
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **documentdb** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az documentdb mongocluster user** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage User.
status: GA
sourceType: Extension
directCommands:
- uid: az_documentdb_mongocluster_user_create
  name: az documentdb mongocluster user create
  summary: |-
    Create a new user or updates an existing user on a mongo cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az documentdb mongocluster user create --cluster-name
                                           --name --user-name
                                           --resource-group
                                           [--acquire-policy-token]
                                           [--change-reference]
                                           [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                           [--role --roles]
                                           [--type {ServicePrincipal, User}]
  examples:
  - summary: |-
      Create an Entra-backed user.
    syntax: az documentdb mongocluster user create -n alice-entra --cluster-name MyCluster -g MyResourceGroup --type User --role db=admin role=root
  requiredParameters:
  - isRequired: true
    name: --cluster-name
    summary: |-
      The name of the mongo cluster.
  - isRequired: true
    name: --name --user-name -n
    summary: |-
      The name of the mongo cluster user.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --role --roles
    summary: |-
      Database roles that are assigned to the user. Usage: --role db=admin role=root. Multiple roles can be specified by using more than one --role argument.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.  Singular flags: `--role`.
    groupName: Properties Arguments
  - name: --type -t
    acceptedValues: ServicePrincipal, User
    summary: |-
      The Microsoft Entra principal type of the user. Allowed values: User, ServicePrincipal. Example: --type User.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

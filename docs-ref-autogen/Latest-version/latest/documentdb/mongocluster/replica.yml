### YamlMime:AzureCLIGroup
uid: az_documentdb_mongocluster_replica
name: az documentdb mongocluster replica
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **documentdb** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az documentdb mongocluster replica** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Replica.
status: GA
sourceType: Extension
directCommands:
- uid: az_documentdb_mongocluster_replica_create
  name: az documentdb mongocluster replica create
  summary: |-
    Create a cross-region read replica of an existing mongo cluster.
  description: |-
    The source cluster must have the "GeoReplicas" preview feature enabled. The replica
    is provisioned as a new mongo cluster in the target region and inherits its
    configuration (compute, storage, sharding) from the source cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az documentdb mongocluster replica create --cluster-name --name
                                              --resource-group
                                              --source-cluster
                                              --source-location
                                              [--acquire-policy-token]
                                              [--change-reference]
                                              [--location]
                                              [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
  examples:
  - summary: |-
      Create a replica of a cluster in another region.
    syntax: az documentdb mongocluster replica create -n MyReplica -g MyResourceGroup --location centralus --source-cluster MySourceCluster --source-location eastus2
  requiredParameters:
  - isRequired: true
    name: --cluster-name --name -n
    summary: |-
      The name of the mongo cluster.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --source-cluster
    summary: |-
      Name or resource ID of the source (primary) mongo cluster to replicate from. If a name is given, the current subscription and resource group are assumed.
    groupName: Replica Arguments
  - isRequired: true
    name: --source-location
    summary: |-
      The Azure region of the source cluster (for example: eastus2).
    groupName: Replica Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --location -l
    summary: |-
      The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    groupName: Resource Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_documentdb_mongocluster_replica_list
  name: az documentdb mongocluster replica list
  summary: |-
    List all the replicas for the mongo cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az documentdb mongocluster replica list --cluster-name
                                            --resource-group
                                            [--max-items]
                                            [--next-token]
  examples:
  - summary: |-
      List replicas of a cluster.
    syntax: az documentdb mongocluster replica list --cluster-name MyCluster -g MyResourceGroup
  requiredParameters:
  - isRequired: true
    name: --cluster-name
    summary: |-
      The name of the mongo cluster.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --max-items
    summary: |-
      Total number of items to return in the command's output. If the total number of items available is more than the value specified, a token is provided in the command's output. To resume pagination, provide the token value in `--next-token` argument of a subsequent command.
    groupName: Pagination Arguments
  - name: --next-token
    summary: |-
      Token to specify where to start paginating. This is the token value from a previously truncated response.
    groupName: Pagination Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_documentdb_mongocluster_replica_promote
  name: az documentdb mongocluster replica promote
  summary: |-
    Promotes a replica mongo cluster to a primary role.
  status: GA
  sourceType: Extension
  syntax: >-
    az documentdb mongocluster replica promote --promote-option {Forced}
                                               [--acquire-policy-token]
                                               [--change-reference]
                                               [--ids]
                                               [--mode {Switchover}]
                                               [--name]
                                               [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                               [--resource-group]
                                               [--subscription]
  examples:
  - summary: |-
      Promote a replica to primary.
    syntax: az documentdb mongocluster replica promote -n MyReplica -g MyResourceGroup --mode Switchover --promote-option Forced
  requiredParameters:
  - isRequired: true
    name: --promote-option
    acceptedValues: Forced
    summary: |-
      The promote option to apply to the operation.
    groupName: Body Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --mode
    acceptedValues: Switchover
    summary: |-
      The mode to apply to the promote operation. Value is optional and default value is 'Switchover'.
    groupName: Body Arguments
  - name: --name -n
    summary: |-
      The name of the replica to promote.
    groupName: Resource Id Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_documentdb_mongocluster_replica_create
- az_documentdb_mongocluster_replica_list
- az_documentdb_mongocluster_replica_promote
metadata:
  description: Manage Replica.

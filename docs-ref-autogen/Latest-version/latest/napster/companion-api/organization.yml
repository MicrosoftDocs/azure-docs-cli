  status: GA
  sourceType: Extension
  syntax: >-
    az napster companion-api organization create --name --organizationname
                                                 --resource-group
                                                 [--acquire-policy-token]
                                                 [--change-reference]
                                                 [--location]
                                                 [--marketplace]
                                                 [--mi-system-assigned --system-assigned]
                                                 [--mi-user-assigned --user-assigned]
                                                 [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                                 [--partner-properties]
                                                 [--single-sign-on-properties --sso]
                                                 [--tags]
                                                 [--user]

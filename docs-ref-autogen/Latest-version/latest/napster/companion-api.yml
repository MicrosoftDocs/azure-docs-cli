### YamlMime:AzureCLIGroup
uid: az_napster_companion-api
name: az napster companion-api
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **napster** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az napster companion-api** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Companion Api.
status: GA
sourceType: Extension
directCommands:
- uid: az_napster_companion-api_activate-saas
  name: az napster companion-api activate-saas
  summary: |-
    Resolve the token to get the SaaS resource ID and activate the SaaS resource.
  status: GA
  sourceType: Extension
  syntax: >-
    az napster companion-api activate-saas --saas-guid
                                           [--acquire-policy-token]
                                           [--change-reference]
                                           [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                           [--publisher-id]
  examples:
  - summary: |-
      SaaSOperationGroup_ActivateResource_MaximumSet - generated by [MaximumSet] rule
    syntax: az napster companion-api activate-saas --saas-guid 09fffd7d-d000-4467-cc23-d82b97e9431d --publisher-id touchcastinc1655995956899
  - summary: |-
      SaaSOperationGroup_ActivateResource_MinimumSet - generated by [MinimumSet] rule
    syntax: az napster companion-api activate-saas --saas-guid 09fffd7d-d000-4467-cc23-d82b97e9431d --publisher-id touchcastinc1655995956899
  requiredParameters:
  - isRequired: true
    name: --saas-guid
    summary: |-
      SaaS guid for Activate and Validate SaaS Resource.
    groupName: Body Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --publisher-id
    summary: |-
      Publisher Id for Napster resource.
    groupName: Body Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:

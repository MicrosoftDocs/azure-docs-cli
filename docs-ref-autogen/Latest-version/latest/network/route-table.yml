- uid: az_network_route-table_update
  name: az network route-table update
  summary: |-
    Update a route table.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/network/_help.py
  syntax: >-
    az network route-table update [--acquire-policy-token]
                                  [--add]
                                  [--change-reference]
                                  [--disable-bgp-route-propagation {0, 1, f, false, n, no, t, true, y, yes}]
                                  [--disable-peering-route {All, None}]
                                  [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                  [--ids]
                                  [--name]
                                  [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                  [--remove]
                                  [--resource-group]
                                  [--set]
                                  [--subscription]
                                  [--tags]
  examples:
  - summary: |-
      Update a route table to disable BGP route propagation.
    syntax: az network route-table update -g MyResourceGroup -n MyRouteTable --disable-bgp-route-propagation true
  optionalParameters:

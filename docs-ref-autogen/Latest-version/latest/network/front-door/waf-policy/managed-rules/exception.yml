### YamlMime:AzureCLIGroup
uid: az_network_front-door_waf-policy_managed-rules_exception
name: az network front-door waf-policy managed-rules exception
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **front-door** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az network front-door waf-policy managed-rules exception** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Exception.
status: GA
sourceType: Extension
directCommands:
- uid: az_network_front-door_waf-policy_managed-rules_exception_add
  name: az network front-door waf-policy managed-rules exception add
  summary: |-
    Create Exception.
  status: GA
  sourceType: Extension
  syntax: >-
    az network front-door waf-policy managed-rules exception add --match-values
                                                                 --match-variable {RequestHeaderNames, RequestUri, SocketAddr}
                                                                 --policy-name
                                                                 --resource-group
                                                                 --scopes
                                                                 --value-match-operator {Contains, EndsWith, Equals, EqualsAny, IPMatch, StartsWith}
                                                                 [--acquire-policy-token]
                                                                 [--change-reference]
                                                                 [--exception-index]
                                                                 [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                                                 [--selector]
                                                                 [--selector-match-operator --selector-operator {Equals}]
  examples:
  - summary: |-
      Add a managed rule exception to a WAF policy.
    syntax: az network front-door waf-policy managed-rules exception add --resource-group rg1 --policy-name Policy1 --match-variable RequestUri --match-values /login.php --value-match-operator Equals --scopes [0].rule-set-type=Microsoft_DefaultRuleSet [0].rule-set-version=2.0
  requiredParameters:
  - isRequired: true
    name: --match-values
    summary: |-
      List of values to be matched with.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Parameters.properties.managedRules.exceptionsList.exceptions[] Arguments
  - isRequired: true
    name: --match-variable
    acceptedValues: RequestHeaderNames, RequestUri, SocketAddr
    summary: |-
      The variable to be evaluated for excluding the request.
    groupName: Parameters.properties.managedRules.exceptionsList.exceptions[] Arguments
  - isRequired: true
    name: --policy-name
    summary: |-
      The name of the Web Application Firewall Policy.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --scopes
    summary: |-
      Scope(s) of the exception.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Parameters.properties.managedRules.exceptionsList.exceptions[] Arguments
  - isRequired: true
    name: --value-match-operator
    acceptedValues: Contains, EndsWith, Equals, EqualsAny, IPMatch, StartsWith
    summary: |-
      Comparison operator to apply to the value to be matched.
    groupName: Parameters.properties.managedRules.exceptionsList.exceptions[] Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --exception-index
    summary: |-
      Index of the exception. If omitted, the exception is appended.
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --selector
    summary: |-
      When matchVariable is a collection, operator used to specify which elements in the collection this exception applies to. Currently supported only for RequestHeaderNames.
    groupName: Parameters.properties.managedRules.exceptionsList.exceptions[] Arguments
  - name: --selector-match-operator --selector-operator
    acceptedValues: Equals
    summary: |-
      Comparison operator to apply to the selector when specifying which elements in the collection this exception applies to.
    groupName: Parameters.properties.managedRules.exceptionsList.exceptions[] Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

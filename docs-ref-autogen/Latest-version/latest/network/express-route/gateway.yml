- uid: az_network_express-route_gateway_update
  name: az network express-route gateway update
  summary: |-
    Update settings of an ExpressRoute gateway.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/network/_help.py
  syntax: >-
    az network express-route gateway update [--acquire-policy-token]
                                            [--add]
                                            [--allow-non-vwan-traffic {0, 1, f, false, n, no, t, true, y, yes}]
                                            [--change-reference]
                                            [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                            [--ids]
                                            [--location]
                                            [--max-val]
                                            [--min-val]
                                            [--name]
                                            [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                            [--remove]
                                            [--resource-group]
                                            [--set]
                                            [--subscription]
                                            [--tags]
                                            [--virtual-hub]
  examples:
  - summary: |-
      Update an ExpressRoute gateway.
    syntax: az network express-route gateway update --name MyExpressRouteGateway --resource-group MyResourceGroup --min-val 3
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments

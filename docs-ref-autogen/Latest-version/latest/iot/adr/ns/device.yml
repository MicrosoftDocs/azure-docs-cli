- uid: az_iot_adr_ns_device_update
  name: az iot adr ns device update
  summary: |-
    Update a device in a Device Registry namespace.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot adr ns device update --device-name --dn --name
                                --namespace --ns
                                --resource-group
                                [--acquire-policy-token]
                                [--attributes]
                                [--change-reference]
                                [--enabled {false, true}]
                                [--os-version]
                                [--policy-resource-id]
                                [--tags]
  examples:
  - summary: |-
      Disable a device
    syntax: az iot adr ns device update -n myDevice --ns myNamespace -g myResourceGroup --enabled false
  - summary: |-
      Update device OS version
    syntax: az iot adr ns device update -n myDevice --ns myNamespace -g myResourceGroup --os-version "2.0.1"
  requiredParameters:
  - isRequired: true
    name: --device-name --dn --name -n
    summary: |-
      Name of the device.
  - isRequired: true
    name: --namespace --ns
    summary: |-
      Name of the Device Registry namespace.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --attributes
    summary: |-
      Device attributes in JSON format.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --enabled
    acceptedValues: false, true
    summary: |-
      Enable or disable the device. A disabled device cannot authenticate with Microsoft Entra ID.
  - name: --os-version
    summary: |-
      Operating system version of the device.
  - name: --policy-resource-id
    summary: |-
      Resource ID of the credential policy to associate with the device.
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_iot_adr_ns_device
name: az iot adr ns device
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot** extension for the Azure CLI (version 2.67.0 or higher). The extension will automatically install the first time you run an **az iot adr ns device** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Device Registry namespace devices.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_adr_ns_device_list
  name: az iot adr ns device list
  summary: |-
    List devices in a Device Registry namespace.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot adr ns device list --namespace --ns
                              --resource-group
  examples:
  - summary: |-
      List all devices in a namespace
    syntax: az iot adr ns device list --ns myNamespace -g myResourceGroup
  requiredParameters:
  - isRequired: true
    name: --namespace --ns
    summary: |-
      Name of the Device Registry namespace.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_adr_ns_device_revoke
  name: az iot adr ns device revoke
  summary: |-
    Revoke credentials for a device in a Device Registry namespace.
  description: |-
    This command revokes all active credentials for the specified device. The device will need to re-authenticate and obtain new credentials.

    Use --disable to also prevent the device from obtaining new credentials.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot adr ns device revoke --device-name --dn --name
                                --namespace --ns
                                --resource-group
                                [--acquire-policy-token]
                                [--change-reference]
                                [--disable]
                                [--yes {false, true}]
  examples:
  - summary: |-
      Revoke device credentials
    syntax: az iot adr ns device revoke -n myDevice --ns myNamespace -g myResourceGroup
  - summary: |-
      Revoke credentials and disable the device
    syntax: az iot adr ns device revoke -n myDevice --ns myNamespace -g myResourceGroup --disable
  requiredParameters:
  - isRequired: true
    name: --device-name --dn --name -n
    summary: |-
      Name of the device.
  - isRequired: true
    name: --namespace --ns
    summary: |-
      Name of the Device Registry namespace.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --disable
    defaultValue: "False"
    summary: |-
      Disable the device after revoking credentials. Prevents new credentials from being issued.
  - name: --yes -y
    acceptedValues: false, true
    summary: |-
      Skip user prompts. Indicates acceptance of action. Used primarily for automation scenarios. Default: false.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

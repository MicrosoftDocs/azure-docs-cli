### YamlMime:AzureCLIGroup
uid: az_iot_adr_ns_policy
name: az iot adr ns policy
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot** extension for the Azure CLI (version 2.67.0 or higher). The extension will automatically install the first time you run an **az iot adr ns policy** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Device Registry namespace policies.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_adr_ns_policy_activate-byor
  name: az iot adr ns policy activate-byor
  summary: |-
    Activate or renew a Bring Your Own Root (BYOR) policy with a signed certificate chain.
  description: |-
    This command activates a BYOR policy by uploading the signed certificate chain. Use this after creating a policy with --enable-byor and signing the CSR (from 'policy show') with your CA.

    The certificate chain file must be in PEM format and contain:
    1. The signed certificate (matching the CSR generated by the service)
    2. Any intermediate CA certificates
    3. Optionally, the root CA certificate

    Certificates must be ordered from leaf to root.

    This command is also used for certificate renewal when the BYOR status shows 'ActiveButPendingRenewal'.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot adr ns policy activate-byor --ccf --certificate-chain-file
                                       --name --pn --policy-name
                                       --namespace --ns
                                       --resource-group
                                       [--acquire-policy-token]
                                       [--change-reference]
  examples:
  - summary: |-
      Activate a BYOR policy with a signed certificate chain
    syntax: az iot adr ns policy activate-byor -n myPolicy --ns myNamespace -g myResourceGroup --certificate-chain-file ./signed-chain.pem
  requiredParameters:
  - isRequired: true
    name: --ccf --certificate-chain-file
    summary: |-
      Path to a PEM file containing the signed certificate chain. The file must contain the signed certificate (matching the CSR from policy show), followed by any intermediate CAs, and optionally the root CA. Certificates must be ordered from leaf to root.
  - isRequired: true
    name: --name --pn --policy-name -n
    summary: |-
      Name of the policy.
  - isRequired: true
    name: --namespace --ns
    summary: |-
      Name of the Device Registry namespace.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_adr_ns_policy_create
  name: az iot adr ns policy create
  summary: |-
    Create a policy for a Device Registry namespace.
  description: |-
    By default, policies use a service-managed CA.
    To use your own CA (Bring Your Own Root), use --enable-byor and then activate the policy with the signed CSR using activate-byor.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot adr ns policy create --name --pn --policy-name
                                --namespace --ns
                                --resource-group
                                [--acquire-policy-token]
                                [--cert-key-type {ECC, RSA}]
                                [--cert-subject]
                                [--cert-validity-days]
                                [--change-reference]
                                [--enable-byor {false, true}]
                                [--tags]
  examples:
  - summary: |-
      Create a basic policy with a default subject, certificate type (ECC), and validity period.
    syntax: az iot adr ns policy create -n myPolicy --ns myNamespace -g myResourceGroup
  - summary: |-
      Create a policy with custom validity period
    syntax: az iot adr ns policy create -n myPolicy --ns myNamespace -g myResourceGroup --cert-validity-days 30
  - summary: |-
      Create a BYOR (Bring Your Own Root) policy
    syntax: >-
      az iot adr ns policy create -n myPolicy --ns myNamespace -g myResourceGroup --enable-byor

      # After creation, retrieve the CSR from 'policy show' and sign it with your CA,

      # then activate with 'az iot adr ns policy activate-byor'
  requiredParameters:
  - isRequired: true
    name: --name --pn --policy-name -n
    summary: |-
      Name of the policy.
  - isRequired: true
    name: --namespace --ns
    summary: |-
      Name of the Device Registry namespace.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --cert-key-type
    acceptedValues: ECC, RSA
    summary: |-
      Policy certificate authority key type.
    groupName: Policy Certificate Arguments
  - name: --cert-subject
    summary: |-
      Policy certificate subject.
    groupName: Policy Certificate Arguments
  - name: --cert-validity-days
    summary: |-
      Policy certificate validity period in days.
    groupName: Policy Certificate Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --enable-byor
    acceptedValues: false, true
    summary: |-
      Enable Bring Your Own Root (BYOR) mode for the policy. When enabled, you must sign the service-generated CSR with your own CA and activate using 'az iot adr ns policy activate-byor'. This cannot be changed after policy creation.
    groupName: Bring Your Own Root Arguments
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

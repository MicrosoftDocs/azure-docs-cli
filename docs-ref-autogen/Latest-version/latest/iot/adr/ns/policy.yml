- uid: az_iot_adr_ns_policy_revoke-issuer
  name: az iot adr ns policy revoke-issuer
  summary: |-
    Revoke the CA certificate for a Device Registry namespace policy.
  description: |-
    This command revokes the current CA (issuer) certificate for the policy, triggering the service to generate a new CA certificate. All device credentials issued by the old CA will need to be re-issued. Use this when the CA certificate is compromised or needs rotation.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot adr ns policy revoke-issuer --name --pn --policy-name
                                       --namespace --ns
                                       --resource-group
                                       [--acquire-policy-token]
                                       [--change-reference]
                                       [--yes {false, true}]
  examples:
  - summary: |-
      Revoke the issuer certificate for a policy
    syntax: az iot adr ns policy revoke-issuer -n myPolicy --ns myNamespace -g myResourceGroup
  requiredParameters:
  - isRequired: true
    name: --name --pn --policy-name -n
    summary: |-
      Name of the policy.
  - isRequired: true
    name: --namespace --ns
    summary: |-
      Name of the Device Registry namespace.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference

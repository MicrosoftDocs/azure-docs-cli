### YamlMime:AzureCLIGroup
uid: az_iot_ops_ns_asset
name: az iot ops ns asset
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot-ops** extension for the Azure CLI (version 2.70.0 or higher). The extension will automatically install the first time you run an **az iot ops ns asset** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage namespaced assets in an IoT Operations instance.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_ops_ns_asset_create
  name: az iot ops ns asset create
  summary: |-
    Create a namespaced asset in an IoT Operations instance.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: 'This command is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
  sourceType: Extension
  syntax: >-
    az iot ops ns asset create --connector-type --ct
                               --instance
                               --resource-group
                               [--ac --asset-config]
                               [--acquire-policy-token]
                               [--asset-type-ref --type-ref]
                               [--attr --attribute]
                               [--change-reference]
                               [--description]
                               [--device]
                               [--disable {false, true}]
                               [--display-name --dn]
                               [--doc-uri --documentation-uri]
                               [--eid --external-asset-id]
                               [--endpoint --ep]
                               [--hardware-revision --hw-rev]
                               [--manufacturer]
                               [--manufacturer-uri --mfr-uri]
                               [--model]
                               [--name]
                               [--pc --product-code]
                               [--serial-number --sn]
                               [--show-template {config, schema}]
                               [--software-revision --sw-rev]
                               [--tags]
  examples:
  - summary: |-
      Create a namespaced asset for a given connector type
    syntax: az iot ops ns asset create --name myasset --instance myInstance -g myInstanceResourceGroup --connector-type Microsoft.OpcUa --device mydevice --endpoint myEndpoint
  - summary: |-
      Create a namespaced asset with a connector-specific configuration using a file
    syntax: az iot ops ns asset create --name myasset --instance myInstance -g myInstanceResourceGroup --connector-type Microsoft.OpcUa --device mydevice --endpoint myEndpoint --asset-config path/to/config.yaml
  - summary: |-
      Create a namespaced asset with a connector-specific configuration using inline JSON
    syntax: az iot ops ns asset create --name myasset --instance myInstance -g myInstanceResourceGroup --connector-type Microsoft.OpcUa --device mydevice --endpoint myEndpoint --asset-config '{"defaultDatasetsConfiguration":{"publishingInterval":1000,"samplingInterval":500,"queueSize":5}}'
  - summary: |-
      Create a namespaced asset with connector configuration and metadata in a single operation
    syntax: az iot ops ns asset create --name myasset --instance myInstance -g myInstanceResourceGroup --connector-type Microsoft.OpcUa --device mydevice --endpoint myEndpoint --asset-config path/to/config.yaml --description "Factory floor sensor" --display-name "My Asset v1" --manufacturer "Contoso" --model "SensorX1" --serial-number "SN-001"
  - summary: |-
      Show the configuration template for a connector type without creating an asset
    syntax: az iot ops ns asset create --connector-type Microsoft.OpcUa --show-template config --instance myInstance -g myInstanceResourceGroup
  requiredParameters:
  - isRequired: true
    name: --connector-type --ct
    summary: |-
      Connector type for the asset (e.g. 'Microsoft.OpcUa', 'Microsoft.Http'). For all types except Microsoft.OpcUa, the matching connector template must exist in the instance when --asset-config is provided.
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --ac --asset-config
    summary: |-
      Inline JSON string or path to a JSON/YAML file (.json, .yaml, .yml) containing connector-specific default asset configurations and destinations. Accepted keys vary by connector type (e.g. defaultDatasetsConfiguration, defaultEventsConfiguration, defaultStreamsConfiguration, defaultDatasetsDestinations, defaultEventsDestinations, defaultStreamsDestinations). Use --show-template to discover the supported keys and their schema for the target connector type. Cannot be combined with --show-template.
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --asset-type-ref --type-ref
    summary: |-
      Space-separated list of asset type references.
    groupName: Additional Info Arguments
  - name: --attr --attribute
    summary: |-
      Space-separated key=value pairs for custom asset attributes.
    groupName: Additional Info Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      Description of the asset.
    groupName: Additional Info Arguments
  - name: --device -d
    summary: |-
      Device name. Required unless --show-template is used.
  - name: --disable
    acceptedValues: false, true
    summary: |-
      Disable the asset.
    groupName: Additional Info Arguments
  - name: --display-name --dn
    summary: |-
      Display name for the asset.
    groupName: Additional Info Arguments
  - name: --doc-uri --documentation-uri
    summary: |-
      Documentation URI for the asset.
    groupName: Additional Info Arguments
  - name: --eid --external-asset-id
    summary: |-
      External asset ID.
    groupName: Additional Info Arguments
  - name: --endpoint --ep
    summary: |-
      Device inbound endpoint name. Required unless --show-template is used.
  - name: --hardware-revision --hw-rev
    summary: |-
      Hardware revision information.
    groupName: Additional Info Arguments
  - name: --manufacturer
    summary: |-
      Manufacturer name.
    groupName: Additional Info Arguments
  - name: --manufacturer-uri --mfr-uri
    summary: |-
      Manufacturer URI.
    groupName: Additional Info Arguments
  - name: --model
    summary: |-
      Model name or number.
    groupName: Additional Info Arguments
  - name: --name -n
    summary: |-
      Name of the asset. Required unless --show-template is used.
  - name: --pc --product-code
    summary: |-
      Product code.
    groupName: Additional Info Arguments
  - name: --serial-number --sn
    summary: |-
      Serial number.
    groupName: Additional Info Arguments
  - name: --show-template
    acceptedValues: config, schema
    summary: |-
      Show a starter configuration template for the connector type and exit without creating an asset. config: fields shown with their default values (null if no default); output is directly usable as --asset-config input. oneOf fields with multiple variants collapse to the first non-null variant and emit a warning — run with schema mode to see all options. allOf fields merge all non-null sub-schemas into one flat object. schema: every field includes type, default, and constraints (min, max, enum, pattern); oneOf/allOf fields show all variants so you can inspect the full schema. Draft-07 $ref pointers (#/definitions/...) are resolved inline in both modes.
  - name: --software-revision --sw-rev
    summary: |-
      Software revision information.
    groupName: Additional Info Arguments
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_ns_asset_delete
  name: az iot ops ns asset delete
  summary: |-
    Delete a namespaced asset from an IoT Operations instance.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops ns asset delete --instance
                               --name
                               --resource-group
                               [--acquire-policy-token]
                               [--change-reference]
                               [--yes {false, true}]
  examples:
  - summary: |-
      Delete an asset with confirmation prompt
    syntax: az iot ops ns asset delete --name myasset --instance myInstance -g myInstanceResourceGroup
  - summary: |-
      Delete an asset and skip the confirmation prompt
    syntax: az iot ops ns asset delete --name myasset --instance myInstance -g myInstanceResourceGroup -y
  requiredParameters:
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the asset.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --yes -y
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Confirm [y]es without a prompt. Useful for CI and automation scenarios.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_ns_asset_query
  name: az iot ops ns asset query
  summary: |-
    Query namespaced assets.
  description: |-
    Query assets across namespaces based on various search criteria including asset name,
    device name, endpoint name and more.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops ns asset query [--acquire-policy-token]
                              [--change-reference]
                              [--cq --custom-query]
                              [--device]
                              [--disabled {false, true}]
                              [--display-name --dn]
                              [--doc-uri --documentation-uri]
                              [--eid --external-asset-id]
                              [--endpoint --ep]
                              [--hardware-revision --hw-rev]
                              [--instance]
                              [--manufacturer]
                              [--manufacturer-uri --mfr-uri]
                              [--model]
                              [--name]
                              [--pc --product-code]
                              [--resource-group]
                              [--serial-number --sn]
                              [--software-revision --sw-rev]
  examples:
  - summary: |-
      Query for assets in an IoT Operations instance
    syntax: az iot ops ns asset query --instance myInstance -g myInstanceResourceGroup
  - summary: |-
      Query for a specific asset by name
    syntax: az iot ops ns asset query --name myasset
  - summary: |-
      Query for assets associated with a specific device and endpoint
    syntax: az iot ops ns asset query --device mydevice --endpoint myEndpoint
  - summary: |-
      Use a custom query to search for assets
    syntax: az iot ops ns asset query --custom-query "where tags.environment=='production'"

- uid: az_iot_ops_ns_asset_update
  name: az iot ops ns asset update
  summary: |-
    Update a namespaced asset in an IoT Operations instance.
  description: |-
    The connector type is detected from the asset's device endpoint. Use --asset-config to supply connector-specific configuration (defaultDatasetsConfiguration, defaultEventsConfiguration, etc.). Use --show-template config to see the current asset configuration pre-filled with existing values (ready to edit and pass back via --asset-config). Use --show-template schema to see the full connector schema with types and constraints.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: 'This command is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
  sourceType: Extension
  syntax: >-
    az iot ops ns asset update --instance
                               --name
                               --resource-group
                               [--ac --asset-config]
                               [--acquire-policy-token]
                               [--asset-type-ref --type-ref]
                               [--attr --attribute]
                               [--change-reference]
                               [--description]
                               [--disable {false, true}]
                               [--display-name --dn]
                               [--doc-uri --documentation-uri]
                               [--eid --external-asset-id]
                               [--hardware-revision --hw-rev]
                               [--manufacturer]
                               [--manufacturer-uri --mfr-uri]
                               [--model]
                               [--pc --product-code]
                               [--serial-number --sn]
                               [--show-template {config, schema}]
                               [--software-revision --sw-rev]
                               [--tags]
  examples:
  - summary: |-
      Update an asset's basic properties
    syntax: az iot ops ns asset update --name myasset --instance myInstance -g myInstanceResourceGroup --description "Updated description" --display-name "My Asset v2"
  - summary: |-
      Update an asset's connector-specific configuration using a file
    syntax: az iot ops ns asset update --name myasset --instance myInstance -g myInstanceResourceGroup --asset-config path/to/config.yaml
  - summary: |-
      Update an asset's connector-specific configuration using inline JSON
    syntax: az iot ops ns asset update --name myasset --instance myInstance -g myInstanceResourceGroup --asset-config '{"defaultDatasetsConfiguration":{"publishingInterval":2000,"samplingInterval":1000}}'
  - summary: |-
      Update an asset's connector configuration along with metadata in a single operation
    syntax: az iot ops ns asset update --name myasset --instance myInstance -g myInstanceResourceGroup --asset-config path/to/config.yaml --description "Updated factory sensor" --display-name "My Asset v2" --manufacturer "Contoso" --model "SensorX1" --serial-number "SN-001"
  - summary: |-
      Show current asset config pre-filled with existing values (for editing before update)
    syntax: az iot ops ns asset update --name myasset --instance myInstance -g myInstanceResourceGroup --show-template config
  - summary: |-
      Show the full connector schema structure with types and constraints
    syntax: az iot ops ns asset update --name myasset --instance myInstance -g myInstanceResourceGroup --show-template schema
  requiredParameters:
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the asset.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --ac --asset-config
    summary: |-
      Inline JSON string or path to a JSON/YAML file (.json, .yaml, .yml) containing connector-specific default asset configurations and destination settings to update. Accepted keys vary by connector type and can include destination keys such as defaultDatasetsDestinations, defaultEventsDestinations, defaultStreamsDestinations. Use --show-template to discover the supported keys and their schema for the asset's connector type. Cannot be combined with --show-template.
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --asset-type-ref --type-ref
    summary: |-
      Space-separated list of asset type references.
    groupName: Additional Info Arguments
  - name: --attr --attribute
    summary: |-
      Space-separated key=value pairs for custom asset attributes.
    groupName: Additional Info Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      Description of the asset.
    groupName: Additional Info Arguments
  - name: --disable
    acceptedValues: false, true
    summary: |-
      Disable the asset.
    groupName: Additional Info Arguments
  - name: --display-name --dn
    summary: |-
      Display name for the asset.
    groupName: Additional Info Arguments
  - name: --doc-uri --documentation-uri
    summary: |-
      Documentation URI for the asset.
    groupName: Additional Info Arguments
  - name: --eid --external-asset-id
    summary: |-
      External asset ID.
    groupName: Additional Info Arguments
  - name: --hardware-revision --hw-rev
    summary: |-
      Hardware revision information.
    groupName: Additional Info Arguments
  - name: --manufacturer
    summary: |-
      Manufacturer name.
    groupName: Additional Info Arguments
  - name: --manufacturer-uri --mfr-uri
    summary: |-
      Manufacturer URI.
    groupName: Additional Info Arguments
  - name: --model
    summary: |-
      Model name or number.
    groupName: Additional Info Arguments
  - name: --pc --product-code
    summary: |-
      Product code.
    groupName: Additional Info Arguments
  - name: --serial-number --sn
    summary: |-
      Serial number.
    groupName: Additional Info Arguments
  - name: --show-template
    acceptedValues: config, schema
    summary: |-
      Show a starter configuration template for the asset's connector type and exit without updating the asset. The connector type is read from the existing asset. config: fields shown with their default values (null if no default); output is directly usable as --asset-config input. oneOf fields with multiple variants collapse to the first non-null variant and emit a warning — run with schema mode to see all options. allOf fields merge all non-null sub-schemas into one flat object. schema: every field includes type, default, and constraints (min, max, enum, pattern); oneOf/allOf fields show all variants so you can inspect the full schema. Draft-07 $ref pointers (#/definitions/...) are resolved inline in both modes.
  - name: --software-revision --sw-rev
    summary: |-
      Software revision information.
    groupName: Additional Info Arguments
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

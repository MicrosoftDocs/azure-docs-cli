### YamlMime:AzureCLIGroup
uid: az_iot_ops_ns_mgmt-endpoint
name: az iot ops ns mgmt-endpoint
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot-ops** extension for the Azure CLI (version 2.70.0 or higher). The extension will automatically install the first time you run an **az iot ops ns mgmt-endpoint** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage management endpoints on Device Registry namespaces.
description: |-
  Management endpoints are configured by `az iot ops mgmt-actions enable` and
  associate an Event Grid namespace with a custom location scope.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_ops_ns_mgmt-endpoint_remove
  name: az iot ops ns mgmt-endpoint remove
  summary: |-
    Remove a management endpoint entry from a Device Registry namespace.
  description: |-
    Removes a single management endpoint entry from the ADR namespace.
    This is useful for targeted cleanup when full `mgmt-actions disable` teardown
    is not appropriate — for example, when switching Event Grid namespaces,
    cleaning up after an externally deleted Event Grid namespace, or removing
    management actions configuration for a specific custom location scope without
    tearing down the full infrastructure.

    Use `az iot ops ns show` to inspect available endpoint keys under
    properties.management.endpoints.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops ns mgmt-endpoint remove --endpoint-key
                                       --name
                                       --resource-group
                                       [--acquire-policy-token]
                                       [--change-reference]
                                       [--yes {false, true}]
  examples:
  - summary: |-
      Remove a management endpoint entry by key.
    syntax: az iot ops ns mgmt-endpoint remove -n mynamespace -g myResourceGroup --endpoint-key $CUSTOM_LOCATION_RESOURCE_ID
  - summary: |-
      Remove a management endpoint entry without confirmation prompt.
    syntax: az iot ops ns mgmt-endpoint remove -n mynamespace -g myResourceGroup --endpoint-key $CUSTOM_LOCATION_RESOURCE_ID -y
  requiredParameters:
  - isRequired: true
    name: --endpoint-key
    summary: |-
      The management endpoint key to remove (custom location resource ID). Use `az iot ops ns show` to inspect available endpoint keys under properties.management.endpoints.
  - isRequired: true
    name: --name -n
    summary: |-
      Namespace name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Resource group containing the ADR namespace.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --yes -y
    acceptedValues: false, true
    summary: |-
      Confirm [y]es without a prompt. Useful for CI and automation scenarios.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_iot_ops_ns_mgmt-endpoint_remove
metadata:
  description: >-
    Management endpoints are configured by `az iot ops mgmt-actions enable` and

    associate an Event Grid namespace with a custom location scope.

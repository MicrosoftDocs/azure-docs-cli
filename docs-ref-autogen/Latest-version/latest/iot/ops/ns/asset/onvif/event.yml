    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --format -f
    defaultValue: json
    acceptedValues: csv, json, yaml
    summary: |-
      Export file format.
  - name: --od --output-dir
    defaultValue: .

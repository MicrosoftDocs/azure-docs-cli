  - name: --replace
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Replace the event if another event with the same name is already present.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors

    az iot ops ns asset onvif event export --asset
                                           --eg --event-group
                                           --instance
                                           --resource-group
                                           [--acquire-policy-token]
                                           [--change-reference]
                                           [--format {csv, json, yaml}]
                                           [--od --output-dir]
                                           [--replace {false, true}]
  requiredParameters:
  - isRequired: true
    name: --asset -a
    summary: |-
      Asset name.
  - isRequired: true
    name: --eg --event-group

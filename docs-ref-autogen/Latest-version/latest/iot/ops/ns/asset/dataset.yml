- uid: az_iot_ops_ns_asset_dataset_update
  name: az iot ops ns asset dataset update
  summary: |-
    Update a dataset for a namespaced asset in an IoT Operations instance.
  description: |-
    The connector type is detected from the asset's device endpoint. Use --dataset-config to supply connector-specific configuration. Use --show-template config to see current dataset values pre-filled in the full schema structure (ready to edit and pass back via --dataset-config). Use --show-template schema to see the full connector schema with types and constraints.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: 'This command is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
  sourceType: Extension
  syntax: >-
    az iot ops ns asset dataset update --asset
                                       --instance
                                       --name
                                       --resource-group
                                       [--acquire-policy-token]
                                       [--change-reference]
                                       [--data-source --ds]
                                       [--dataset-config --dc]
                                       [--show-template {config, schema}]
                                       [--tr --type-ref]
  examples:
  - summary: |-
      Show current dataset config pre-filled with existing values (for editing before update)
    syntax: az iot ops ns asset dataset update --asset myasset --instance myInstance -g myInstanceResourceGroup --name default --show-template config
  - summary: |-
      Show the dataset config schema with types and constraints
    syntax: az iot ops ns asset dataset update --asset myasset --instance myInstance -g myInstanceResourceGroup --name default --show-template schema
  - summary: |-
      Update dataset configuration from inline JSON
    syntax: "az iot ops ns asset dataset update --asset myasset --instance myInstance -g myInstanceResourceGroup --name default --dataset-config '{\"datasetConfiguration\": {\"publishingInterval\": 2000}}'"
  - summary: |-
      Update dataset data source
    syntax: az iot ops ns asset dataset update --asset myasset --instance myInstance -g myInstanceResourceGroup --name default --data-source "ns=3;s=UpdatedSensor"
  requiredParameters:
  - isRequired: true
    name: --asset -a
    summary: |-
      Asset name.
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --name -n
    summary: |-
      Dataset name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --data-source --ds
    summary: |-
      Data source for the dataset.
  - name: --dataset-config --dc
    summary: |-
      Inline JSON string or path to a JSON/YAML file (.json, .yaml, .yml) containing connector-specific dataset configuration and/or destinations. Accepted keys are 'datasetConfiguration' (connector-specific config object) and 'destinations' (list of destination objects). Use --show-template to discover the supported keys and schema for the asset's connector type. Cannot be combined with --show-template. For non-OPC UA connectors, a connector template must exist in the instance.
  - name: --show-template
    acceptedValues: config, schema
    summary: |-
      Show a starter dataset configuration template for the asset's connector type and exit without modifying the dataset. The connector type is read from the existing asset. config: fields shown with their default values (null if no default); output is directly usable as --dataset-config input. schema: every field includes type, default, and constraints (min, max, enum, pattern). Draft-07 $ref pointers (#/definitions/...) are resolved inline in both modes.
  - name: --tr --type-ref
    summary: |-
      Type definition ID or URI.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

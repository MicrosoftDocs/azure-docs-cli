### YamlMime:AzureCLIGroup
uid: az_iot_ops_ns_asset_datapoint
name: az iot ops ns asset datapoint
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot-ops** extension for the Azure CLI (version 2.70.0 or higher). The extension will automatically install the first time you run an **az iot ops ns asset datapoint** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage data points for asset datasets in IoT Operations namespaces.
description: |-
  The connector type is detected automatically from the existing asset. For connector-specific parameters use --datapoint-config (inline JSON or file). Use --show-template to discover the supported configuration schema for the asset's connector type.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_ops_ns_asset_datapoint_add
  name: az iot ops ns asset datapoint add
  summary: |-
    Add a datapoint to an asset dataset in an IoT Operations namespace.
  description: |-
    The connector type is detected from the asset's device endpoint. Connector-specific configuration (queue size, sampling interval, etc.) can be supplied via --datapoint-config. Use --show-template to discover the supported config schema. For non-OPC UA connectors, a connector template must exist in the instance.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: 'This command is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
  sourceType: Extension
  syntax: >-
    az iot ops ns asset datapoint add --asset
                                      --data-source --ds
                                      --dataset
                                      --instance
                                      --name
                                      --resource-group
                                      [--acquire-policy-token]
                                      [--change-reference]
                                      [--datapoint-config --dpc]
                                      [--replace {false, true}]
                                      [--show-template {config, schema}]
                                      [--tr --type-ref]
  examples:
  - summary: |-
      Add a basic datapoint to any asset type
    syntax: az iot ops ns asset datapoint add --asset myasset --instance myInstance -g myInstanceResourceGroup --dataset default --name temp1 --data-source "ns=2;s=Temp1"
  - summary: |-
      Show the datapoint config template for the asset's connector type
    syntax: az iot ops ns asset datapoint add --asset myasset --instance myInstance -g myInstanceResourceGroup --dataset default --name temp1 --data-source "ns=2;s=Temp1" --show-template config
  - summary: |-
      Add a datapoint with connector-specific configuration from inline JSON
    syntax: "az iot ops ns asset datapoint add --asset myasset --instance myInstance -g myInstanceResourceGroup --dataset default --name temp1 --data-source \"ns=2;s=Temp1\" --datapoint-config '{\"datapointConfiguration\": {\"samplingInterval\": 1000, \"queueSize\": 5}}'"
  - summary: |-
      Add a datapoint with configuration from a file
    syntax: az iot ops ns asset datapoint add --asset myasset --instance myInstance -g myInstanceResourceGroup --dataset default --name temp1 --data-source "ns=2;s=Temp1" --datapoint-config ./datapoint_config.json
  - summary: |-
      Replace an existing datapoint
    syntax: az iot ops ns asset datapoint add --asset myasset --instance myInstance -g myInstanceResourceGroup --dataset default --name temp1 --data-source "ns=3;s=NewTemp" --replace
  requiredParameters:
  - isRequired: true
    name: --asset -a
    summary: |-
      Asset name.
  - isRequired: true
    name: --data-source --ds
    summary: |-
      Data source for the data point.
  - isRequired: true
    name: --dataset -d
    summary: |-
      Dataset name.
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --name -n
    summary: |-
      Data point name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --datapoint-config --dpc
    summary: |-
      Inline JSON string or path to a JSON/YAML file (.json, .yaml, .yml) containing connector-specific datapoint configuration. Accepted key is 'datapointConfiguration' (connector-specific config object). Use --show-template to discover the supported keys and schema for the asset's connector type. Cannot be combined with --show-template. For non-OPC UA connectors, a connector template must exist in the instance.
  - name: --replace
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Replace the data point if another point with the same name is already present.
  - name: --show-template
    acceptedValues: config, schema
    summary: |-
      Show a starter datapoint configuration template for the asset's connector type and exit without modifying the datapoint. The connector type is read from the existing asset. config: fields shown with their default values (null if no default); output is directly usable as --datapoint-config input. schema: every field includes type, default, and constraints (min, max, enum, pattern). Draft-07 $ref pointers (#/definitions/...) are resolved inline in both modes.
  - name: --tr --type-ref
    summary: |-
      Type definition ID or URI.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

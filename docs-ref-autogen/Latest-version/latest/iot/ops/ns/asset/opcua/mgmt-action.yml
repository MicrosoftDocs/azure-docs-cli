### YamlMime:AzureCLIGroup
uid: az_iot_ops_ns_asset_opcua_mgmt-action
name: az iot ops ns asset opcua mgmt-action
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot-ops** extension for the Azure CLI (version 2.70.0 or higher). The extension will automatically install the first time you run an **az iot ops ns asset opcua mgmt-action** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage actions within OPC UA asset management groups.
description: |-
  Actions within management groups define specific operations that can be performed on OPC UA assets.
  Each action has a target URI and can include timeout and topic configuration.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_ops_ns_asset_opcua_mgmt-action_add
  name: az iot ops ns asset opcua mgmt-action add
  summary: |-
    Add an action to an OPC UA asset management group.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops ns asset opcua mgmt-action add --asset
                                              --group
                                              --instance
                                              --name
                                              --resource-group
                                              --target-uri --uri
                                              [--acquire-policy-token]
                                              [--action-type --at {Call, Read, Write}]
                                              [--change-reference]
                                              [--replace {false, true}]
                                              [--timeout --to]
                                              [--topic]
                                              [--tr --type-ref]
  examples:
  - summary: |-
      Add a basic action to a management group.
    syntax: az iot ops ns asset opcua mgmt-action add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --group myManagementGroup --name myAction --target-uri /opcua/device_service?OPCUAProfile=Profile1
  - summary: |-
      Add an action with timeout and topic.
    syntax: az iot ops ns asset opcua mgmt-action add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --group myManagementGroup --name myAction --target-uri /opcua/device_service?OPCUAProfile=Profile1 --timeout 45 --topic factory/opcua/actions
  - summary: |-
      Add an action with specific action type.
    syntax: az iot ops ns asset opcua mgmt-action add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --group myManagementGroup --name myAction --target-uri /opcua/device_service?OPCUAProfile=Profile1 --action-type Call --timeout 30
  - summary: |-
      Add an action with a type reference.
    syntax: az iot ops ns asset opcua mgmt-action add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --group myManagementGroup --name myAction --target-uri /opcua/device_service?OPCUAProfile=Profile1 --type-ref ns=2;i=1234
  - summary: |-
      Replace an existing action with the same name.
    syntax: az iot ops ns asset opcua mgmt-action add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --group myManagementGroup --name myAction --target-uri /opcua/device_service?OPCUAProfile=Profile2 --timeout 60 --replace
  requiredParameters:
  - isRequired: true
    name: --asset -a
    summary: |-
      Asset name.
  - isRequired: true
    name: --group
    summary: |-
      Management group name.
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --name -n
    summary: |-
      Action name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  - isRequired: true
    name: --target-uri --uri
    summary: |-
      Target URI for the management action.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --action-type --at
    defaultValue: Call
    acceptedValues: Call, Read, Write
    summary: |-
      Type of management action.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --replace
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Replace the action if another action with the same name is already present.
  - name: --timeout --to
    summary: |-
      Timeout in seconds for this specific action. Minimum: 0.
  - name: --topic -t
    summary: |-
      Topic override for this specific action.
  - name: --tr --type-ref
    summary: |-
      URI or type definition ID for the action.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_ns_asset_opcua_mgmt-action_export
  name: az iot ops ns asset opcua mgmt-action export
  summary: |-
    Export management actions to file.
  description: |-
    Export actions from a management group to JSON, YAML, or CSV format.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops ns asset opcua mgmt-action export --asset
                                                 --group
                                                 --instance
                                                 --resource-group
                                                 [--acquire-policy-token]
                                                 [--change-reference]
                                                 [--format {csv, json, yaml}]
                                                 [--od --output-dir]
                                                 [--replace {false, true}]
  examples:
  - summary: |-
      Export actions to CSV.
    syntax: az iot ops ns asset opcua mgmt-action export -a myasset --instance myinstance -g myresourcegroup --group mygroup -f csv
  - summary: |-
      Export actions to JSON.
    syntax: az iot ops ns asset opcua mgmt-action export -a myasset --instance myinstance -g myresourcegroup --group mygroup
  requiredParameters:
  - isRequired: true
    name: --asset -a
    summary: |-
      Asset name.
  - isRequired: true
    name: --group
    summary: |-
      Management group name.
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --format -f
    defaultValue: json
    acceptedValues: csv, json, yaml
    summary: |-
      Export file format.
  - name: --od --output-dir
    defaultValue: .
    summary: |-
      Output directory for export.
  - name: --replace
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Replace the action if another action with the same name is already present.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_ns_asset_opcua_mgmt-action_import
  name: az iot ops ns asset opcua mgmt-action import
  summary: |-
    Import management actions from file.
  description: |-
    Import actions from JSON, YAML, or CSV file. Use --replace to merge with overwrite. Default actionType is 'Call' if not specified.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops ns asset opcua mgmt-action import --asset
                                                 --group
                                                 --if --input-file
                                                 --instance
                                                 --resource-group
                                                 [--acquire-policy-token]
                                                 [--change-reference]
                                                 [--replace {false, true}]
  examples:
  - summary: |-
      Import actions from CSV file.
    syntax: az iot ops ns asset opcua mgmt-action import -a myasset --instance myinstance -g myresourcegroup --group mygroup --if /path/to/actions.csv
  - summary: |-
      Import actions with replace mode.
    syntax: az iot ops ns asset opcua mgmt-action import -a myasset --instance myinstance -g myresourcegroup --group mygroup --if /path/to/actions.json --replace
  requiredParameters:
  - isRequired: true
    name: --asset -a
    summary: |-
      Asset name.
  - isRequired: true
    name: --group
    summary: |-
      Management group name.
  - isRequired: true
    name: --if --input-file
    summary: |-
      Path to import file (JSON, YAML, or CSV).
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --replace
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Replace the action if another action with the same name is already present.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

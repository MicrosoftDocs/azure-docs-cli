### YamlMime:AzureCLIGroup
uid: az_iot_ops_ns_asset_opcua_event-group
name: az iot ops ns asset opcua event-group
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot-ops** extension for the Azure CLI (version 2.70.0 or higher). The extension will automatically install the first time you run an **az iot ops ns asset opcua event-group** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage event groups for OPC UA namespaced assets in an IoT Operations instance.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_ops_ns_asset_opcua_event-group_add
  name: az iot ops ns asset opcua event-group add
  summary: |-
    Add an event group to an OPC UA namespaced asset in an IoT Operations instance.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops ns asset opcua event-group add --asset
                                              --instance
                                              --name
                                              --resource-group
                                              [--data-source --ds]
                                              [--dest --destination]
                                              [--fc --filter-clause]
                                              [--filter-type --ft]
                                              [--pi --publish-int]
                                              [--qs --queue-size]
                                              [--replace {false, true}]
                                              [--start --start-inst]
  examples:
  - summary: |-
      Add a basic OPC UA event group
    syntax: az iot ops ns asset opcua event-group add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --name alarmEvent --data-source "ns=2;i=1000"
  - summary: |-
      Add an OPC UA event group with publishing interval and queue size
    syntax: az iot ops ns asset opcua event-group add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --name systemEvent --data-source "ns=2;i=200" --publish-int 1500 --queue-size 8
  - summary: |-
      Add an OPC UA event group with MQTT destination
    syntax: az iot ops ns asset opcua event-group add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --name criticalAlarm --data-source "ns=2;i=4000" --dest topic="factory/opcua/alarms" retain=Keep qos=Qos0 ttl=7200
  - summary: |-
      Replace an OPC UA event group with same name
    syntax: az iot ops ns asset opcua event-group add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --name alarmEvent --data-source "ns=3;i=1000" --replace
  - summary: |-
      Add an OPC UA event group with a start instance
    syntax: az iot ops ns asset opcua event-group add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --name alarmEvent --data-source "ns=2;i=1000" --start-inst "ns=3;i=3001"
  - summary: |-
      Add an OPC UA event group with filter type and filter clauses
    syntax: az iot ops ns asset opcua event-group add --asset myopcuaasset --instance myInstance -g myInstanceResourceGroup --name alarmEvent --data-source "ns=2;i=1000" --filter-type "ns=2;i=5001" --filter-clause path="/EventType" type="ns=2;i=5001"
  requiredParameters:
  - isRequired: true
    name: --asset -a
    summary: |-
      Asset name.
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --name
    summary: |-
      Event group name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --data-source --ds
    summary: |-
      Data source for the event group.
  - name: --dest --destination
    summary: |-
      Key=value pairs representing the destination for events. Allowed and required arguments are `topic`, `retain`, `qos`, and `ttl` for MQTT destinations.  Allowed values for `retain` are `Keep` and `Never` and allowed values for `qos` are `Qos0` and `Qos1`.
  - name: --fc --filter-clause
    summary: |-
      Space-separated key=value pairs for event filter clauses. Allowed keys are `path` (required), `type`, and `field`. This parameter can be specified multiple times to add multiple clauses.
  - name: --filter-type --ft
    summary: |-
      Filter type definition ID for the event group configuration.
  - name: --pi --publish-int
    summary: |-
      Publishing interval for events in milliseconds. Minimum: -1.
  - name: --qs --queue-size
    summary: |-
      Queue size for events. Minimum: 0.
  - name: --replace
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Replace the event group if another event group with the same name is already present.
  - name: --start --start-inst
    summary: |-
      Start instance for events.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_ns_asset_opcua_event-group_export

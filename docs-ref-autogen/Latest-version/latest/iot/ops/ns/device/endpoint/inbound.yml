### YamlMime:AzureCLIGroup
uid: az_iot_ops_ns_device_endpoint_inbound
name: az iot ops ns device endpoint inbound
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot-ops** extension for the Azure CLI (version 2.70.0 or higher). The extension will automatically install the first time you run an **az iot ops ns device endpoint inbound** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage inbound endpoints for devices in Device Registry namespaces.
description: |-
  Inbound endpoints define communication channels from the device to the IoT Ops platform.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_ops_ns_device_endpoint_inbound_apply
  name: az iot ops ns device endpoint inbound apply
  summary: |-
    Apply an inbound endpoint to a device using a generalized connector-type approach.
  description: |-
    The generalized apply command is schema-driven. For non-OPC UA connector types it looks up
    an existing connector template for the specified --connector-type, auto-resolves the
    endpoint version, and optionally validates --endpoint-config against the connector schema.

    Schema validation of --endpoint-config is only performed when the connector's
    additionalConfigurationSchema uses JSON Schema Draft-07
    (http://json-schema.org/draft-07/schema#). If the schema uses a different dialect,
    validation is skipped with a warning and the endpoint is still created.

    OPC UA (Microsoft.OpcUa) is a special case: it does not use Akri connector templates.
    Its schema and version are derived from bundled metadata. The instance must have OPC UA
    enabled (feature.opcua.mode != Disabled).

    Use --show-template to discover valid configuration fields before creating an endpoint.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: 'This command is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
  sourceType: Extension
  syntax: >-
    az iot ops ns device endpoint inbound apply --connector-type --ct
                                                --instance
                                                --resource-group
                                                [--acquire-policy-token]
                                                [--address --endpoint-address]
                                                [--cert-ref --certificate-ref]
                                                [--change-reference]
                                                [--device]
                                                [--ec --endpoint-config]
                                                [--icr --intermediate-cert-ref]
                                                [--key-ref]
                                                [--name]
                                                [--no-replace {false, true}]
                                                [--pass-ref --password-ref]
                                                [--scc --skip-connector-check {false, true}]
                                                [--show-template {config, schema}]
                                                [--trust-list]
                                                [--user-ref --username-ref]
                                                [--version]
  examples:
  - summary: |-
      Discover default endpoint configuration template for an OPC UA connector
    syntax: az iot ops ns device endpoint inbound apply --connector-type Microsoft.OpcUa --instance myInstance -g myInstanceResourceGroup --show-template config
  - summary: |-
      Discover full schema template (with types and constraints) for an OPC UA connector
    syntax: az iot ops ns device endpoint inbound apply --connector-type Microsoft.OpcUa --instance myInstance -g myInstanceResourceGroup --show-template schema
  - summary: |-
      Apply a generalized OPC UA inbound endpoint using a JSON config file
    syntax: az iot ops ns device endpoint inbound apply --device mydevice --name myOPCUAEndpoint --endpoint-address "opc.tcp://192.168.1.100:4840" --connector-type Microsoft.OpcUa --instance myInstance -g myInstanceResourceGroup --endpoint-config ./opcua-endpoint-config.json
  - summary: |-
      Apply a generalized OPC UA inbound endpoint using a YAML config file
    syntax: az iot ops ns device endpoint inbound apply --device mydevice --name myOPCUAEndpoint --endpoint-address "opc.tcp://192.168.1.100:4840" --connector-type Microsoft.OpcUa --instance myInstance -g myInstanceResourceGroup --endpoint-config ./opcua-endpoint-config.yaml
  - summary: |-
      Apply a generalized OPC UA inbound endpoint using inline JSON with nested objects
    syntax: az iot ops ns device endpoint inbound apply --device mydevice --name myOPCUAEndpoint --endpoint-address "opc.tcp://192.168.1.100:4840" --connector-type Microsoft.OpcUa --instance myInstance -g myInstanceResourceGroup --endpoint-config '{"applicationName":"line1-opcua-client","keepAliveMilliseconds":10000,"session":{"timeoutMilliseconds":60000,"reconnectPeriod":5000},"security":{"securityPolicy":"Basic256Sha256","securityMode":"SignAndEncrypt","autoAcceptUntrustedServerCertificates":true}}'
  - summary: |-
      Apply a generalized ONVIF inbound endpoint using a config file with authentication
    syntax: az iot ops ns device endpoint inbound apply --device mydevice --name myONVIFEndpoint --endpoint-address "http://192.168.1.100:8000/onvif/device_service" --connector-type Microsoft.Onvif --instance myInstance -g myInstanceResourceGroup --endpoint-config ./onvif-config.json --user-ref auth-secret/username --pass-ref auth-secret/password
  - summary: |-
      Apply an inbound endpoint skipping connector template check (no schema validation, no version auto-resolution)
    syntax: az iot ops ns device endpoint inbound apply --device mydevice --name myEndpoint --endpoint-address "opc.tcp://192.168.1.100:4840" --connector-type Microsoft.OpcUa --instance myInstance -g myInstanceResourceGroup --skip-connector-check
  - summary: |-
      Apply an inbound endpoint but error if it already exists (prevent overwrite)
    syntax: az iot ops ns device endpoint inbound apply --device mydevice --name myOPCUAEndpoint --endpoint-address "opc.tcp://192.168.1.100:4840" --connector-type Microsoft.OpcUa --instance myInstance -g myInstanceResourceGroup --no-replace
  requiredParameters:
  - isRequired: true
    name: --connector-type --ct
    summary: |-
      Connector type for the inbound endpoint (e.g. 'Microsoft.OpcUa', 'Microsoft.Onvif'). For all types except Microsoft.OpcUa, the matching connector template must exist in the instance unless --skip-connector-check is used.
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --address --endpoint-address
    summary: |-
      Endpoint address to connect to. Required unless --show-template is used.
  - name: --cert-ref --certificate-ref
    summary: |-
      Reference for the certificate used in authentication. Supported by 1P types: OpcUa, REST, SSE, MQTT. Not supported by Media or Onvif. For custom connector types, depends on the connector implementation.
    groupName: Authentication Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --device -d
    summary: |-
      Device name. Required unless --show-template is used.
  - name: --ec --endpoint-config
    summary: |-
      Inline JSON string or path to a JSON/YAML file (.json, .yaml, .yml) containing connector-specific endpoint configuration. The template can be discovered with --show-template. When the connector schema uses JSON Schema Draft-07, the config is validated against it; other dialects are accepted but validation is skipped. Cannot be combined with --skip-connector-check.
  - name: --icr --intermediate-cert-ref
    summary: |-
      Intermediate certificates reference for certificate authentication. Supported by 1P types: OpcUa, REST, SSE, MQTT. Not supported by Media or Onvif. For custom connector types, depends on the connector implementation.
    groupName: Authentication Arguments
  - name: --key-ref
    summary: |-
      Private key reference for certificate authentication. Supported by 1P types: OpcUa, REST, SSE, MQTT. Not supported by Media or Onvif. For custom connector types, depends on the connector implementation.
    groupName: Authentication Arguments
  - name: --name -n
    summary: |-
      Endpoint name. Required unless --show-template is used.
  - name: --no-replace
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Prevent replacing an existing endpoint with the same name. By default, apply upserts the endpoint.
  - name: --pass-ref --password-ref
    summary: |-
      Reference for the password used in authentication. Supported by all 1P connector types.
    groupName: Authentication Arguments
  - name: --scc --skip-connector-check
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Skip validation that a connector template exists for the connector type. The endpoint version will not be auto-resolved and no schema validation is performed. Cannot be combined with --endpoint-config.
  - name: --show-template
    acceptedValues: config, schema
    summary: |-
      Show a starter configuration template for the connector type and exit without creating an endpoint. config: fields shown with their default values (null if no default); output is directly usable as --endpoint-config input. oneOf fields with multiple variants collapse to the first non-null variant and emit a warning — run with schema mode to see all options. allOf fields merge all non-null sub-schemas into one flat object. schema: every field includes type, default, and constraints (min, max, enum, pattern); oneOf/allOf fields show all variants so you can inspect the full schema. Draft-07 $ref pointers (#/definitions/...) are resolved inline in both modes.
  - name: --trust-list
    summary: |-
      List of trusted certificates for the endpoint. Supported by 1P types: OpcUa, REST, SSE, MQTT. Not supported by Media or Onvif. For custom connector types, depends on the connector implementation.
  - name: --user-ref --username-ref
    summary: |-
      Reference for the username used in authentication. Supported by all 1P connector types.
    groupName: Authentication Arguments
  - name: --version
    summary: |-
      Endpoint version. If not provided, the version is automatically retrieved from the connector template matching this endpoint type (if one exists). The endpoint version is required for connector pods to be created - without it, devices will not have associated connector pods even if a connector template is deployed.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_ns_device_endpoint_inbound_list
  name: az iot ops ns device endpoint inbound list
  summary: |-
    List inbound endpoints of a device in a Device Registry namespace.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops ns device endpoint inbound list --device
                                               --instance
                                               --resource-group
                                               [--endpoint-type --et]
  examples:
  - summary: |-
      List all inbound endpoints of a device
    syntax: az iot ops ns device endpoint inbound list --device mydevice --instance myInstance -g myInstanceResourceGroup
  - summary: |-
      List all Media endpoints of a device using a keyword
    syntax: az iot ops ns device endpoint inbound list --device mydevice --instance myInstance -g myInstanceResourceGroup --endpoint-type media
  - summary: |-
      List all Media endpoints of a device using the full endpoint type
    syntax: az iot ops ns device endpoint inbound list --device mydevice --instance myInstance -g myInstanceResourceGroup --endpoint-type Microsoft.Media
  requiredParameters:
  - isRequired: true
    name: --device -d
    summary: |-
      Device name.
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --endpoint-type --et
    summary: |-
      Filter inbound endpoints by type. Both full endpoint name `Microsoft.OpcUa` and short name `opcua` are supported.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_ns_device_endpoint_inbound_remove
  name: az iot ops ns device endpoint inbound remove
  summary: |-
    Remove inbound endpoints from a device in a Device Registry namespace.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops ns device endpoint inbound remove --device
                                                 --endpoint
                                                 --instance
                                                 --resource-group
                                                 [--acquire-policy-token]
                                                 [--change-reference]
                                                 [--yes {false, true}]
  examples:
  - summary: |-
      Remove a single inbound endpoint from a device
    syntax: az iot ops ns device endpoint inbound remove --device mydevice --instance myInstance -g myInstanceResourceGroup --endpoint myEndpoint
  - summary: |-
      Remove multiple inbound endpoints from a device
    syntax: az iot ops ns device endpoint inbound remove --device mydevice --instance myInstance -g myInstanceResourceGroup --endpoint myEndpoint1 myEndpoint2
  requiredParameters:
  - isRequired: true
    name: --device -d
    summary: |-
      Device name.
  - isRequired: true
    name: --endpoint
    summary: |-
      Space-separated list of endpoint names to remove from the device.
  - isRequired: true
    name: --instance -i
    summary: |-
      The name of the Azure IoT Operations instance.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      The resource group of the Azure IoT Operations instance.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --yes -y
    defaultValue: "False"
    acceptedValues: false, true
    summary: |-
      Confirm [y]es without a prompt. Useful for CI and automation scenarios.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

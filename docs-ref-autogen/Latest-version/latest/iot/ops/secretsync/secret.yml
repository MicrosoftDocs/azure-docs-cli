### YamlMime:AzureCLIGroup
uid: az_iot_ops_secretsync_secret
name: az iot ops secretsync secret
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot-ops** extension for the Azure CLI (version 2.70.0 or higher). The extension will automatically install the first time you run an **az iot ops secretsync secret** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage individual secrets within SecretSync resources.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_ops_secretsync_secret_list
  name: az iot ops secretsync secret list
  summary: |-
    List secrets within a SecretSync resource.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops secretsync secret list --instance
                                      --resource-group
                                      --secret-sync-name
  examples:
  - summary: |-
      List secrets in a specific SecretSync resource.
    syntax: az iot ops secretsync secret list --instance myInstance -g myRG --secret-sync-name my-certs
  requiredParameters:
  - isRequired: true
    name: --instance -i -n
    summary: |-
      IoT Operations instance name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --secret-sync-name
    summary: |-
      Name of the SecretSync resource.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_secretsync_secret_remove
  name: az iot ops secretsync secret remove
  summary: |-
    Remove a specific secret from a SecretSync resource. If all secrets are removed, the SecretSync resource itself is automatically deleted.
  description: |-
    Removes the secret entry from the SecretSync's objectSecretMapping. If this is the last secret in the SecretSync, the entire SecretSync resource will be deleted since the ARM API does not allow a SecretSync with zero secret mappings.

    Before removing the secret from the shared SPC, a ref-count check is performed across all SecretSyncs in the custom location. The SPC entry is only removed if no other SecretSync still references the same AKV secret. This prevents breaking other consumers of the shared SPC.

    This command does NOT delete the secret from Azure Key Vault.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops secretsync secret remove --instance
                                        --resource-group
                                        --secret-name
                                        --secret-sync-name
                                        [--acquire-policy-token]
                                        [--change-reference]
                                        [--yes {false, true}]
  examples:
  - summary: |-
      Remove a secret from a SecretSync.
    syntax: az iot ops secretsync secret remove --instance myInstance -g myRG --secret-sync-name my-certs --secret-name my-tls-cert
  - summary: |-
      Remove a secret without confirmation prompt.
    syntax: az iot ops secretsync secret remove --instance myInstance -g myRG --secret-sync-name my-certs --secret-name my-tls-cert -y
  requiredParameters:
  - isRequired: true
    name: --instance -i -n
    summary: |-
      IoT Operations instance name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --secret-name
    summary: |-
      AKV secret name (sourcePath value) to remove from the SecretSync.
  - isRequired: true
    name: --secret-sync-name
    summary: |-
      Name of the SecretSync resource.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --yes -y
    acceptedValues: false, true
    summary: |-
      Confirm [y]es without a prompt. Useful for CI and automation scenarios.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_secretsync_secret_set
  name: az iot ops secretsync secret set
  summary: |-
    Set AKV secret mappings on a SecretSync resource.
  description: |-
    Resolves the instance's default secret provider class (SPC), verifies each AKV secret exists, adds each secret to the SPC's objects list, and creates or merges entries into the named SecretSync resource.

    If the SecretSync already exists, new secret entries are merged into it. Existing entries with the same AKV secret name will have their target key updated.

    The --secret-sync-name value becomes the K8s secret name. Consumers reference it via `<secret-sync-name>/<target-key>` for device endpoints, or just `<secret-sync-name>` for dataflow endpoints.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops secretsync secret set --instance
                                     --resource-group
                                     --secret-map
                                     --secret-sync-name
                                     [--acquire-policy-token]
                                     [--change-reference]
  examples:
  - summary: |-
      Create a SecretSync for device endpoint x509 cert auth.
    syntax: az iot ops secretsync secret set --instance myInstance -g myRG --secret-sync-name my-certs --secret-map my-tls-cert=certificate --secret-map my-tls-key=privateKey
  - summary: |-
      Add another secret to an existing SecretSync (idempotent merge).
    syntax: az iot ops secretsync secret set --instance myInstance -g myRG --secret-sync-name my-certs --secret-map my-intermediate-cert=intermediateCerts
  - summary: |-
      Create a SecretSync for SASL-based dataflow endpoint.
    syntax: az iot ops secretsync secret set --instance myInstance -g myRG --secret-sync-name eventhub-sasl --secret-map my-eh-user=username --secret-map my-eh-pass=password
  requiredParameters:
  - isRequired: true
    name: --instance -i -n
    summary: |-
      IoT Operations instance name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --secret-map
    summary: |-
      AKV secret mapping in the format `<akv-secret-name>=<target-key>`. Repeatable. The AKV secret must exist.
  - isRequired: true
    name: --secret-sync-name
    summary: |-
      Name for the SecretSync ARM resource and the resulting K8s secret.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

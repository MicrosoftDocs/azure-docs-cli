### YamlMime:AzureCLIGroup
uid: az_iot_ops_dataflowgraph
name: az iot ops dataflowgraph
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-iot-ops** extension for the Azure CLI (version 2.70.0 or higher). The extension will automatically install the first time you run an **az iot ops dataflowgraph** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  DataflowGraph management.
status: GA
sourceType: Extension
directCommands:
- uid: az_iot_ops_dataflowgraph_apply
  name: az iot ops dataflowgraph apply
  summary: |-
    Create or replace a DataflowGraph associated with a dataflow profile.
  description: |-
    An example of the config file format is as follows:

    ```
    {
      "mode": "Enabled",
      "nodes": [
        {
          "name": "source-mqtt",
          "nodeType": "Source",
          "sourceSettings": {
            "endpointRef": "default-broker",
            "dataSources": ["sensors/temperature/#"]
          }
        },
        {
          "name": "dest-broker",
          "nodeType": "Destination",
          "destinationSettings": {
            "endpointRef": "my-kafka-endpoint",
            "dataDestination": "telemetry/temperature"
          }
        },
        {
          "name": "dest-otel",
          "nodeType": "Destination",
          "destinationSettings": {
            "endpointRef": "my-otel-endpoint",
            "dataDestination": "telemetry/all"
          }
        },
        {
          "name": "graph-processor",
          "nodeType": "Graph",
          "graphSettings": {
            "registryEndpointRef": "my-registry-endpoint",
            "artifact": "my-processing-module:1.0.0",
            "configuration": [
              { "key": "paramName", "value": "paramValue" },
              { "key": "anotherParam", "value": "anotherValue" }
            ]
          }
        }
      ],
      "nodeConnections": [
        { "from": { "name": "source-mqtt" }, "to": { "name": "graph-processor" } },
        { "from": { "name": "graph-processor" }, "to": { "name": "dest-broker" } },
        { "from": { "name": "graph-processor" }, "to": { "name": "dest-otel" } }
      ]
    }
    ```

    The above example defines a graph with an MQTT source flowing through a Graph processing
    node that fans out to a Kafka destination and an OpenTelemetry destination. Graph nodes
    reference an artifact (format: `<name>:<version>`) from a registry endpoint. The
    example above includes graphSettings.configuration only to illustrate the format when
    an artifact requires configuration parameters; in that case, supply them as a list of
    {"key", "value"} string pairs. Omit graphSettings.configuration entirely when no
    configuration is needed.
    Supported nodeTypes are: Source, Destination, and Graph. Data flow graphs support only
    MQTT, Kafka, and OpenTelemetry endpoints. The file can also be the full ARM resource
    wrapper (properties is auto-extracted). extendedLocation is always auto-populated from
    --instance and -g and must not be included in the file.

    When used with apply the above content will create or replace a target DataflowGraph resource.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops dataflowgraph apply --config-file
                                   --instance
                                   --name
                                   --resource-group
                                   [--acquire-policy-token]
                                   [--change-reference]
                                   [--profile]
  examples:
  - summary: |-
      Create or replace a DataflowGraph 'mygraph' associated with a profile 'myprofile' using a config file.
    syntax: az iot ops dataflowgraph apply -n mygraph -p myprofile -i myinstance -g myresourcegroup --config-file /path/to/graph/config.json
  requiredParameters:
  - isRequired: true
    name: --config-file
    summary: |-
      Path to a JSON file containing the dataflowgraph properties.
    groupName: Config Arguments
  - isRequired: true
    name: --instance -i
    summary: |-
      IoT Operations instance name.
  - isRequired: true
    name: --name -n
    summary: |-
      DataflowGraph name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --profile -p
    defaultValue: default
    summary: |-
      Dataflow profile name. Default: 'default'.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_iot_ops_dataflowgraph_delete
  name: az iot ops dataflowgraph delete
  summary: |-
    Delete a DataflowGraph associated with a dataflow profile.
  status: GA
  sourceType: Extension
  syntax: >-
    az iot ops dataflowgraph delete --instance
                                    --name
                                    --resource-group
                                    [--acquire-policy-token]
                                    [--change-reference]
                                    [--profile]
                                    [--yes {false, true}]
  examples:
  - summary: |-
      Delete a DataflowGraph 'mygraph' associated with a profile 'myprofile'.
    syntax: az iot ops dataflowgraph delete -n mygraph -p myprofile -i mycluster-ops-instance -g myresourcegroup
  - summary: |-
      Delete a DataflowGraph 'mygraph' without a confirmation prompt.
    syntax: az iot ops dataflowgraph delete -n mygraph -p myprofile -i mycluster-ops-instance -g myresourcegroup -y
  requiredParameters:
  - isRequired: true
    name: --instance -i
    summary: |-
      IoT Operations instance name.
  - isRequired: true
    name: --name -n
    summary: |-
      DataflowGraph name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --profile -p
    defaultValue: default
    summary: |-
      Dataflow profile name. Default: 'default'.
  - name: --yes -y
    acceptedValues: false, true
    summary: |-
      Confirm [y]es without a prompt. Useful for CI and automation scenarios.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

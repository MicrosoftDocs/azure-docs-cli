### YamlMime:AzureCLIGroup
uid: az_workload-orchestration
name: az workload-orchestration
importantNote: >-
  > [!NOTE]

  > This command group has commands that are defined in two or more extensions. Each extension will automatically install the first time you run an extension command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage workload orchestration resources.
status: GA
sourceType: Extension
directCommands:
- uid: az_workload-orchestration_sync(workload-orchestration)
  name: az workload-orchestration sync
  extensionSuffix: workload-orchestration
  summary: |-
    Sync workload orchestration resources for a custom location.
  status: GA
  sourceType: Extension
  syntax: >-
    az workload-orchestration sync --custom-location
                                   [--acquire-policy-token]
                                   [--change-reference]
                                   [--local-connected-registry-ip]
  examples:
  - summary: |-
      Sync resources for a custom location
    syntax: az workload-orchestration sync --custom-location /subscriptions/00000000-0000-0000-0000-000000000000/resourceGroups/myResourceGroup/providers/Microsoft.ExtendedLocation/customLocations/myCustomLocation
  requiredParameters:
  - isRequired: true
    name: --custom-location
    summary: |-
      The resource ID of the custom location.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --local-connected-registry-ip
    summary: |-
      IP address of the local connected registry on the new cluster. Not required if staging is not enabled for any solutions. If staging is enabled and this value is not provided, syncing those solutions will fail. When provided, the value is set in the configuration and a new revision for the solutions with staging enabled is installed.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

- uid: az_storage-mover_connection_update
  name: az storage-mover connection update
  summary: |-
    Update a Connection resource.
  status: GA
  sourceType: Extension
  syntax: >-
    az storage-mover connection update [--acquire-policy-token]
                                       [--add]
                                       [--change-reference]
                                       [--connection-name --name]
                                       [--description]
                                       [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                       [--ids]
                                       [--job-list]
                                       [--pls-id --private-link-service-id]
                                       [--remove]
                                       [--resource-group]
                                       [--set]
                                       [--storage-mover-name]
                                       [--subscription]
  examples:
  - summary: |-
      connection update
    syntax: az storage-mover connection update -g {rg} --storage-mover-name {mover_name} -n {connection_name} --description ConnectionDescUpdate
  optionalParameters:

### YamlMime:AzureCLIGroup
uid: az_storage-mover_connection
name: az storage-mover connection
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **storage-mover** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az storage-mover connection** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Connection.
status: GA
sourceType: Extension
directCommands:
- uid: az_storage-mover_connection_create
  name: az storage-mover connection create
  summary: |-
    Create a Connection resource.
  status: GA
  sourceType: Extension
  syntax: >-
    az storage-mover connection create --connection-name --name
                                       --pls-id --private-link-service-id
                                       --resource-group
                                       --storage-mover-name
                                       [--acquire-policy-token]
                                       [--change-reference]
                                       [--description]
                                       [--job-list]
  examples:
  - summary: |-
      connection create
    syntax: az storage-mover connection create -g {rg} --storage-mover-name {mover_name} -n {connection_name} --private-link-service-id {pls_resource_id} --description ConnectionDesc
  requiredParameters:
  - isRequired: true
    name: --connection-name --name -n
    summary: |-
      The name of the Connection resource.
  - isRequired: true
    name: --pls-id --private-link-service-id
    summary: |-
      The PrivateLinkServiceId for the connection.
    groupName: Properties Arguments
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --storage-mover-name
    summary: |-
      The name of the Storage Mover resource.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      A description for the Connection.
    groupName: Properties Arguments
  - name: --job-list
    summary: |-
      List of job definitions associated with this connection.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_storage-mover_connection_delete
  name: az storage-mover connection delete
  summary: |-
    Delete a Connection resource.
  description: |-
    Returns 409 if there are active jobs using this connection.
  status: GA
  sourceType: Extension
  syntax: >-
    az storage-mover connection delete [--acquire-policy-token]
                                       [--change-reference]
                                       [--connection-name --name]
                                       [--ids]
                                       [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                       [--resource-group]
                                       [--storage-mover-name]
                                       [--subscription]
                                       [--yes]
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --connection-name --name -n
    summary: |-
      The name of the Connection resource.
    groupName: Resource Id Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --storage-mover-name
    summary: |-
      The name of the Storage Mover resource.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

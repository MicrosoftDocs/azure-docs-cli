  syntax: >-
    az appconfig network-security-perimeter-configuration list --store-name
                                                               [--resource-group]
  examples:
  - summary: |-
      List all network security perimeter configurations for an App Configuration store.
    syntax: az appconfig network-security-perimeter-configuration list --store-name MyAppConfiguration -g MyResourceGroup
  requiredParameters:
  - isRequired: true
    name: --store-name -s
    summary: |-
      Name of the App Configuration store. You can configure the default name using `az configure --defaults app_configuration_store=<name>`.
  optionalParameters:
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

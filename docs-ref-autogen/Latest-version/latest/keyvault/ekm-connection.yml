uid: az_keyvault_ekm-connection
name: az keyvault ekm-connection
summary: |-
  Manage External Key Manager (EKM) connection for a Managed HSM.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Core
directCommands:
- uid: az_keyvault_ekm-connection_check
  name: az keyvault ekm-connection check
  summary: |-
    Check connectivity and authentication with the EKM proxy.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'keyvault ekm-connection' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/keyvault/_help.py
  syntax: >-
    az keyvault ekm-connection check [--acquire-policy-token]
                                     [--change-reference]
                                     [--hsm-name]
                                     [--id]
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --hsm-name
    summary: |-
      Name of the HSM. Can be omitted if --id is specified.
    groupName: HSM Id Arguments
  - name: --id
    summary: |-
      Full URI of the HSM.
    groupName: HSM Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_keyvault_ekm-connection_create
  name: az keyvault ekm-connection create
  summary: |-
    Create the EKM connection.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'keyvault ekm-connection' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/keyvault/_help.py
  syntax: >-
    az keyvault ekm-connection create --host
                                      --server-ca-certificate
                                      [--acquire-policy-token]
                                      [--change-reference]
                                      [--hsm-name]
                                      [--id]
                                      [--path-prefix]
                                      [--server-cn --server-subject-common-name]
  requiredParameters:
  - isRequired: true
    name: --host
    summary: |-
      EKM proxy host (FQDN or FQDN:port). If port is omitted, 443 is assumed.
    groupName: EKM Connection Arguments
  - isRequired: true
    name: --server-ca-certificate
    summary: |-
      Path(s) to server CA certificate(s) in PEM or DER format. Pass a single file containing a PEM chain (multiple certificate blocks), or multiple space-separated file paths (each PEM or DER).
    groupName: EKM Connection Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --hsm-name
    summary: |-
      Name of the HSM. Can be omitted if --id is specified.
    groupName: HSM Id Arguments
  - name: --id
    summary: |-
      Full URI of the HSM.
    groupName: HSM Id Arguments
  - name: --path-prefix
    summary: |-
      Optional path prefix to append to EKM proxy requests. Must start with "/".
    groupName: EKM Connection Arguments
  - name: --server-cn --server-subject-common-name
    summary: |-
      Optional expected Common Name (CN) for the EKM proxy server certificate.
    groupName: EKM Connection Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_postgres_flexible-server_maintenance-event
name: az postgres flexible-server maintenance-event
summary: |-
  Manage maintenance events for PostgreSQL flexible servers.
status: GA
sourceType: Core
directCommands:
- uid: az_postgres_flexible-server_maintenance-event_apply-now
  name: az postgres flexible-server maintenance-event apply-now
  summary: |-
    Apply a maintenance event immediately.
  status: GA
  sourceType: Core
  syntax: >-
    az postgres flexible-server maintenance-event apply-now [--acquire-policy-token]
                                                            [--change-reference]
                                                            [--ids]
                                                            [--maintenance-event-id]
                                                            [--no-wait]
                                                            [--resource-group]
                                                            [--server-name]
                                                            [--subscription]
  examples:
  - summary: |-
      Apply a maintenance event now.
    syntax: az postgres flexible-server maintenance-event apply-now --resource-group testgroup --server-name testserver --maintenance-event-id XXXX-111
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --maintenance-event-id
    summary: |-
      The maintenance event identifier.
    groupName: Resource Id Arguments
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --server-name -s
    summary: |-
      Name of the server.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_postgres_flexible-server_maintenance-event_list
  name: az postgres flexible-server maintenance-event list
  summary: |-
    List maintenance events for a flexible server.
  status: GA
  sourceType: Core
  syntax: >-
    az postgres flexible-server maintenance-event list [--ids]
                                                       [--maintenance-status {Past, Upcoming}]
                                                       [--resource-group]
                                                       [--server-name]
                                                       [--subscription]
  examples:
  - summary: |-
      List all maintenance events for a server.
    syntax: az postgres flexible-server maintenance-event list --resource-group testgroup --server-name testserver
  - summary: |-
      List only upcoming maintenance events.
    syntax: az postgres flexible-server maintenance-event list --resource-group testgroup --server-name testserver --maintenance-status Upcoming
  optionalParameters:
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --maintenance-status
    acceptedValues: Past, Upcoming
    summary: |-
      Filter maintenance events by status.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --server-name -s
    summary: |-
      Name of the server.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_postgres_flexible-server_maintenance-event_reschedule
  name: az postgres flexible-server maintenance-event reschedule
  summary: |-
    Reschedule a maintenance event to a new UTC datetime.
  status: GA
  sourceType: Core
  syntax: >-
    az postgres flexible-server maintenance-event reschedule --start-time
                                                             [--acquire-policy-token]
                                                             [--change-reference]
                                                             [--ids]
                                                             [--maintenance-event-id]
                                                             [--no-wait]
                                                             [--resource-group]
                                                             [--server-name]
                                                             [--subscription]
  examples:
  - summary: |-
      Reschedule a maintenance event.
    syntax: az postgres flexible-server maintenance-event reschedule --resource-group testgroup --server-name testserver --maintenance-event-id XXXX-111 --start-time 2026-04-10T10:00:00+00:00
  requiredParameters:
  - isRequired: true
    name: --start-time -t
    summary: |-
      New UTC start time to target rescheduling maintenance (ISO8601 format), e.g., 2026-04-10T10:00:00+00:00.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --maintenance-event-id
    summary: |-
      The maintenance event identifier.
    groupName: Resource Id Arguments
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --server-name -s
    summary: |-
      Name of the server.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

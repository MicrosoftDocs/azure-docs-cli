### YamlMime:AzureCLIGroup
uid: az_fileshare_private-endpoint-connection
name: az fileshare private-endpoint-connection
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **fileshares** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az fileshare private-endpoint-connection** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage private endpoint connections for file shares.
status: GA
sourceType: Extension
directCommands:
- uid: az_fileshare_private-endpoint-connection_approve
  name: az fileshare private-endpoint-connection approve
  summary: |-
    Approve a private endpoint connection for a file share.
  status: GA
  sourceType: Extension
  syntax: >-
    az fileshare private-endpoint-connection approve --name --private-endpoint-connection-name
                                                     --resource-group
                                                     --resource-name
                                                     [--acquire-policy-token]
                                                     [--change-reference]
                                                     [--description]
                                                     [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
  examples:
  - summary: |-
      Approve a private endpoint connection
    syntax: az fileshare private-endpoint-connection approve --name MyConnection --resource-group MyRG --resource-name MyFileShare --description "Approved by admin"
  requiredParameters:
  - isRequired: true
    name: --name --private-endpoint-connection-name -n
    summary: |-
      The name of the private endpoint connection associated with the Azure resource.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --resource-name
    summary: |-
      The resource name of the file share, as seen by the administrator through Azure Resource Manager.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      Comments for the approval.
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

- uid: az_aks_maintenancewindow_update
  name: az aks maintenancewindow update
  summary: |-
    Update a MaintenanceWindow.
  description: |-
    Read-modify-write semantics matching `az aks update` and
    `az aks nodepool update`: the existing MW is fetched, your supplied
    fields are merged onto it, and the resulting body is PUT back.
    Fields you do not supply are preserved as-is (existing tags,
    existing schedule scalars, existing blackout dates, etc.).

    When you do supply a schedule arg (--schedule-type / --interval-* /
    --day-of-week / --day-of-month / --week-index), the schedule shape
    is re-built end-to-end from your args (you cannot partially mix
    Daily + Weekly fields — pick one schedule type and supply its
    required args).

    --tags follows `aks update` convention: passing --tags replaces the
    whole tags dictionary; omit --tags to keep the existing tags.

    --location cannot be changed (TrackedResource semantics — ARM
    rejects location changes on PUT). If supplied with a different
    value than the existing location it is ignored with a warning.

    --config-file: when supplied, the JSON file's `properties` block
    replaces the existing `properties` wholesale. This is the only
    way today to mutate notAllowedDates / blackout date ranges.
    Individual schedule flags are ignored on this path; tags follow
    the same `--tags` rule as without --config-file.
  status: GA
  sourceType: Extension
  syntax: >-
    az aks maintenancewindow update --name
                                    --resource-group
                                    [--acquire-policy-token]
                                    [--change-reference]
                                    [--config-file]
                                    [--day-of-month]
                                    [--day-of-week]
                                    [--duration]
                                    [--interval-days]
                                    [--interval-months]
                                    [--interval-weeks]
                                    [--location]
                                    [--no-wait]
                                    [--schedule-type {AbsoluteMonthly, Daily, RelativeMonthly, Weekly}]
                                    [--start-date]
                                    [--start-time]
                                    [--tags]
                                    [--utc-offset]
                                    [--week-index {First, Fourth, Last, Second, Third}]
  examples:
  - summary: |-
      Update only tags (existing schedule is preserved).
    syntax: az aks maintenancewindow update -g rg-maintenance -n production-weekends --tags environment=staging
  - summary: |-
      Update only the schedule's day-of-week (existing duration / start-time / tags preserved).
    syntax: >-
      az aks maintenancewindow update -g rg-maintenance -n production-weekends \
        --schedule-type Weekly --day-of-week Sunday --interval-weeks 1
  - summary: |-
      Change duration only (existing schedule shape preserved).
    syntax: az aks maintenancewindow update -g rg-maintenance -n production-weekends --duration 6
  - summary: |-
      Replace blackout dates via a config file (preserves tags, location).
    syntax: >-
      az aks maintenancewindow update -g rg-maintenance -n production-weekends --config-file ./mw-body.json
        The contents of mw-body.json should include a complete properties block, e.g.:
        {
          "properties": {
            "schedule": { "weekly": { "intervalWeeks": 1, "dayOfWeek": "Saturday" } },
            "startTime": "02:00",
            "durationHours": 8,
            "utcOffset": "-07:00",
            "notAllowedDates": [ { "start": "2026-12-23", "end": "2027-01-05" } ]
          }
        }
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      The maintenance window name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --config-file
    summary: |-
      Path to a JSON file describing the MaintenanceWindow body. When supplied, the JSON wholly defines the resource on create, or replaces the existing `properties` block on update. This is the only path that can set fields without dedicated flags (notAllowedDates, etc.).
  - name: --day-of-month
    summary: |-
      Day of month the maintenance occurs for AbsoluteMonthly schedule.
  - name: --day-of-week
    summary: |-
      Day of week the maintenance occurs for Weekly or RelativeMonthly schedule.
  - name: --duration
    summary: |-
      The length of the maintenance window in hours. Range 4-24.
  - name: --interval-days
    summary: |-
      The number of days between each set of occurrences for Daily schedule.
  - name: --interval-months
    summary: |-
      The number of months between each set of occurrences for AbsoluteMonthly or RelativeMonthly schedule.
  - name: --interval-weeks
    summary: |-
      The number of weeks between each set of occurrences for Weekly schedule.
  - name: --location -l
    summary: |-
      Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --schedule-type
    acceptedValues: AbsoluteMonthly, Daily, RelativeMonthly, Weekly
    summary: |-
      Recurrence type: Daily, Weekly, AbsoluteMonthly or RelativeMonthly.
  - name: --start-date
    summary: |-
      The date the maintenance window activates. e.g. 2026-06-01.
  - name: --start-time
    summary: |-
      The start time of the maintenance window. e.g. 09:30.
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  - name: --utc-offset
    summary: |-
      The UTC offset in format +/-HH:mm. e.g. -08:00 or +05:30.
  - name: --week-index
    acceptedValues: First, Fourth, Last, Second, Third
    summary: |-
      Instance of the weekday specified in --day-of-week the maintenance occurs for RelativeMonthly schedule.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_aks_maintenancewindow_wait
  name: az aks maintenancewindow wait
  summary: |-
    Wait for a MaintenanceWindow to reach a desired state.
  description: |-
    If an operation on a MaintenanceWindow was interrupted or was started
    with `--no-wait`, use this command to wait for it to complete.
  status: GA
  sourceType: Extension
  syntax: >-
    az aks maintenancewindow wait --name
                                  --resource-group
                                  [--acquire-policy-token]
                                  [--change-reference]
                                  [--created]
                                  [--custom]
                                  [--deleted]
                                  [--exists]
                                  [--interval]
                                  [--timeout]
                                  [--updated]
  examples:
  - summary: |-
      Wait for a MaintenanceWindow to be created.
    syntax: az aks maintenancewindow wait -g rg-maintenance -n production-weekends --created
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      The maintenance window name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --created
    defaultValue: "False"
    summary: |-
      Wait until created with 'provisioningState' at 'Succeeded'.
    groupName: Wait Condition Arguments
  - name: --custom
    summary: |-
      Wait until the condition satisfies a custom JMESPath query. E.g. provisioningState!='InProgress', instanceView.statuses[?code=='PowerState/running'].
    groupName: Wait Condition Arguments
  - name: --deleted
    defaultValue: "False"
    summary: |-
      Wait until deleted.
    groupName: Wait Condition Arguments
  - name: --exists
    defaultValue: "False"
    summary: |-
      Wait until the resource exists.
    groupName: Wait Condition Arguments
  - name: --interval
    defaultValue: "30"
    summary: |-
      Polling interval in seconds.
    groupName: Wait Condition Arguments
  - name: --timeout
    defaultValue: "3600"
    summary: |-
      Maximum wait in seconds.
    groupName: Wait Condition Arguments
  - name: --updated
    defaultValue: "False"
    summary: |-
      Wait until updated with provisioningState at 'Succeeded'.
    groupName: Wait Condition Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

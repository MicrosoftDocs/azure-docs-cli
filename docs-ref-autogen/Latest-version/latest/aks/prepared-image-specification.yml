### YamlMime:AzureCLIGroup
uid: az_aks_prepared-image-specification
name: az aks prepared-image-specification
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **aks-preview** extension for the Azure CLI (version 2.76.0 or higher). The extension will automatically install the first time you run an **az aks prepared-image-specification** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Commands to manage prepared image specifications.
status: GA
sourceType: Extension
directCommands:
- uid: az_aks_prepared-image-specification_create
  name: az aks prepared-image-specification create
  summary: |-
    Create a new prepared image specification.
  status: GA
  sourceType: Extension
  syntax: >-
    az aks prepared-image-specification create --name
                                               --resource-group
                                               --version
                                               [--acquire-policy-token]
                                               [--assign-identity]
                                               [--change-reference]
                                               [--container-images]
                                               [--customization-scripts]
                                               [--location]
                                               [--no-wait]
                                               [--tags]
  examples:
  - summary: |-
      Create a new prepared image specification specifying a container image.
    syntax: az aks prepared-image-specification create -g MyResourceGroup -n MyPIS --version MyVersion --container-images myacr.azurecr.io/myimage:latest
  - summary: |-
      Create a new prepared image specification specifying a customization script.
    syntax: az aks prepared-image-specification create -g MyResourceGroup -n MyPIS --version MyVersion --customization-scripts '[{"name":"myscript","script":"/bin/true","scriptType":"Bash","executionPoint":"NodeImageBuildTime"}]'
  - summary: |-
      Create a new prepared image specification specifying a managed identity.
    syntax: az aks prepared-image-specification create -g MyResourceGroup -n MyPIS --version MyVersion --assign-identity /subscriptions/MySubscription/resourceGroups/AnotherResourceGroup/providers/Microsoft.ManagedIdentity/userAssignedIdentities/MyIdentity
  - summary: |-
      Create a new prepared image specification specifying tags.
    syntax: az aks prepared-image-specification create -g MyResourceGroup -n MyPIS --version MyVersion --tags k1=v1 k2=v2
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      The prepared image specification name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --version
    summary: |-
      The prepared image specification version.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --assign-identity
    summary: |-
      Specify an existing user assigned identity.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --container-images
    summary: |-
      Container images.
  - name: --customization-scripts
    summary: |-
      Customization scripts. Expected value: json-string/@json-file.
  - name: --location -l
    summary: |-
      Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --tags
    summary: |-
      Space-separated tags: key[=value] [key[=value] ...]. Use "" to clear existing tags.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_aks_approuting_defaultdomain
name: az aks approuting defaultdomain
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **aks-preview** extension for the Azure CLI (version 2.76.0 or higher). The extension will automatically install the first time you run an **az aks approuting defaultdomain** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Commands to manage App Routing Default Domain.
description: |-
  A group of commands to manage App Routing Default Domain in given cluster.
status: GA
sourceType: Extension
directCommands:
- uid: az_aks_approuting_defaultdomain_show
  name: az aks approuting defaultdomain show
  summary: |-
    Show the Default Domain configuration for App Routing.
  description: |-
    This command shows the Default Domain configuration including the domain name assigned to the cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az aks approuting defaultdomain show --name
                                         --resource-group
  examples:
  - summary: |-
      Show the default domain for a cluster.
    syntax: az aks approuting defaultdomain show --resource-group MyResourceGroup --name MyManagedCluster
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the managed cluster.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_aks_approuting_defaultdomain_show
metadata:
  description: A group of commands to manage App Routing Default Domain in given cluster.

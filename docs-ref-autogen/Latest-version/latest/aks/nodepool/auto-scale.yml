directCommands:
- uid: az_aks_nodepool_auto-scale_add
  name: az aks nodepool auto-scale add
  summary: |-
    Add a new autoscale profile to a VirtualMachines agentpool in the managed Kubernetes cluster.
  status: GA
  sourceType: Extension
  syntax: >-
    az aks nodepool auto-scale add --cluster-name
                                   --max-count
                                   --min-count
                                   --name --nodepool-name
                                   --node-vm-size
                                   --resource-group
                                   [--acquire-policy-token]
                                   [--change-reference]
                                   [--no-wait]
  examples:
  - summary: |-
      Add an autoscale profile to a VirtualMachines agentpool
    syntax: az aks nodepool auto-scale add -g MyResourceGroup --cluster-name MyMC --name MyNodePool --node-vm-size Standard_D2s_v3 --min-count 3 --max-count 5
  requiredParameters:
  - isRequired: true
    name: --cluster-name
    summary: |-
      The cluster name.
  - isRequired: true
    name: --max-count
    summary: |-
      Maximum number of nodes for autoscaling.
    isPreview: true
  - isRequired: true
    name: --min-count
    summary: |-
      Minimum number of nodes for autoscaling.
    isPreview: true
  - isRequired: true
    name: --name --nodepool-name -n
    summary: |-
      The node pool name.
  - isRequired: true
    name: --node-vm-size
    summary: |-
      VM size for the autoscale profile.
    isPreview: true
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_aks_prepared-image-specification_version
name: az aks prepared-image-specification version
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **aks-preview** extension for the Azure CLI (version 2.85.0 or higher). The extension will automatically install the first time you run an **az aks prepared-image-specification version** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Commands to manage prepared image specification versions.
status: GA
sourceType: Extension
directCommands:
- uid: az_aks_prepared-image-specification_version_delete
  name: az aks prepared-image-specification version delete
  summary: |-
    Delete a prepared image specification version.
  status: GA
  sourceType: Extension
  syntax: >-
    az aks prepared-image-specification version delete --name
                                                       --pis-name
                                                       --resource-group
                                                       [--acquire-policy-token]
                                                       [--change-reference]
                                                       [--no-wait]
                                                       [--yes]
  requiredParameters:
  - isRequired: true
    name: --name -n
    summary: |-
      The version name.
  - isRequired: true
    name: --pis-name
    summary: |-
      The prepared image specification name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --no-wait
    defaultValue: "False"
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

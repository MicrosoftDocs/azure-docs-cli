### YamlMime:AzureCLIGroup
uid: az_fileshare
name: az fileshare
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **fileshares** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az fileshare** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Azure File Shares.
status: GA
sourceType: Extension
directCommands:
- uid: az_fileshare_check-name-availability
  name: az fileshare check-name-availability
  summary: |-
    Implements local CheckNameAvailability operations.
  status: GA
  sourceType: Extension
  syntax: >-
    az fileshare check-name-availability --name
                                         [--acquire-policy-token]
                                         [--change-reference]
                                         [--ids]
                                         [--location]
                                         [--subscription]
  examples:
  - summary: |-
      Check name availability for a file share
    syntax: az fileshare check-name-availability --location westus --name myfileshare
  requiredParameters:
  - isRequired: true
    name: --name
    summary: |-
      The name of the resource for which availability needs to be checked.
    groupName: Body Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --location -l
    summary: |-
      Location. Values from: `az account list-locations`. You can configure the default location using `az configure --defaults location=<location>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_fileshare_create
  name: az fileshare create
  summary: |-
    Create a file share.
  status: GA
  sourceType: Extension
  syntax: >-
    az fileshare create --name --resource-name
                        --resource-group
                        [--acquire-policy-token]
                        [--allowed-subnets]
                        [--change-reference]
                        [--location]
                        [--media-tier {SSD}]
                        [--mount-name]
                        [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                        [--protocol {NFS}]
                        [--provisioned-io-per-sec --provisioned-iops]
                        [--provisioned-storage-GiB --provisioned-storage-gi-b --storage-gib]
                        [--provisioned-throughput-MiB --provisioned-throughput-mi-b-per-sec --throughput-mibps]
                        [--public-network-access {Disabled, Enabled}]
                        [--redundancy {Local, Zone}]
                        [--root-squash {AllSquash, NoRootSquash, RootSquash}]
                        [--tags]
  examples:
  - summary: |-
      Create a file share with NFS protocol
    syntax: az fileshare create --name MyFileShare --resource-group MyRG --location eastus --provisioned-storage-GiB 1024 --provisioned-iops 3000 --provisioned-throughput-MiB 125 --protocol NFS --redundancy Local
  requiredParameters:
  - isRequired: true
    name: --name --resource-name -n
    summary: |-
      The resource name of the file share, as seen by the administrator through Azure Resource Manager.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --allowed-subnets
    summary: |-
      Space-separated list of subnet resource IDs that are allowed access.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --location -l
    summary: |-
      The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    groupName: Resource Arguments
  - name: --media-tier
    acceptedValues: SSD
    summary: |-
      The storage media tier of the file share.
    groupName: Properties Arguments
  - name: --mount-name
    summary: |-
      The name of the file share as seen by the end user when mounting the share, such as in a URI or UNC format in their operating system.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --protocol
    acceptedValues: NFS
    summary: |-
      The file sharing protocol for this file share.
    groupName: Properties Arguments
  - name: --provisioned-io-per-sec --provisioned-iops
    summary: |-
      The provisioned IO / sec of the share.
    groupName: Properties Arguments
  - name: --provisioned-storage-GiB --provisioned-storage-gi-b --storage-gib
    summary: |-
      The provisioned storage size of the share in GiB (1 GiB is 1024^3 bytes or 1073741824 bytes). A component of the file share's bill is the provisioned storage, regardless of the amount of used storage.
    groupName: Properties Arguments
  - name: --provisioned-throughput-MiB --provisioned-throughput-mi-b-per-sec --throughput-mibps
    summary: |-
      The provisioned throughput / sec of the share.
    groupName: Properties Arguments
  - name: --public-network-access
    acceptedValues: Disabled, Enabled
    summary: |-
      Gets or sets allow or disallow public network access to azure managed file share.
    groupName: Properties Arguments
  - name: --redundancy
    acceptedValues: Local, Zone
    summary: |-
      The chosen redundancy level of the file share.
    groupName: Properties Arguments
  - name: --root-squash
    acceptedValues: AllSquash, NoRootSquash, RootSquash
    summary: |-
      Root squash defines how root users on clients are mapped to the NFS share.
    groupName: Properties Arguments
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

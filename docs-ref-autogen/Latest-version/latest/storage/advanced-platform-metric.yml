### YamlMime:AzureCLIGroup
uid: az_storage_advanced-platform-metric
name: az storage advanced-platform-metric
summary: |-
  Manage Advanced Platform Metric.
status: GA
sourceType: Core
directCommands:
- uid: az_storage_advanced-platform-metric_create
  name: az storage advanced-platform-metric create
  summary: |-
    Create the advanced platform metrics rule for the storage account.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: 'This command is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/storage/_help.py
  syntax: >-
    az storage advanced-platform-metric create --account-name
                                               --resource-group
                                               [--acquire-policy-token]
                                               [--advanced-platform-metrics-rule-type --name {ContainerLevelCapacityMetrics}]
                                               [--change-reference]
                                               [--enabled {0, 1, f, false, n, no, t, true, y, yes}]
                                               [--filter-type --rule-config-filter-type {AllContainersFilter, ContainerListFilter, ContainerPrefixFilter}]
                                               [--filter-values --rule-config-filter-values]
  examples:
  - summary: |-
      Create AllContainersFilter AdvancedPlatformMetric
    syntax: az storage advanced-platform-metric create -g resource_group_name --account-name storage_account_name --enabled --rule-config-filter-type AllContainersFilter
  - summary: |-
      Create ContainerPrefixFilter AdvancedPlatformMetric
    syntax: az storage advanced-platform-metric create -g resource_group_name --account-name storage_account_name --enabled --rule-config-filter-type ContainerPrefixFilter --rule-config-filter-values logsprefix dataprefix
  - summary: |-
      Create ContainerListFilter AdvancedPlatformMetric
    syntax: az storage advanced-platform-metric create -g resource_group_name --account-name storage_account_name --enabled --rule-config-filter-type ContainerListFilter --rule-config-filter-values logs data
  requiredParameters:
  - isRequired: true
    name: --account-name
    summary: |-
      The name of the storage account within the specified resource group. Storage account names must be between 3 and 24 characters in length and use numbers and lower-case letters only.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --advanced-platform-metrics-rule-type --name -n
    defaultValue: ContainerLevelCapacityMetrics
    acceptedValues: ContainerLevelCapacityMetrics
    summary: |-
      The type of the advanced platform metrics rule.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --enabled
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      A boolean flag which enables the advanced platform metrics rule.
    groupName: Properties Arguments
  - name: --filter-type --rule-config-filter-type
    acceptedValues: AllContainersFilter, ContainerListFilter, ContainerPrefixFilter
    summary: |-
      The type of filter applied to the rule. Possible values include: AllContainersFilter, ContainerPrefixFilter, ContainerListFilter.
    groupName: RuleConfig Arguments
  - name: --filter-values --rule-config-filter-values
    summary: |-
      The values for the filter applied to the rule. If filter type is AllContainersFilter, filter values should be empty. If filter type is ContainerPrefixFilter, filter values should contain a list of container prefixes. If filter type is ContainerListFilter, filter values should contain a list of container names.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: RuleConfig Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

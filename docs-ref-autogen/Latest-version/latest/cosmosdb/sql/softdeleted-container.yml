### YamlMime:AzureCLIGroup
uid: az_cosmosdb_sql_softdeleted-container
name: az cosmosdb sql softdeleted-container
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **cosmosdb-preview** extension for the Azure CLI (version 2.17.1 or higher). The extension will automatically install the first time you run an **az cosmosdb sql softdeleted-container** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage soft-deleted containers for Azure Cosmos DB SQL API.
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Extension
directCommands:
- uid: az_cosmosdb_sql_softdeleted-container_delete
  name: az cosmosdb sql softdeleted-container delete
  summary: |-
    Permanently delete a soft-deleted container.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'cosmosdb sql softdeleted-container' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az cosmosdb sql softdeleted-container delete --database-name
                                                 --location
                                                 --name
                                                 --resource-group
                                                 [--account-name]
                                                 [--acquire-policy-token]
                                                 [--change-reference]
                                                 [--ids]
                                                 [--subscription]
                                                 [--yes]
  examples:
  - summary: |-
      Permanently delete a soft-deleted container.
    syntax: az cosmosdb sql softdeleted-container delete --location westus --account-name MyAccount --database-name MyDatabase --name MyContainer --resource-group MyResourceGroup
  requiredParameters:
  - isRequired: true
    name: --database-name -d
    summary: |-
      Name of the database.
  - isRequired: true
    name: --location -l
    summary: |-
      Location of the account.
  - isRequired: true
    name: --name -n
    summary: |-
      Name of the soft-deleted container to purge.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of the resource group.
  optionalParameters:
  - name: --account-name -a
    summary: |-
      Name of the Cosmos DB account.
    groupName: Resource Id Arguments
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_maintenance_scheduledevents_list
name: az maintenance scheduledevents list
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **maintenance** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az maintenance scheduledevents list** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage list of scheduled Events.
status: GA
sourceType: Extension
directCommands:
- uid: az_maintenance_scheduledevents_list_acknowledge
  name: az maintenance scheduledevents list acknowledge
  summary: |-
    Post List of Scheduled Events Acknowledgement.
  status: GA
  sourceType: Extension
  syntax: >-
    az maintenance scheduledevents list acknowledge --value
                                                    [--acquire-policy-token]
                                                    [--change-reference]
                                                    [--ids]
                                                    [--resource-group]
                                                    [--resource-name]
                                                    [--resource-type]
                                                    [--subscription]
  examples:
  - summary: |-
      Acknowledge list of Scheduled Events on VirtualMachineScaleSets
    syntax: >-
      az maintenance scheduledevents list acknowledge --resource-group {resourceGroupName} --resource-type "virtualMachineScaleSets" --resource-name {VMSSName} --subscription {subscriptionId} --value []

      az maintenance scheduledevents list acknowledge --ids /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/microsoft.compute/virtualMachineScaleSets/{VMSSName}/providers/microsoft.maintenance/scheduledevents --body "{value:[]}"
  - summary: |-
      Acknowledge list of ScheduledEvents on AvailabilitySets
    syntax: >-
      az maintenance scheduledevents list acknowledge --resource-group {resourceGroupName} --resource-type "availabilitySets" --resource-name {AvSetname} --value []

      az maintenance scheduledevents list acknowledge --ids /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/microsoft.compute/availabilitySets/{AvSetName}/providers/microsoft.maintenance/scheduledevents --body "{value:[]}"
  - summary: |-
      Acknowledge a single Scheduled Events on VirtualMachine
    syntax: >-
      az maintenance scheduledevents list acknowledge --resource-group {resourceGroupName} --resource-type "virtualMachines" --resource-name {VMname} --value []

      az maintenance scheduledevents list acknowledge --ids /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/microsoft.compute/virtualMachines/{virtualMachineName}/providers/microsoft.maintenance/scheduledevents --body "{value:[]}"
  requiredParameters:
  - isRequired: true
    name: --value
    summary: |-
      The list of Scheduled Events Id.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: ScheduledEventsIdList Arguments
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --resource-name
    summary: |-
      Resource name.
    groupName: Resource Id Arguments
  - name: --resource-type
    summary: |-
      Resource type.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_maintenance_scheduledevents_list_acknowledge
metadata:
  description: Manage list of scheduled Events.

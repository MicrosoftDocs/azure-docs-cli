### YamlMime:AzureCLIGroup
uid: az_maintenance_scheduledevents
name: az maintenance scheduledevents
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **maintenance** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az maintenance scheduledevents** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Scheduled Events.
status: GA
sourceType: Extension
directCommands:
- uid: az_maintenance_scheduledevents_acknowledge
  name: az maintenance scheduledevents acknowledge
  summary: |-
    Acknowledge a single Scheduled Events.
  status: GA
  sourceType: Extension
  syntax: >-
    az maintenance scheduledevents acknowledge [--acquire-policy-token]
                                               [--change-reference]
                                               [--ids]
                                               [--resource-group]
                                               [--resource-name]
                                               [--resource-type]
                                               [--scheduled-events-id]
                                               [--subscription]
  examples:
  - summary: |-
      Acknowledge a single Scheduled Events on a VirtualMachine
    syntax: >-
      az maintenance scheduledevents acknowledge --resource-group {resourceGroupName} --resource-type "virtualMachines" --resource-name {VMname} --scheduled-events-id {scheduledEventsId} --subscription {subscriptionId}

      az maintenance scheduledevents acknowledge --ids /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/microsoft.compute/virtualMachines/{resourceName}/providers/microsoft.maintenance/scheduledevents/{scheduledEventsId}
  - summary: |-
      Acknowledge a single Scheduled Events on a VirtualMachineScaleSets
    syntax: >-
      az maintenance scheduledevents acknowledge --resource-group {resourceGroup} --resource-type "virtualMachineScaleSets" --resource-name {VMSSname} --scheduled-events-id {scheduledEventsId} --subscription {subscriptionId}

      az maintenance scheduledevents acknowledge --ids /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/microsoft.compute/virtualMachineScaleSets/{resourceName}/providers/microsoft.maintenance/scheduledevents/{scheduledEventsId}
  - summary: |-
      Acknowledge a single Scheduled Events on a AvailabilitySet
    syntax: >-
      az maintenance scheduledevents acknowledge--resource-group {resourceGroupName} --resource-type "availabilitySets"--resource-name {AVSetname} --scheduled-events-id {scheduledEventsId} --subscription {subscriptionId}

      az maintenance scheduledevents acknowledge --ids /subscriptions/{subscriptionId}/resourcegroups/{resourceGroupName}/providers/microsoft.compute/AvalabilitySets/{resourceName}/providers/microsoft.maintenance/scheduledevents/{scheduledEventsId}
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --resource-name
    summary: |-
      Resource Name.
    groupName: Resource Id Arguments
  - name: --resource-type
    summary: |-
      Resource type.
    groupName: Resource Id Arguments
  - name: --scheduled-events-id
    summary: |-
      Scheduled Events Id. This is a GUID-formatted string (e.g. 00000000-0000-0000-0000-000000000000).
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_maintenance_scheduledevents_acknowledge
- az_maintenance_scheduledevents_list
- az_maintenance_scheduledevents_list_acknowledge
metadata:
  description: Manage Scheduled Events.

### YamlMime:AzureCLIGroup
uid: az_amlfs_expansion
name: az amlfs expansion
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **amlfs** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az amlfs expansion** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Expansion.
status: GA
sourceType: Extension
directCommands:
- uid: az_amlfs_expansion_create
  name: az amlfs expansion create
  summary: |-
    Increase filesystem storage capacity.
  status: GA
  sourceType: Extension
  syntax: >-
    az amlfs expansion create --aml-filesystem-name
                              --expansion-job-name --name
                              --resource-group
                              [--acquire-policy-token]
                              [--change-reference]
                              [--location]
                              [--new-storage-capacity --size]
                              [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                              [--tags]
  examples:
  - summary: |-
      expansionJobs_CreateOrUpdate
    syntax: az amlfs expansion create --resource-group scgroup --aml-filesystem-name fs1 --expansion-job-name expansionjob1 --tags "{Dept:ContosoAds}" --location eastus --new-storage-capacity 16.0
  requiredParameters:
  - isRequired: true
    name: --aml-filesystem-name
    summary: |-
      Name for the AML file system. Allows alphanumerics, underscores, and hyphens. Start and end with alphanumeric.
  - isRequired: true
    name: --expansion-job-name --name -n
    summary: |-
      Name for the expansion job. Allows alphanumerics, underscores, and hyphens. Start and end with alphanumeric.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --location -l
    summary: |-
      The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    groupName: ExpansionJob Arguments
  - name: --new-storage-capacity --size
    summary: |-
      The new storage capacity in TiB for the AML file system after expansion. This must be a multiple of the Sku step size, and greater than the current storage capacity of the AML file system.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: ExpansionJob Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

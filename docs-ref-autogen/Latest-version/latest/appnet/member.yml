### YamlMime:AzureCLIGroup
uid: az_appnet_member
name: az appnet member
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **appnet-preview** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az appnet member** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Commands to manage members in an Azure Kubernetes Application Network.
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'az appnet' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Extension
directCommands:
- uid: az_appnet_member_join
  name: az appnet member join
  summary: |-
    Join a kubernetes cluster to an Application Network.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'az appnet' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az appnet member join [--appnet-name]
                          [--cluster-type {AKS}]
                          [--east-west-gateway {External, Internal}]
                          [--ids]
                          [--member-location]
                          [--member-name]
                          [--member-resource-id]
                          [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                          [--private-connect-subnet]
                          [--release-channel {Rapid, Stable}]
                          [--resource-group]
                          [--subscription]
                          [--tags]
                          [--upgrade-mode {FullyManaged, SelfManaged}]
                          [--version]
  examples:
  - summary: |-
      Join an AKS cluster to an Application Network resource using fully managed
    syntax: az appnet member join --resource-group test_rg --appnet-name appnet-test-01 --member-name member-01 --cluster-type AKS --member-resource-id /subscriptions/bc7e0da9-5e4c-4a91-9252-9658837006cf/resourcegroups/test-rg/providers/Microsoft.ContainerService/managedClusters/test-member1 --upgrade-mode FullyManaged --release-channel Stable --member-location westus2
  - summary: |-
      Join an AKS cluster to an Application Network resource using self managed upgrades
    syntax: az appnet member join --resource-group test_rg --appnet-name appnet-test-01 --member-name member-01 --cluster-type AKS --member-resource-id /subscriptions/bc7e0da9-5e4c-4a91-9252-9658837006cf/resourcegroups/test-rg/providers/Microsoft.ContainerService/managedClusters/test-member1 --upgrade-mode SelfManaged --version 1.4 --member-location westus2
  optionalParameters:
  - name: --appnet-name
    summary: |-
      The name of the Application Network.
    groupName: Resource Id Arguments
  - name: --cluster-type
    defaultValue: AKS
    acceptedValues: AKS
    summary: |-
      Cluster type.
    groupName: Properties Arguments
  - name: --east-west-gateway
    defaultValue: Internal
    acceptedValues: External, Internal
    summary: |-
      East-West gateway visibility.
    groupName: Connectivity Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --member-location
    summary: |-
      The geo-location where the resource lives  When not specified, the location of the resource group will be used.
    groupName: Resource Arguments
  - name: --member-name
    summary: |-
      The name of the member in the Application Network resource.
    groupName: Resource Id Arguments
  - name: --member-resource-id
    summary: |-
      Managed cluster Resource ID.
    groupName: Metadata Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --private-connect-subnet
    summary: |-
      Delegated Subnet to AppLink.
    groupName: Connectivity Arguments
  - name: --release-channel
    acceptedValues: Rapid, Stable
    summary: |-
      Release channel.
    groupName: Upgrade Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Resource Arguments
  - name: --upgrade-mode
    defaultValue: SelfManaged
    acceptedValues: FullyManaged, SelfManaged
    summary: |-
      Upgrade mode.
    groupName: Upgrade Arguments
  - name: --version
    summary: |-
      Istio version.
    groupName: Upgrade Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

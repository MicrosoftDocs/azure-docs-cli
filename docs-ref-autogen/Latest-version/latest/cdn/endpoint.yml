- uid: az_cdn_endpoint_update
  name: az cdn endpoint update
  summary: |-
    Update an existing CDN endpoint with the specified endpoint name under the specified subscription, resource group and profile. Only tags can be updated after creating an endpoint. To update origins, use the Update Origin operation. To update origin groups, use the Update Origin group operation. To update custom domains, use the Update Custom Domain operation.
  status: GA
  sourceType: Extension
  syntax: >-
    az cdn endpoint update [--acquire-policy-token]
                           [--add]
                           [--change-reference]
                           [--content-types-to-compress]
                           [--default-origin-group]
                           [--delivery-policy]
                           [--enable-compression {0, 1, f, false, n, no, t, true, y, yes}]
                           [--endpoint-name --name]
                           [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                           [--geo-filters]
                           [--ids]
                           [--no-http {0, 1, f, false, n, no, t, true, y, yes}]
                           [--no-https {0, 1, f, false, n, no, t, true, y, yes}]
                           [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                           [--optimization-type {DynamicSiteAcceleration, GeneralMediaStreaming, GeneralWebDelivery, LargeFileDownload, VideoOnDemandMediaStreaming}]
                           [--origin-groups]
                           [--origin-host-header]
                           [--origin-path]
                           [--origins]
                           [--probe-path]
                           [--profile-name]
                           [--query-string-caching-behavior {BypassCaching, IgnoreQueryString, NotSet, UseQueryString}]
                           [--remove]
                           [--resource-group]
                           [--set]
                           [--subscription]
                           [--tags]
                           [--url-signing-keys]
                           [--web-application-firewall-policy-link]
  examples:
  - summary: |-
      Endpoints_Create
    syntax: az cdn endpoint update --resource-group RG --profile-name profile1 --endpoint-name endpoint1 --content-types-to-compress "[text/html,application/octet-stream]" --default-origin-group /subscriptions/subid/resourceGroups/RG/providers/Microsoft.Cdn/profiles/profile1/endpoints/endpoint1/originGroups/originGroup1 --delivery-policy "{description:'Test description for a policy.',rules:[{name:rule1,actions:[{name:CacheExpiration,parameters:{cacheBehavior:Override,cacheDuration:'10:10:09',cacheType:All,typeName:DeliveryRuleCacheExpirationActionParameters}},{name:ModifyResponseHeader,parameters:{headerAction:Overwrite,headerName:Access-Control-Allow-Origin,typeName:DeliveryRuleHeaderActionParameters,value:*}},{name:ModifyRequestHeader,parameters:{headerAction:Overwrite,headerName:Accept-Encoding,typeName:DeliveryRuleHeaderActionParameters,value:gzip}}],conditions:[{name:RemoteAddress,parameters:{matchValues:[192.168.1.0/24,10.0.0.0/24],negateCondition:True,operator:IPMatch,typeName:DeliveryRuleRemoteAddressConditionParameters}}],order:1}]}" --is-compression-enabled True --is-http-allowed True --is-https-allowed True --origin-groups "[{name:originGroup1,health-probe-settings:{probe-interval-in-seconds:120,probe-path:/health.aspx,probe-protocol:Http,probe-request-type:GET},origins:[{id:/subscriptions/subid/resourceGroups/RG/providers/Microsoft.Cdn/profiles/profile1/endpoints/endpoint1/origins/origin1},{id:/subscriptions/subid/resourceGroups/RG/providers/Microsoft.Cdn/profiles/profile1/endpoints/endpoint1/origins/origin2}],response-based-origin-error-detection-settings:{response-based-detected-error-types:TcpErrorsOnly,response-based-failover-threshold-percentage:10}}]" --origin-host-header www.bing.com --origin-path /photos --origins "[{name:origin1,enabled:True,host-name:www.someDomain1.net,http-port:80,https-port:443,origin-host-header:www.someDomain1.net,priority:1,weight:50},{name:origin2,enabled:True,host-name:www.someDomain2.net,http-port:80,https-port:443,origin-host-header:www.someDomain2.net,priority:2,weight:50}]" --query-string-caching-behavior BypassCaching --tags "{key1:value1}"
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --content-types-to-compress
    summary: |-
      List of content types on which compression applies. The value should be a valid MIME type.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --default-origin-group
    summary: |-
      The origin group to use for origins not explicitly included in an origin group. Can be specified as a resource ID or the name of an origin group of this endpoint.
    groupName: DefaultOriginGroup Arguments
  - name: --delivery-policy
    summary: |-
      A policy that specifies the delivery rules to be used for an endpoint.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --enable-compression
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      If compression is enabled, content will be served as compressed if user requests for a compressed version. Content won't be compressed on CDN when requested content is smaller than 1 byte or larger than 1 MB.
  - name: --endpoint-name --name -n
    summary: |-
      Name of the endpoint under the profile which is unique globally.
    groupName: Resource Id Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --geo-filters
    summary: |-
      List of rules defining the user's geo access within a CDN endpoint. Each geo filter defines an access rule to a specified path or content, e.g. block APAC for path /pictures/  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --no-http
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Disable HTTP traffic.Indicates whether HTTP traffic is not allowed on the endpoint. Default is to allow HTTP traffic.
  - name: --no-https
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Indicates whether HTTPS traffic is not allowed on the endpoint. Default is to allow HTTPS traffic.
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --optimization-type
    acceptedValues: DynamicSiteAcceleration, GeneralMediaStreaming, GeneralWebDelivery, LargeFileDownload, VideoOnDemandMediaStreaming
    summary: |-
      Specifies what scenario the customer wants this CDN endpoint to optimize for, e.g. Download, Media services. With this information, CDN can apply scenario driven optimization.
    groupName: Properties Arguments
  - name: --origin-groups
    summary: |-
      The origin groups comprising of origins that are used for load balancing the traffic based on availability.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --origin-host-header
    summary: |-
      The host header value sent to the origin with each request. This property at Endpoint is only allowed when endpoint uses single origin and can be overridden by the same property specified at origin.If you leave this blank, the request hostname determines this value. Azure CDN origins, such as Web Apps, Blob Storage, and Cloud Services require this host header value to match the origin hostname by default.
    groupName: Properties Arguments
  - name: --origin-path
    summary: |-
      A directory path on the origin that CDN can use to retrieve content from, e.g. contoso.cloudapp.net/originpath.
    groupName: Properties Arguments
  - name: --origins
    summary: |-
      The source of the content being delivered via CDN.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --probe-path
    summary: |-
      Path to a file hosted on the origin which helps accelerate delivery of the dynamic content and calculate the most optimal routes for the CDN. This is relative to the origin path. This property is only relevant when using a single origin.
    groupName: Properties Arguments
  - name: --profile-name
    summary: |-
      Name of the CDN profile which is unique within the resource group.
    groupName: Resource Id Arguments
  - name: --query-string-caching-behavior
    acceptedValues: BypassCaching, IgnoreQueryString, NotSet, UseQueryString
    summary: |-
      Defines how CDN caches requests that include query strings. You can ignore any query strings when caching, bypass caching to prevent requests that contain query strings from being cached, or cache every request with a unique URL.
    groupName: Properties Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --tags
    summary: |-
      Resource tags.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Endpoint Arguments
  - name: --url-signing-keys
    summary: |-
      List of keys used to validate the signed URL hashes.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --web-application-firewall-policy-link
    summary: |-
      Defines the Web Application Firewall policy for the endpoint (if applicable)  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_cdn_origin-group
name: az cdn origin-group
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **cdn** extension for the Azure CLI (version 2.85.0 or higher). The extension will automatically install the first time you run an **az cdn origin-group** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage origin groups of an endpoint.
status: GA
sourceType: Extension
directCommands:
- uid: az_cdn_origin-group_create
  name: az cdn origin-group create
  summary: |-
    Create a new origin group within the specified endpoint.
  status: GA
  sourceType: Extension
  syntax: >-
    az cdn origin-group create --endpoint-name
                               --name --origin-group-name
                               --profile-name
                               --resource-group
                               [--acquire-policy-token]
                               [--change-reference]
                               [--formatted-origins]
                               [--health-probe-settings]
                               [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                               [--response-based-origin-error-detection-settings]
                               [--traffic-restoration-time-to-healed-or-new-endpoints-in-minutes]
  examples:
  - summary: |-
      OriginGroups_Create
    syntax: az cdn origin-group create --resource-group RG --profile-name profile1 --endpoint-name endpoint1 --origin-group-name origingroup1 --health-probe-settings "{probe-interval-in-seconds:120,probe-path:/health.aspx,probe-protocol:Http,probe-request-type:GET}" --formatted-origins "[{id:/subscriptions/subid/resourceGroups/RG/providers/Microsoft.Cdn/profiles/profile1/endpoints/endpoint1/origins/origin1}]" --response-based-origin-error-detection-settings "{response-based-detected-error-types:TcpErrorsOnly,response-based-failover-threshold-percentage:10}"
  requiredParameters:
  - isRequired: true
    name: --endpoint-name
    summary: |-
      Name of the endpoint under the profile which is unique globally.
  - isRequired: true
    name: --name --origin-group-name -n
    summary: |-
      Name of the origin group which is unique within the endpoint.
  - isRequired: true
    name: --profile-name
    summary: |-
      Name of the CDN profile which is unique within the resource group.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --formatted-origins
    summary: |-
      The source of the content being delivered via CDN within given origin group.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --health-probe-settings
    summary: |-
      Health probe settings to the origin that is used to determine the health of the origin.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --no-wait
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      Do not wait for the long-running operation to finish.
  - name: --response-based-origin-error-detection-settings
    summary: |-
      The JSON object that contains the properties to determine origin health using real requests/responses. This property is currently not supported.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --traffic-restoration-time-to-healed-or-new-endpoints-in-minutes
    summary: |-
      Time in minutes to shift the traffic to the endpoint gradually when an unhealthy endpoint comes healthy or a new endpoint is added. Default is 10 mins. This property is currently not supported.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

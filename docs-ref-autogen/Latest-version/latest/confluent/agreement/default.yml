### YamlMime:AzureCLIGroup
uid: az_confluent_agreement_default
name: az confluent agreement default
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **confluent** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az confluent agreement default** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Default.
status: GA
sourceType: Extension
directCommands:
- uid: az_confluent_agreement_default_create
  name: az confluent agreement default create
  summary: |-
    Create Confluent Marketplace agreement in the subscription.
  status: GA
  sourceType: Extension
  syntax: >-
    az confluent agreement default create [--accepted {0, 1, f, false, n, no, t, true, y, yes}]
                                          [--acquire-policy-token]
                                          [--change-reference]
                                          [--license-text-link]
                                          [--plan]
                                          [--privacy-policy-link]
                                          [--product]
                                          [--publisher]
                                          [--retrieve-datetime]
                                          [--signature]
  optionalParameters:
  - name: --accepted
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      If any version of the terms have been accepted, otherwise false.
    groupName: Properties Arguments
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --license-text-link
    summary: |-
      Link to HTML with Microsoft and Publisher terms.
    groupName: Properties Arguments
  - name: --plan
    summary: |-
      Plan identifier string.
    groupName: Properties Arguments
  - name: --privacy-policy-link
    summary: |-
      Link to the privacy policy of the publisher.
    groupName: Properties Arguments
  - name: --product
    summary: |-
      Product identifier string.
    groupName: Properties Arguments
  - name: --publisher
    summary: |-
      Publisher identifier string.
    groupName: Properties Arguments
  - name: --retrieve-datetime
    summary: |-
      Date and time in UTC of when the terms were accepted. This is empty if Accepted is false.
    groupName: Properties Arguments
  - name: --signature
    summary: |-
      Terms signature.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_confluent_agreement_default_create
metadata:
  description: Manage Default.

uid: az_confluent_organization_environment_cluster
name: az confluent organization environment cluster
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **confluent** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az confluent organization environment cluster** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Command to get the confluent cluster details in a environment.
status: GA
sourceType: Extension

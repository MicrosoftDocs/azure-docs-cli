- uid: az_confluent_organization_environment_cluster_connector_update
  name: az confluent organization environment cluster connector update
  summary: |-
    Update confluent connector by Name.
  status: GA
  sourceType: Extension
  syntax: >-
    az confluent organization environment cluster connector update [--add]
                                                                   [--cluster-id]
                                                                   [--connector-basic-info]
                                                                   [--connector-name --name]
                                                                   [--connector-service-type-info]
                                                                   [--environment-id]
                                                                   [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                                                   [--ids]
                                                                   [--organization-name]
                                                                   [--partner-connector-info]
                                                                   [--remove]
                                                                   [--resource-group]
                                                                   [--set]
                                                                   [--subscription]
  optionalParameters:
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --cluster-id
    summary: |-
      Confluent kafka or schema registry cluster id.
    groupName: Resource Id Arguments
  - name: --connector-basic-info
    summary: |-
      Connector Info Base  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --connector-name --name -n
    summary: |-
      Confluent connector name.
    groupName: Resource Id Arguments
  - name: --connector-service-type-info
    summary: |-
      Connector Service type info base properties.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --environment-id
    summary: |-
      Confluent environment id.
    groupName: Resource Id Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --organization-name
    summary: |-
      Organization resource name.
    groupName: Resource Id Arguments
  - name: --partner-connector-info
    summary: |-
      The connection information consumed by applications.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors

### YamlMime:AzureCLIGroup
uid: az_confluent_organization_environment_cluster_connector
name: az confluent organization environment cluster connector
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **confluent** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az confluent organization environment cluster connector** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Connector.
status: GA
sourceType: Extension
directCommands:
- uid: az_confluent_organization_environment_cluster_connector_create
  name: az confluent organization environment cluster connector create
  summary: |-
    Create confluent connector by Name.
  status: GA
  sourceType: Extension
  syntax: >-
    az confluent organization environment cluster connector create --cluster-id
                                                                   --connector-name --name
                                                                   --environment-id
                                                                   --organization-name
                                                                   --resource-group
                                                                   [--connector-basic-info]
                                                                   [--connector-service-type-info]
                                                                   [--partner-connector-info]
  requiredParameters:
  - isRequired: true
    name: --cluster-id
    summary: |-
      Confluent kafka or schema registry cluster id.
  - isRequired: true
    name: --connector-name --name -n
    summary: |-
      Confluent connector name.
  - isRequired: true
    name: --environment-id
    summary: |-
      Confluent environment id.
  - isRequired: true
    name: --organization-name
    summary: |-
      Organization resource name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --connector-basic-info
    summary: |-
      Connector Info Base  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --connector-service-type-info
    summary: |-
      Connector Service type info base properties.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --partner-connector-info
    summary: |-
      The connection information consumed by applications.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

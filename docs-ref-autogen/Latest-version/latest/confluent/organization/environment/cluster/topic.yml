### YamlMime:AzureCLIGroup
uid: az_confluent_organization_environment_cluster_topic
name: az confluent organization environment cluster topic
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **confluent** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az confluent organization environment cluster topic** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Topic.
status: GA
sourceType: Extension
directCommands:
- uid: az_confluent_organization_environment_cluster_topic_create
  name: az confluent organization environment cluster topic create
  summary: |-
    Create confluent topics by Name.
  status: GA
  sourceType: Extension
  syntax: >-
    az confluent organization environment cluster topic create --cluster-id
                                                               --environment-id
                                                               --name --topic-name
                                                               --organization-name
                                                               --resource-group
                                                               [--configs]
                                                               [--input-configs]
                                                               [--kind]
                                                               [--metadata]
                                                               [--partitions]
                                                               [--partitions-count]
                                                               [--partitions-reassignments]
                                                               [--replication-factor]
                                                               [--topic-id]
  requiredParameters:
  - isRequired: true
    name: --cluster-id
    summary: |-
      Confluent kafka or schema registry cluster id.
  - isRequired: true
    name: --environment-id
    summary: |-
      Confluent environment id.
  - isRequired: true
    name: --name --topic-name -n
    summary: |-
      Confluent kafka or schema registry topic name.
  - isRequired: true
    name: --organization-name
    summary: |-
      Organization resource name.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  optionalParameters:
  - name: --configs
    summary: |-
      Config Specification of the topic  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --input-configs
    summary: |-
      Input Config Specification of the topic  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --kind
    summary: |-
      Type of topic.
    groupName: Properties Arguments
  - name: --metadata
    summary: |-
      Metadata of the record  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --partitions
    summary: |-
      Partition Specification of the topic  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --partitions-count
    summary: |-
      Partition count of the topic.
    groupName: Properties Arguments
  - name: --partitions-reassignments
    summary: |-
      Partition Reassignment Specification of the topic  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --replication-factor
    summary: |-
      Replication factor of the topic.
    groupName: Properties Arguments
  - name: --topic-id
    summary: |-
      Topic Id returned by Confluent.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

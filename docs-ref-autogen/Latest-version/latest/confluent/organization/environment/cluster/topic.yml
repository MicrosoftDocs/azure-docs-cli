                                                               [--environment-id]
                                                               [--ids]
                                                               [--name --topic-name]
                                                               [--no-wait {0, 1, f, false, n, no, t, true, y, yes}]
                                                               [--organization-name]
                                                               [--resource-group]
                                                               [--subscription]
                                                               [--yes]
  optionalParameters:
  - name: --cluster-id
    summary: |-
      Confluent kafka or schema registry cluster id.
    groupName: Resource Id Arguments
  - name: --environment-id
    summary: |-
      Confluent environment id.
    groupName: Resource Id Arguments
  - name: --ids
    summary: |-

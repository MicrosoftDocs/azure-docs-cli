                                                               [--ids]
                                                               [--input-configs]
                                                               [--kind]
                                                               [--metadata]
                                                               [--name --topic-name]
                                                               [--organization-name]
                                                               [--partitions]
                                                               [--partitions-count]
                                                               [--partitions-reassignments]
                                                               [--remove]
                                                               [--replication-factor]
                                                               [--resource-group]
                                                               [--set]
                                                               [--subscription]
                                                               [--topic-id]
  optionalParameters:

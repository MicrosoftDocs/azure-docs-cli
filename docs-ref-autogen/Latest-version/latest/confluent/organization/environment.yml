uid: az_confluent_organization_environment
name: az confluent organization environment
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **confluent** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az confluent organization environment** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.

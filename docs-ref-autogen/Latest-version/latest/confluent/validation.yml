### YamlMime:AzureCLIGroup
uid: az_confluent_validation
name: az confluent validation
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **confluent** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az confluent validation** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage Validation.
status: GA
sourceType: Extension
directCommands:
- uid: az_confluent_validation_orgvalidate
  name: az confluent validation orgvalidate
  summary: |-
    Organization Validate proxy resource.
  status: GA
  sourceType: Extension
  syntax: >-
    az confluent validation orgvalidate --offer-detail
                                        --user-detail
                                        [--ids]
                                        [--link-organization]
                                        [--location]
                                        [--organization-name]
                                        [--resource-group]
                                        [--subscription]
                                        [--tags]
  requiredParameters:
  - isRequired: true
    name: --offer-detail
    summary: |-
      Confluent offer detail  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - isRequired: true
    name: --user-detail
    summary: |-
      Subscriber detail  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  optionalParameters:
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --link-organization
    summary: |-
      Link an existing Confluent organization  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --location -l
    summary: |-
      Location of Organization resource.
    groupName: Body Arguments
  - name: --organization-name
    summary: |-
      Organization resource name.
    groupName: Resource Id Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  - name: --tags
    summary: |-
      Organization resource tags  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Body Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

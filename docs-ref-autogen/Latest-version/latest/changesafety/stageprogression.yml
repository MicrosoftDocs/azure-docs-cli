- uid: az_changesafety_stageprogression_update
  name: az changesafety stageprogression update
  summary: |-
    Update an existing StageProgression resource.
  description: |-
    Update the status, comments, or other metadata of a StageProgression. Commonly used to transition a stage from InProgress to Completed or Failed.
  status: GA
  sourceType: Extension
  syntax: >-
    az changesafety stageprogression update [--acquire-policy-token]
                                            [--add]
                                            [--additional-data]
                                            [--change-record-name]
                                            [--change-reference]
                                            [--comments]
                                            [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                            [--ids]
                                            [--links]
                                            [--name --stage-progression-name]
                                            [--parameters]
                                            [--remove]
                                            [--resource-group]
                                            [--set]
                                            [--stage-reference]
                                            [--stage-variables]
                                            [--status {Cancelled, Completed, Failed, InProgress, Initialized, Paused, Skipped}]
                                            [--subscription]
  examples:
  - summary: |-
      Mark a stage as completed
    syntax: az changesafety stageprogression update --change-record-name my-changerecord -n canary-progression --status Completed --comments "Canary validation passed"
  - summary: |-
      Mark a stage as failed
    syntax: az changesafety stageprogression update --change-record-name my-changerecord -n prod-progression --status Failed --comments "Deployment rollback triggered"
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --additional-data
    summary: |-
      Additional metadata for the stageProgression resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --change-record-name
    summary: |-
      The name of the ChangeRecord resource.
    groupName: Resource Id Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --comments
    summary: |-
      Add or update comments about this stage progression.
    groupName: Properties Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --links
    summary: |-
      Collection of related links for the change.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --name --stage-progression-name -n
    summary: |-
      Name of the stageProgression.
    groupName: Resource Id Arguments
  - name: --parameters
    summary: |-
      Stage specific key value pairs of parameter names & their values for the current Stage, If any.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  - name: --stage-reference
    summary: |-
      Stage name relevant to hierarchical StageMap.
    groupName: Properties Arguments
  - name: --stage-variables
    summary: |-
      Variables to apply on the change of that stage. Key value pairs supporting any JSON values.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --status
    acceptedValues: Cancelled, Completed, Failed, InProgress, Initialized, Paused, Skipped
    summary: |-
      Updated status: Initialized, InProgress, Completed, Failed, Cancelled, Paused, or Skipped.
    groupName: Properties Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

### YamlMime:AzureCLIGroup
uid: az_changesafety_stageprogression
name: az changesafety stageprogression
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-changesafety** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az changesafety stageprogression** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage StageProgression resources that track the execution of individual stages within a ChangeRecord.
status: GA
sourceType: Extension
directCommands:
- uid: az_changesafety_stageprogression_create
  name: az changesafety stageprogression create
  summary: |-
    Create a StageProgression to track stage execution for a ChangeRecord.
  description: |-
    A StageProgression records the status of a specific stage defined in the ChangeRecord's StageMap. Use this command to signal that a stage has started, completed, or encountered an issue. The --stage-reference must match a stage name in the associated StageMap.
  status: GA
  sourceType: Extension
  syntax: >-
    az changesafety stageprogression create --change-record-name
                                            --name --stage-progression-name
                                            [--acquire-policy-token]
                                            [--additional-data]
                                            [--change-reference]
                                            [--comments]
                                            [--links]
                                            [--parameters]
                                            [--resource-group]
                                            [--stage-reference]
                                            [--stage-variables]
                                            [--status {Cancelled, Completed, Failed, InProgress, Initialized, Paused, Skipped}]
  examples:
  - summary: |-
      Create a StageProgression for the Canary stage
    syntax: az changesafety stageprogression create --change-record-name my-changerecord -n canary-progression --stage-reference Canary --status InProgress
  - summary: |-
      Create a StageProgression with stage variables and a link
    syntax: az changesafety stageprogression create --change-record-name my-changerecord -n prod-progression --stage-reference Production --status Initialized --stage-variables "{region:eastus,batchSize:50}" --links "[{name:dashboard,uri:'https://contoso.com/deploy/prod'}]"
  requiredParameters:
  - isRequired: true
    name: --change-record-name
    summary: |-
      The name of the ChangeRecord resource this progression belongs to.
  - isRequired: true
    name: --name --stage-progression-name -n
    summary: |-
      Name of the stageProgression.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --additional-data
    summary: |-
      Additional metadata for the stageProgression resource.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --comments
    summary: |-
      Optional comments about this stage progression.
    groupName: Properties Arguments
  - name: --links
    summary: |-
      Collection of related links. Use --links name=NAME uri=URL [description=TEXT].
    groupName: Properties Arguments
  - name: --parameters
    summary: |-
      Stage specific key value pairs of parameter names & their values for the current Stage, If any.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - name: --stage-reference
    summary: |-
      Stage name from the associated StageMap (e.g., Canary, Production).
    groupName: Properties Arguments
  - name: --stage-variables
    summary: |-
      Key-value pairs of variables specific to this stage execution.
    groupName: Properties Arguments
  - name: --status
    acceptedValues: Cancelled, Completed, Failed, InProgress, Initialized, Paused, Skipped
    summary: |-
      Status of the stage progression: Initialized, InProgress, Completed, Failed, Cancelled, Paused, or Skipped.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

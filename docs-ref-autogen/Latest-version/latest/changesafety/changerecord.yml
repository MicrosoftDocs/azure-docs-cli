- uid: az_changesafety_changerecord_update
  name: az changesafety changerecord update
  summary: |-
    Update an existing ChangeRecord resource.
  description: |-
    Use this command to modify descriptive metadata, rollout settings, or scheduling for an existing ChangeRecord. Note: The changeDefinition (targets) cannot be modified after creation.
  status: GA
  sourceType: Extension
  syntax: >-
    az changesafety changerecord update [--acquire-policy-token]
                                        [--add]
                                        [--additional-data]
                                        [--anticipated-end-time]
                                        [--anticipated-start-time]
                                        [--change-record-name --name]
                                        [--change-reference]
                                        [--change-type {AppDeployment, Config, ManualTouch, PolicyDeployment}]
                                        [--comments]
                                        [--description]
                                        [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                        [--ids]
                                        [--links]
                                        [--orchestration-tool]
                                        [--parameters]
                                        [--release-label]
                                        [--remove]
                                        [--resource-group]
                                        [--rollout-type {Emergency, Hotfix, Normal}]
                                        [--set]
                                        [--stage-map]
                                        [--stage-map-name --stagemap-name]
                                        [--subscription]
  examples:
  - summary: |-
      Adjust rollout type and add a comment
    syntax: az changesafety changerecord update -g MyResourceGroup -n changerecord001 --rollout-type Emergency --comments "Escalated to emergency rollout"
  - summary: |-
      Update scheduling window
    syntax: az changesafety changerecord update -g MyResourceGroup -n changerecord001 --anticipated-start-time "2026-09-01T08:00:00Z" --anticipated-end-time "2026-09-01T12:00:00Z"
  - summary: |-
      Update description
    syntax: az changesafety changerecord update -g MyResourceGroup -n changerecord001 --description "Updated rollout for production deployment"
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --additional-data
    summary: |-
      Additional metadata for the change required for various orchestration tools.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --anticipated-end-time
    summary: |-
      Update the expected completion time in ISO 8601 format. If omitted, the current value is preserved.
    groupName: Properties Arguments
  - name: --anticipated-start-time
    summary: |-
      Update the expected start time in ISO 8601 format. If omitted, the current value is preserved.
    groupName: Properties Arguments
  - name: --change-record-name --name -n
    summary: |-
      The name of the ChangeRecord resource.
    groupName: Resource Id Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-type
    acceptedValues: AppDeployment, Config, ManualTouch, PolicyDeployment
    summary: |-
      Describes the nature of the change.
    groupName: Properties Arguments
  - name: --comments
    summary: |-
      Provide notes about the latest update to the ChangeRecord.
    groupName: Properties Arguments
  - name: --description
    summary: |-
      Update the description of the change.
    groupName: Properties Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --ids
    summary: |-
      One or more resource IDs (space-delimited). It should be a complete resource ID containing all information of 'Resource Id' arguments. You should provide either --ids or other 'Resource Id' arguments.
    groupName: Resource Id Arguments
  - name: --links
    summary: |-
      Collection of related links for the change.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --orchestration-tool
    summary: |-
      Tool used for deployment orchestration of this change.
    groupName: Properties Arguments
  - name: --parameters
    summary: |-
      Schema of parameters that will be provided for each stageProgression.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --release-label
    summary: |-
      Label for the release associated with this change.
    groupName: Properties Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
    groupName: Resource Id Arguments
  - name: --rollout-type
    acceptedValues: Emergency, Hotfix, Normal
    summary: |-
      Describes the type of the rollout used for the change.
    groupName: Properties Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  - name: --stage-map
    summary: |-
      Reference an existing StageMap resource using resource-id=RESOURCE_ID and optional parameters key=value pairs.
    groupName: Properties Arguments
  - name: --stage-map-name --stagemap-name
    summary: |-
      StageMap name in the current subscription scope; the resource ID is built for you.
    groupName: Properties Arguments
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
    groupName: Resource Id Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_changesafety_changerecord_create
- az_changesafety_changerecord_delete
- az_changesafety_changerecord_list
- az_changesafety_changerecord_show
- az_changesafety_changerecord_update
metadata:
  description: Manage ChangeRecord resources that describe planned changes across targets.

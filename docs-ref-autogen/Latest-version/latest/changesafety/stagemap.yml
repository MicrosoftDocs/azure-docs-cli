### YamlMime:AzureCLIGroup
uid: az_changesafety_stagemap
name: az changesafety stagemap
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-changesafety** extension for the Azure CLI (version 2.75.0 or higher). The extension will automatically install the first time you run an **az changesafety stagemap** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage StageMap resources that define rollout stages for orchestrated changes.
status: GA
sourceType: Extension
directCommands:
- uid: az_changesafety_stagemap_create
  name: az changesafety stagemap create
  summary: |-
    Create a StageMap resource.
  description: |-
    A StageMap defines the stages through which a change progresses during rollout. Each stage has a name and sequence number. Stages are executed in order of their sequence values. StageMap resources can be referenced by ChangeRecord resources to enforce staged rollout patterns.
  status: GA
  sourceType: Extension
  syntax: >-
    az changesafety stagemap create --stage-map-name
                                    [--acquire-policy-token]
                                    [--change-reference]
                                    [--management-group-name]
                                    [--parameters]
                                    [--stages]
  examples:
  - summary: |-
      Create a simple two-stage StageMap
    syntax: az changesafety stagemap create --subscription 00000000-0000-0000-0000-000000000000 --stage-map-name rolloutStageMap --stages "[{name:Canary,sequence:1},{name:Production,sequence:2}]"
  - summary: |-
      Create a StageMap with three stages
    syntax: az changesafety stagemap create --subscription 00000000-0000-0000-0000-000000000000 --stage-map-name regional-rollout --stages "[{name:WestUS,sequence:1},{name:EastUS,sequence:2},{name:Global,sequence:3}]"
  - summary: |-
      Create a StageMap with parameters
    syntax: az changesafety stagemap create --subscription 00000000-0000-0000-0000-000000000000 --stage-map-name parameterized-rollout --stages "[{name:Canary,sequence:1},{name:Production,sequence:2}]" --parameters region.string.default-value=westus batchSize.number.default-value=10
  - summary: |-
      Create a StageMap with stage variables
    syntax: az changesafety stagemap create --subscription 00000000-0000-0000-0000-000000000000 --stage-map-name staged-rollout --stages "[{name:Canary,sequence:1,stage-variables:{region:westus,batchSize:5}},{name:Production,sequence:2,stage-variables:{region:eastus,batchSize:50}}]"
  requiredParameters:
  - isRequired: true
    name: --stage-map-name
    summary: |-
      The name of the StageMap resource to create.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --management-group-name
    summary: |-
      The name of the management group. The name is case insensitive.
  - name: --parameters
    summary: |-
      Optional parameters schema for the StageMap. Define parameters that can be passed when referencing this StageMap from a ChangeRecord. Use AAZ shorthand syntax: paramName.{string|number|array|object}.default-value=value. Run with --parameters paramName.string="??" to see available properties.
    groupName: Properties Arguments
  - name: --stages
    summary: |-
      Array of stage definitions. Each stage requires a name and sequence number. Use shorthand syntax or JSON format.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_changesafety_stagemap_delete
  name: az changesafety stagemap delete
  summary: |-
    Delete a StageMap resource.
  description: |-
    Delete a StageMap that is no longer needed. Note that StageMap resources that are currently referenced by active ChangeRecord resources cannot be deleted.
  status: GA
  sourceType: Extension
  syntax: >-
    az changesafety stagemap delete --stage-map-name
                                    [--acquire-policy-token]
                                    [--change-reference]
                                    [--management-group-name]
                                    [--yes]
  examples:
  - summary: |-
      Delete a StageMap
    syntax: az changesafety stagemap delete --subscription 00000000-0000-0000-0000-000000000000 --stage-map-name rolloutStageMap --yes
  requiredParameters:
  - isRequired: true
    name: --stage-map-name
    summary: |-
      The name of the StageMap.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --management-group-name
    summary: |-
      The name of the management group. The name is case insensitive.
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

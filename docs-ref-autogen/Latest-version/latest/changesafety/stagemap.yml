- uid: az_changesafety_stagemap_update
  name: az changesafety stagemap update
  summary: |-
    Update an existing StageMap resource.
  description: |-
    Modify the stages defined in a StageMap. When updating, provide the complete list of stages as the update replaces the existing stages array.
  status: GA
  sourceType: Extension
  syntax: >-
    az changesafety stagemap update --stage-map-name
                                    [--acquire-policy-token]
                                    [--add]
                                    [--change-reference]
                                    [--force-string {0, 1, f, false, n, no, t, true, y, yes}]
                                    [--management-group-name]
                                    [--parameters]
                                    [--remove]
                                    [--set]
                                    [--stages]
  examples:
  - summary: |-
      Add a new stage to an existing StageMap
    syntax: az changesafety stagemap update --subscription 00000000-0000-0000-0000-000000000000 --stage-map-name rolloutStageMap --stages "[{name:Canary,sequence:1},{name:Pilot,sequence:2},{name:Production,sequence:3}]"
  requiredParameters:
  - isRequired: true
    name: --stage-map-name
    summary: |-
      The name of the StageMap.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add
    summary: |-
      Add an object to a list of objects by specifying a path and key value pairs.  Example: `--add property.listProperty <key=value, string or JSON string>`.
    groupName: Generic Update Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --force-string
    acceptedValues: 0, 1, f, false, n, no, t, true, y, yes
    summary: |-
      When using 'set' or 'add', preserve string literals instead of attempting to convert to JSON.
    groupName: Generic Update Arguments
  - name: --management-group-name
    summary: |-
      The name of the management group. The name is case insensitive.
  - name: --parameters
    summary: |-
      StageMap parameters schema for each stage.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  - name: --remove
    summary: |-
      Remove a property or an element from a list.  Example: `--remove property.list <indexToRemove>` OR `--remove propertyToRemove`.
    groupName: Generic Update Arguments
  - name: --set
    summary: |-
      Update an object by specifying a property path and value to set.  Example: `--set property1.property2=<value>`.
    groupName: Generic Update Arguments
  - name: --stages
    summary: |-
      Array of stages objects.  Support shorthand-syntax, json-file and yaml-file. Try "??" to show more.
    groupName: Properties Arguments
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_changesafety_stagemap_create

### YamlMime:AzureCLIGroup
uid: az_devops_migrations_pipelines
name: az devops migrations pipelines
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-devops** extension for the Azure CLI (version 2.30.0 or higher). The extension will automatically install the first time you run an **az devops migrations pipelines** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage pipeline rewiring for migrations. (Preview).
status: Preview
isPreview: true
previewOrExperimentalInfo: "Command group 'devops migrations' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
sourceType: Extension
directCommands:
- uid: az_devops_migrations_pipelines_delete
  name: az devops migrations pipelines delete
  summary: |-
    Delete pipeline rewiring data for a migration. (Preview).
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'devops migrations pipelines' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az devops migrations pipelines delete [--acquire-policy-token]
                                          [--change-reference]
                                          [--detect {false, true}]
                                          [--migration-id]
                                          [--org --organization]
                                          [--repository-id]
                                          [--yes]
  examples:
  - summary: |-
      Delete rewiring config and cloned definitions.
    syntax: az devops migrations pipelines delete --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --migration-id 7 --yes
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --migration-id
    summary: |-
      Migration ID used for pipeline rewiring cleanup.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

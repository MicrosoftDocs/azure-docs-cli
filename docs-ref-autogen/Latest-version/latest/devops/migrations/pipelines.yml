- uid: az_devops_migrations_pipelines_submit
  name: az devops migrations pipelines submit
  summary: |-
    Submit pipelines for rewiring. (Preview).
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'devops migrations pipelines' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az devops migrations pipelines submit [--acquire-policy-token]
                                          [--change-reference]
                                          [--detect {false, true}]
                                          [--org --organization]
                                          [--pipeline-ids]
                                          [--repository-id]
                                          [--repository-mapping]
                                          [--service-connection-id]
  examples:
  - summary: |-
      Submit pipelines with service connection and repository mappings.
    syntax: az devops migrations pipelines submit --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --pipeline-ids 42 43 44 --service-connection-id 11111111-1111-1111-1111-111111111111 --repository-mapping aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa=myorg/shared-templates
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --pipeline-ids
    summary: |-
      Pipeline definition IDs. Accepts space-separated values (for example, 42 43 44) or comma-separated values (for example, 42,43,44).
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  - name: --repository-mapping
    summary: |-
      Repository mapping in the format `<sourceRepoId>=<targetOwner>/<targetRepo>`. Can be provided multiple times.
  - name: --service-connection-id
    summary: |-
      Project-scoped GitHub service connection ID (GUID). Optional if a connection was already attached via migrations create --pipeline-service-connection-id or pipelines update --service-connection-id.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_devops_migrations_pipelines_update
  name: az devops migrations pipelines update
  summary: |-
    Bulk update pipeline rewiring configuration. (Preview).
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'devops migrations pipelines' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az devops migrations pipelines update [--acquire-policy-token]
                                          [--add-ids]
                                          [--change-reference]
                                          [--detect {false, true}]
                                          [--org --organization]
                                          [--remove-ids]
                                          [--repository-id]
                                          [--repository-mapping]
                                          [--retry-ids]
                                          [--service-connection-id]
  examples:
  - summary: |-
      Add, remove, and update service connection.
    syntax: az devops migrations pipelines update --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --add-ids 50 51 --remove-ids 42 --service-connection-id 22222222-2222-2222-2222-222222222222
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --add-ids
    summary: |-
      Pipeline IDs to add. Accepts space-separated or comma-separated values.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --remove-ids
    summary: |-
      Pipeline IDs to remove. Accepts space-separated or comma-separated values.
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  - name: --repository-mapping
    summary: |-
      Repository mapping in the format `<sourceRepoId>=<targetOwner>/<targetRepo>`. Can be provided multiple times.
  - name: --retry-ids
    summary: |-
      Failed pipeline IDs to retry. Accepts space-separated or comma-separated values.
  - name: --service-connection-id
    summary: |-
      Project-scoped GitHub service connection ID (GUID).
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

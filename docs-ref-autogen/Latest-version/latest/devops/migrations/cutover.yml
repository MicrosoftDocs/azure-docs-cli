### YamlMime:AzureCLIGroup
uid: az_devops_migrations_cutover
name: az devops migrations cutover
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-devops** extension for the Azure CLI (version 2.30.0 or higher). The extension will automatically install the first time you run an **az devops migrations cutover** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage migration cutover.
status: GA
sourceType: Extension
directCommands:
- uid: az_devops_migrations_cutover_cancel
  name: az devops migrations cutover cancel
  summary: |-
    Cancel a scheduled cutover.
  status: GA
  sourceType: Extension
  syntax: >-
    az devops migrations cutover cancel [--acquire-policy-token]
                                        [--change-reference]
                                        [--detect {false, true}]
                                        [--org --organization]
                                        [--repository-id]
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_devops_migrations_cutover_set
  name: az devops migrations cutover set
  summary: |-
    Schedule cutover for a migration.
  status: GA
  sourceType: Extension
  syntax: >-
    az devops migrations cutover set [--acquire-policy-token]
                                     [--change-reference]
                                     [--date]
                                     [--detect {false, true}]
                                     [--org --organization]
                                     [--repository-id]
  examples:
  - summary: |-
      Schedule cutover.
    syntax: az devops migrations cutover set --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --date 2030-12-31T11:59:00Z
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --date
    summary: |-
      The date and time for cutover (ISO 8601).
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_devops_migrations_cutover_cancel
- az_devops_migrations_cutover_set
metadata:
  description: Manage migration cutover.

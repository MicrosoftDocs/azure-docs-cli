### YamlMime:AzureCLIGroup
uid: az_devops_migrations
name: az devops migrations
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-devops** extension for the Azure CLI (version 2.30.0 or higher). The extension will automatically install the first time you run an **az devops migrations** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage enterprise live migrations.
description: |-
  This command group is a part of the azure-devops extension. For ELM migrations, --org should be your Azure DevOps organization URL (for example: https://dev.azure.com/myorg).
status: GA
sourceType: Extension
directCommands:
- uid: az_devops_migrations_abandon
  name: az devops migrations abandon
  summary: |-
    Abandon and delete a migration.
  status: GA
  sourceType: Extension
  syntax: >-
    az devops migrations abandon [--acquire-policy-token]
                                 [--change-reference]
                                 [--detect {false, true}]
                                 [--org --organization]
                                 [--repository-id]
                                 [--yes]
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_devops_migrations_create
  name: az devops migrations create
  summary: |-
    Create a migration for a repository.
  status: GA
  sourceType: Extension
  syntax: >-
    az devops migrations create [--acquire-policy-token]
                                [--agent-pool]
                                [--change-reference]
                                [--cutover-date]
                                [--detect {false, true}]
                                [--org --organization]
                                [--repository-id]
                                [--skip-validation]
                                [--target-owner-user-id]
                                [--target-repository]
                                [--validate-only]
  examples:
  - summary: |-
      Create a migration.
    syntax: az devops migrations create --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --target-repository https://github.com/OrgName/RepoName --target-owner-user-id OwnerUserId --agent-pool MigrationPool
  - summary: |-
      Create a validate-only migration.
    syntax: az devops migrations create --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --target-repository https://github.com/OrgName/RepoName --target-owner-user-id OwnerUserId --agent-pool MigrationPool --validate-only --skip-validation ActivePullRequestCount,PullRequestDeltaSize
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --agent-pool
    summary: |-
      Agent pool name to use for migration work.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --cutover-date
    summary: |-
      Scheduled cutover date/time (ISO 8601).
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  - name: --skip-validation
    summary: |-
      Validation policies to skip. Accepts either a comma-separated list of policy names (for example, AgentPoolExists,MaxRepoSize) or a non-negative integer bitmask.
  - name: --target-owner-user-id
    summary: |-
      Target repository owner user ID.
  - name: --target-repository
    summary: |-
      Target repository URL (must start with http:// or https://).
  - name: --validate-only
    defaultValue: "False"
    summary: |-
      Create in validate-only mode (pre-migration checks only).
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_devops_migrations_list
  name: az devops migrations list
  summary: |-
    List migrations in an organization.
  status: GA
  sourceType: Extension
  syntax: >-
    az devops migrations list [--detect {false, true}]
                              [--include-inactive]
                              [--org --organization]
                              [--project]
  examples:
  - summary: |-
      List migrations.
    syntax: az devops migrations list --org https://dev.azure.com/myorg
  - summary: |-
      List all migrations including inactive ones.
    syntax: az devops migrations list --org https://dev.azure.com/myorg --include-inactive
  optionalParameters:
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --include-inactive
    defaultValue: "False"
    summary: |-
      Include inactive (completed, abandoned, failed) migrations in the results.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --project
    summary: |-
      Optional project name or ID to filter migrations.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

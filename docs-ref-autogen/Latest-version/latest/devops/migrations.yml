### YamlMime:AzureCLIGroup
uid: az_devops_migrations
name: az devops migrations
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **azure-devops** extension for the Azure CLI (version 2.30.0 or higher). The extension will automatically install the first time you run an **az devops migrations** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Manage enterprise live migrations.
description: |-
  This command group is a part of the azure-devops extension and is in preview. Availability may be limited (for example, to 1P/allowlisted users). For ELM migrations, --org should be your Azure DevOps organization URL (for example: `https://dev.azure.com/myorg`).
status: Preview
isPreview: true
previewOrExperimentalInfo: 'This command group is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
sourceType: Extension
directCommands:
- uid: az_devops_migrations_abandon
  name: az devops migrations abandon
  summary: |-
    Abandon a migration.
  description: |-
    Moves the migration to an abandoned/failed state; the migration record is not purged. Pipeline rewiring data is left intact so a subsequent migration can reuse it.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'devops migrations' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az devops migrations abandon [--acquire-policy-token]
                                 [--change-reference]
                                 [--detect {false, true}]
                                 [--org --organization]
                                 [--remove-read-only]
                                 [--repository-id]
                                 [--yes]
  examples:
  - summary: |-
      Abandon and keep repository read-only (default).
    syntax: az devops migrations abandon --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000
  - summary: |-
      Abandon and set repository back to read-write.
    syntax: az devops migrations abandon --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --remove-read-only
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --remove-read-only
    defaultValue: "False"
    summary: |-
      Also set the Azure Repos repository back to read-write state by sending removeReadOnly=true.
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  - name: --yes -y
    defaultValue: "False"
    summary: |-
      Do not prompt for confirmation.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_devops_migrations_create
  name: az devops migrations create
  summary: |-
    Create a migration for a repository.
  description: |-
    If --github-token is not provided, the CLI checks ELM_GITHUB_TOKEN and then runs GitHub device flow to acquire a token.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'devops migrations' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az devops migrations create [--acquire-policy-token]
                                [--agent-pool]
                                [--auto-discover --enable-auto-discover-pipelines]
                                [--change-reference]
                                [--cutover-date]
                                [--detect {false, true}]
                                [--enable-boards-gh --enable-boards-github-connection]
                                [--github-token]
                                [--org --organization]
                                [--pipeline-sc-id --pipeline-service-connection-id]
                                [--repository-id]
                                [--service-endpoint-id]
                                [--skip-validation]
                                [--target-owner-user-id]
                                [--target-repository]
                                [--validate-only]
  examples:
  - summary: |-
      Create a migration.
    syntax: az devops migrations create --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --target-repository https://github.com/OrgName/RepoName --agent-pool <your-agent-pool>
  - summary: |-
      Create a validate-only migration.
    syntax: az devops migrations create --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --target-repository https://github.com/OrgName/RepoName --agent-pool <your-agent-pool> --validate-only --skip-validation ActivePullRequestCount,PullRequestDeltaSize
  - summary: |-
      Create using a pre-generated GitHub token or PAT.
    syntax: az devops migrations create --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --target-repository https://github.com/OrgName/RepoName --github-token <token>
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --agent-pool
    summary: |-
      Agent pool name to use for migration work.
  - name: --auto-discover --enable-auto-discover-pipelines
    defaultValue: "False"
    summary: |-
      Opt in to automatic pipeline discovery at cutover. Off by default. When enabled, the ELM sync job walks the source repository and creates clone definitions for every pipeline that references it. Requires --pipeline-service-connection-id; without it discovery runs as a no-op and enrolls 0 pipelines. Pipeline rewiring itself is always available via az devops migrations pipelines submit / update.
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --cutover-date
    summary: |-
      Scheduled cutover date/time (ISO 8601).
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --enable-boards-gh --enable-boards-github-connection
    defaultValue: "False"
    summary: |-
      Opt in to provisioning the Azure Boards GitHub connection at cutover. Off by default. Requires the Azure Boards GitHub App to be installed on the target GitHub Enterprise organization before the migration runs.
  - name: --github-token
    summary: |-
      GitHub user token used for user-identity verification on the target host. Independent of --service-endpoint-id. If omitted and --service-endpoint-id is not provided, the CLI checks ELM_GITHUB_TOKEN and then runs GitHub device flow. When --service-endpoint-id is provided, device flow is skipped; pass --github-token or set ELM_GITHUB_TOKEN to supply the user token.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --pipeline-sc-id --pipeline-service-connection-id
    summary: |-
      Project-scoped GitHub service connection ID (GUID) attached at create time for pipeline rewiring. Required for full auto-discovery when combined with --enable-auto-discover-pipelines; optional in manual mode (pre-attaches the connection so subsequent pipelines submit calls only need --pipeline-ids).
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  - name: --service-endpoint-id
    summary: |-
      Service endpoint ID (GUID) for the GitHub Enterprise Server connection used to sync commits to the target. Independent of user-identity verification: --github-token / ELM_GITHUB_TOKEN can be supplied alongside this flag. Device flow is skipped when this flag is set.
  - name: --skip-validation
    summary: |-
      Validation policies to skip. Accepts either a comma-separated list of policy names (for example, AgentPoolExists,MaxFileSize) or a non-negative integer bitmask. Supported policy names (case-insensitive): None, ActivePullRequestCount, PullRequestDeltaSize, AgentPoolExists, MaxFileSize, MaxPullRequestSize, MaxPushPackSize, MaxReferenceNameLength, TargetRepositoryDoesNotExist, SourceRepositoryContainsLfsObjects, SourceRepositoryNotReadOnly, BoardsGitHubConnectionProvisioning, All.
  - name: --target-owner-user-id
    summary: |-
      Target repository owner user ID. Deprecated and ignored when server-side token-based owner resolution is enabled.
  - name: --target-repository
    summary: |-
      Target repository URL (must start with `http://` or `https://`).
  - name: --validate-only
    defaultValue: "False"
    summary: |-
      Create in validate-only mode (pre-migration checks only).
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_devops_migrations_list
  name: az devops migrations list
  summary: |-
    List migrations in an organization.
  description: |-
    By default the latest migration per repository is returned, regardless of state. Use --include-all to return the full migration history.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: "Command group 'devops migrations' is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus"
  sourceType: Extension
  syntax: >-
    az devops migrations list [--detect {false, true}]
                              [--include-all]
                              [--include-inactive]
                              [--org --organization]
                              [--project]
  examples:
  - summary: |-
      List the latest migration per repository.
    syntax: az devops migrations list --org https://dev.azure.com/myorg
  - summary: |-
      List the full migration history for every repository.
    syntax: az devops migrations list --org https://dev.azure.com/myorg --include-all
  optionalParameters:
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --include-all
    defaultValue: "False"
    summary: |-
      Return the full migration history (all records per repository). By default only the latest migration per repository is returned, regardless of its state.
  - name: --include-inactive
    defaultValue: "False"
    summary: |-
      Deprecated. Use --include-all instead.
    isDeprecated: true
    deprecateInfo: Option '--include-inactive' has been deprecated and will be removed in a future release. Use '--include-all' instead.
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --project
    summary: |-
      Optional project name or ID to filter migrations.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

- uid: az_devops_migrations_resume
  name: az devops migrations resume
  summary: |-
    Resume a stopped (paused, failed) migration.
  status: GA
  sourceType: Extension
  syntax: >-
    az devops migrations resume [--acquire-policy-token]
                                [--change-reference]
                                [--detect {false, true}]
                                [--migration]
                                [--org --organization]
                                [--repository-id]
                                [--validate-only]
  examples:
  - summary: |-
      Resume using the current mode.
    syntax: az devops migrations resume --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000
  - summary: |-
      Resume in validate-only mode.
    syntax: az devops migrations resume --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --validate-only
  - summary: |-
      Continue migration (clears validate-only mode).
    syntax: az devops migrations resume --org https://dev.azure.com/myorg --repository-id 00000000-0000-0000-0000-000000000000 --migration
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --detect
    acceptedValues: false, true
    summary: |-
      Automatically detect organization.
  - name: --migration
    defaultValue: "False"
    summary: |-
      Promote a succeeded validate-only migration to a full migration (sets validateOnly=false and statusRequested=active).
  - name: --org --organization
    summary: |-
      Azure DevOps organization URL. You can configure the default organization using az devops configure -d organization=ORG_URL. Required if not configured as default or picked up via git config. Example: `https://dev.azure.com/MyOrganizationName/`.
  - name: --repository-id
    summary: |-
      ID of the Azure Repos repository (GUID).
  - name: --validate-only
    defaultValue: "False"
    summary: |-
      Resume in validate-only mode.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.

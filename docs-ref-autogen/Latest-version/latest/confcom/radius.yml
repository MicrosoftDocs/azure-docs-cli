### YamlMime:AzureCLIGroup
uid: az_confcom_radius
name: az confcom radius
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **confcom** extension for the Azure CLI (version 2.26.2 or higher). The extension will automatically install the first time you run an **az confcom radius** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Commands to manage security policies for Radius Bicep templates.
status: GA
sourceType: Extension
directCommands:
- uid: az_confcom_radius_policy_insert
  name: az confcom radius policy_insert
  summary: |-
    Insert a generated security policy into a Radius Bicep template.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: 'This command is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
  sourceType: Extension
  syntax: >-
    az confcom radius policy_insert --template
                                    [--acquire-policy-token]
                                    [--change-reference]
                                    [--idx]
                                    []
  examples:
  - summary: |-
      Insert a policy file into a Radius Bicep template
    syntax: az confcom radius policy_insert ./policy.rego --template ./app.bicep
  - summary: |-
      Pipe a generated policy directly into a Radius Bicep template
    syntax: az confcom acipolicygen --template-file ./template.json --print-policy --outraw | az confcom radius policy_insert --template ./app.bicep
  - summary: |-
      Insert a policy into the second container of a Radius Bicep template
    syntax: az confcom radius policy_insert ./policy.rego --template ./app.bicep --idx 1
  requiredParameters:
  - isRequired: true
    name: --template -t
    summary: |-
      Path to the Radius Bicep template to update with the policy.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --idx
    defaultValue: "0"
    summary: |-
      Index of the container in the template to update (0-based). Defaults to 0.
  - name: <POLICY_FILE>
    summary: |-
      Path to policy file to insert (reads from stdin if not provided).
    groupName: Positional
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_confcom_radius_policy_insert
metadata:
  description: Commands to manage security policies for Radius Bicep templates.

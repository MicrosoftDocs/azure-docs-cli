### YamlMime:AzureCLIGroup
uid: az_confcom_containers
name: az confcom containers
extensionInformation: |-
  > [!NOTE]
  > This reference is part of the **confcom** extension for the Azure CLI (version 2.26.2 or higher). The extension will automatically install the first time you run an **az confcom containers** command. [Learn more](https://learn.microsoft.com/cli/azure/azure-cli-extensions-overview) about extensions.
summary: |-
  Commands which generate Security Policy Container Definitions.
status: GA
sourceType: Extension
directCommands:
- uid: az_confcom_containers_from_image
  name: az confcom containers from_image
  summary: |-
    Create a Security Policy Container Definition based on an image reference.
  status: GA
  sourceType: Extension
  syntax: >-
    az confcom containers from_image [--acquire-policy-token]
                                     [--change-reference]
                                     [--platform]
                                     []
  examples:
  - summary: |-
      Input an image reference and generate container definitions
    syntax: az confcom containers from_image my.azurecr.io/myimage:tag
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --platform
    defaultValue: aci
    summary: |-
      The name of the platform the container definition will run on. Must be either "aci" or "vn2".
  - name: <IMAGE>
    summary: |-
      Image to create container definition from.
    groupName: Positional
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_confcom_containers_from_radius
  name: az confcom containers from_radius
  summary: |-
    Create a Security Policy Container Definition based on a Radius Bicep template.
  status: Preview
  isPreview: true
  previewOrExperimentalInfo: 'This command is in preview and under development. Reference and support levels: https://aka.ms/CLI_refstatus'
  sourceType: Extension
  syntax: >-
    az confcom containers from_radius [--acquire-policy-token]
                                      [--change-reference]
                                      [--idx]
                                      [--parameters]
                                      [--platform]
                                      []
  examples:
  - summary: |-
      Generate a container definition from a Radius Bicep template
    syntax: az confcom containers from_radius ./app.bicep
  - summary: |-
      Generate a container definition from a Radius Bicep template with parameters
    syntax: az confcom containers from_radius ./app.bicep --parameters ./params.bicepparam
  - summary: |-
      Generate a container definition for the second container in the template
    syntax: az confcom containers from_radius ./app.bicep --idx 1
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --idx
    defaultValue: "0"
    summary: |-
      Index of the container definition in the template to use (0-based). Defaults to 0.
  - name: --parameters -p
    defaultValue: '[]'
    summary: |-
      Parameter file(s) for the Radius Bicep template. Can be specified multiple times.
  - name: --platform
    defaultValue: aci
    summary: |-
      The target platform to create the container definition for (aci or vn2). Defaults to aci.
  - name: <TEMPLATE>
    summary: |-
      Radius Bicep template to create container definition from.
    groupName: Positional
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
- uid: az_confcom_containers_from_vn2
  name: az confcom containers from_vn2
  summary: |-
    Create Security Policy Container Definitions based on a VN2 template.
  status: GA
  sourceType: Extension
  syntax: >-
    az confcom containers from_vn2 [--acquire-policy-token]
                                   [--change-reference]
                                   [--name]
                                   []
  examples:
  - summary: |-
      Input a VN2 Template and generate container definitions
    syntax: az confcom containers from_vn2 vn2.yaml --name mycontainer
  - summary: |-
      Input a VN2 Template and generate container definitions for all containers
    syntax: az confcom containers from_vn2 vn2.yaml
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --name -n
    summary: |-
      The name of the container to generate the policy for. If omitted, all containers are returned.
  - name: <TEMPLATE>
    summary: |-
      Template to create container definitions from.
    groupName: Positional
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
commands:
- az_confcom_containers_from_image
- az_confcom_containers_from_radius
- az_confcom_containers_from_vn2
metadata:
  description: Commands which generate Security Policy Container Definitions.

### YamlMime:AzureCLIGroup
uid: az_apim_backend
name: az apim backend
summary: |-
  Manage Azure API Management Backends.
status: GA
sourceType: Core
directCommands:
- uid: az_apim_backend_create
  name: az apim backend create
  summary: |-
    Create or Update an API Management Backend.
  status: GA
  sourceType: Core
  editLink: https://github.com/Azure/azure-cli/blob/dev/src/azure-cli/azure/cli/command_modules/apim/_help.py
  syntax: >-
    az apim backend create --backend-id
                           --protocol {http, soap}
                           --resource-group
                           --service-name
                           --url
                           [--acquire-policy-token]
                           [--change-reference]
                           [--description]
                           [--if-match]
  examples:
  - summary: |-
      Create a Backend.
    syntax: az apim backend create --service-name MyApim -g MyResourceGroup --backend-id MyBackendId --url https://mybackend.com --protocol http
  requiredParameters:
  - isRequired: true
    name: --backend-id
    summary: |-
      Unique name for the Backend to be created or updated.
    description: |-
      Must be unique in the current API Management service instance.
    groupName: Backend Arguments
  - isRequired: true
    name: --protocol
    acceptedValues: http, soap
    summary: |-
      The protocol used to communicate with the backend service.
  - isRequired: true
    name: --resource-group -g
    summary: |-
      Name of resource group. You can configure the default group using `az configure --defaults group=<name>`.
  - isRequired: true
    name: --service-name -n
    summary: |-
      The name of the API Management service instance.
  - isRequired: true
    name: --url
    summary: |-
      The URL of the backend service.
  optionalParameters:
  - name: --acquire-policy-token
    summary: |-
      Acquiring an Azure Policy token automatically for this resource operation.
    groupName: Global Policy Arguments
  - name: --change-reference
    summary: |-
      The related change reference ID for this resource operation.
    groupName: Global Policy Arguments
  - name: --description
    summary: |-
      Description of the Backend. May include HTML formatting tags.
  - name: --if-match
    summary: |-
      ETag of the Entity.
  globalParameters:
  - name: --debug
    defaultValue: "False"
    summary: |-
      Increase logging verbosity to show all debug logs.
  - name: --help -h
    summary: |-
      Show this help message and exit.
  - name: --only-show-errors
    defaultValue: "False"
    summary: |-
      Only show errors, suppressing warnings.
  - name: --output -o
    defaultValue: json
    acceptedValues: json, jsonc, none, table, tsv, yaml, yamlc
    summary: |-
      Output format.
  - name: --query
    summary: |-
      JMESPath query string. See http://jmespath.org/ for more information and examples.
  - name: --subscription
    summary: |-
      Name or ID of subscription. You can configure the default subscription using `az account set -s NAME_OR_ID`.
  - name: --verbose
    defaultValue: "False"
    summary: |-
      Increase logging verbosity. Use --debug for full debug logs.
